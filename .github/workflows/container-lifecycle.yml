      registry-password:
        description: Registry password for pulling the image.
        required: true
jobs:
  devguard_build_oci_image:
    runs-on: ubuntu-latest
    steps:
      - name: Set BUILD_ARGS
        run: |-
          if [ -z "${{ secrets.build-args }}" ]; then
            BUILD_ARGS="--context=. --dockerfile=Dockerfile"
          else
            BUILD_ARGS="${{ secrets.build-args }}"
          fi

          echo "BUILD_ARGS=$BUILD_ARGS --no-push --tarPath /github/workspace/tmp-image.tar" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: ${{ inputs.fetch-depth }}
      - name: In-Toto permission fix
        run: |-
          mkdir -p ${HOME}/.docker
          # Ensure the .docker directory is owned by the container user (UID 53111)
          sudo chown -R 53111:53111 ${HOME}/.docker || true
          sudo chmod 700 ${HOME}/.docker || true
          # Make the workspace writable by the in-toto/container user (UID 53111)
          sudo chown -R 53111:53111 $GITHUB_WORKSPACE || true
          sudo chmod -R u+rwX $GITHUB_WORKSPACE || true
      - name: In-Toto Provenance record start
        id: in-toto-start
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: devguard-scanner intoto start --step=build --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ inputs.supply-chain-id }}
        continue-on-error: true
      - name: Build Docker image with Kaniko
        id: build_image
        uses: docker://ghcr.io/osscontainertools/kaniko:v1.27.3-debug@sha256:a7e2df20e8ee98874f9856a04622de6a76e93609f7e5cba5949eb5436959720c
        with:
          args: ${{ env.BUILD_ARGS }}
      - name: Move the image.tar to the destination path
        run: |-
          if [ -f tmp-image.tar ]; then
            sudo chown $(id -u):$(id -g) tmp-image.tar || true
            sudo chmod 644 tmp-image.tar || true
            sudo mv tmp-image.tar "${IMAGE_DESTINATION_PATH}"
          else
            echo "tmp-image.tar not found"
            exit 1
          fi
        env:
          IMAGE_DESTINATION_PATH: ${{ inputs.image-destination-path }}
      - name: Fix workspace permissions
        run: |-
          # Keep 53111 as owner but make it world-writable for runner to write output files
          sudo chmod -R 777 $GITHUB_WORKSPACE || true
        continue-on-error: true
      - name: Use crane to get the digest
        run: |-
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            ghcr.io/l3montree-dev/devguard/scanner:main \
            crane digest --tarball="${IMAGE_DESTINATION_PATH}" > image-digest.txt
        env:
          IMAGE_DESTINATION_PATH: ${{ inputs.image-destination-path }}
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: ${{ inputs.image-destination-path }}
        if: inputs.disable-artifact-registry-as-image-store == false
      - name: Set image tag
        id: set-image-tag
        env:
          IMAGE_SUFFIX: ${{ inputs.image-suffix }}
          IMAGE: ${{ inputs.image }}
          IS_TAG: ${{ inputs.is-tag }}
        run: |-
          if [ -n "$IMAGE" ]; then
            IMAGE_TAG="$IMAGE"
            echo "$IMAGE_TAG" > image-tag.txt
            echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          else
            if [ -n "$IMAGE_SUFFIX" ]; then
              IMAGE_PATH="ghcr.io/${GITHUB_REPOSITORY}/${IMAGE_SUFFIX}"
            else
              IMAGE_PATH="ghcr.io/${GITHUB_REPOSITORY}"
            fi
            docker run --rm \
              -e IMAGE_PATH \
              -e GITHUB_REF_NAME \
              ghcr.io/l3montree-dev/devguard/scanner:main \
              devguard-scanner generate-tag \
                --imagePath="$IMAGE_PATH" \
                --ref="$GITHUB_REF_NAME" \
                --isTag=$IS_TAG \
            >> image-tag-env.txt
            IMAGE_TAG=$(grep '^IMAGE_TAG=' image-tag-env.txt | cut -d= -f2-)
            ARTIFACT_NAME=$(grep '^ARTIFACT_NAME=' image-tag-env.txt | cut -d= -f2-)
            ARTIFACT_URL_ENCODED=$(grep '^ARTIFACT_URL_ENCODED=' image-tag-env.txt | cut -d= -f2-)
            echo "$IMAGE_TAG" > image-tag.txt
            echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
            echo "ARTIFACT_URL_ENCODED=$ARTIFACT_URL_ENCODED" >> "$GITHUB_ENV"
          fi
      - name: Log in to ghcr.io
        run: |-
          mkdir -p ${HOME}/.docker
          sudo chown -R 53111:53111 ${HOME}/.docker || true
          sudo chmod 700 ${HOME}/.docker || true
          docker run --rm \
            --user 53111:53111 \
            -v "${HOME}/.docker:/tmp/.docker" \
            ghcr.io/l3montree-dev/devguard/scanner:main \
            crane auth login ghcr.io -u $GITHUB_ACTOR -p $GITHUB_TOKEN
        if: inputs.disable-artifact-registry-as-image-store == true
      - name: Upload to container registry
        run: |-
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -v "${HOME}/.docker:/tmp/.docker:ro" \
            ghcr.io/l3montree-dev/devguard/scanner:main \
            crane push "${IMAGE_DESTINATION_PATH}" "$(cat image-tag.txt)"
        env:
          IMAGE_DESTINATION_PATH: ${{ inputs.image-destination-path }}
        if: inputs.disable-artifact-registry-as-image-store == true
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: image-digest.txt
      - name: Set artifact PURL
        run: |-
          if [ -n "$ARTIFACT_NAME_INPUT" ]; then
            PURL="$ARTIFACT_NAME_INPUT"
            SAFE_PURL=$(echo -n "$PURL" | jq -s -R -r @uri)
          else
            PURL="$ARTIFACT_NAME"
            SAFE_PURL="$ARTIFACT_URL_ENCODED"
          fi
          echo "$PURL" > artifact-purl.txt
          echo "$SAFE_PURL" > artifact-purl-safe.txt
          echo "PURL=$PURL" >> $GITHUB_ENV
          echo "Using artifact name: $PURL"
        env:
          ARTIFACT_NAME_INPUT: ${{ inputs.devguard-artifact-name }}
      - name: Upload artifact purl
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: artifact-purl${{ inputs.image-suffix }}
          path: artifact-purl.txt
      - name: Upload safe artifact purl
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: artifact-purl-safe${{ inputs.image-suffix }}
          path: artifact-purl-safe.txt
      - name: Upload image tag
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: image-tag.txt
      - name: In-Toto Provenance record stop
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: devguard-scanner intoto stop --step=build --products=image-digest.txt --products=image-tag.txt --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ inputs.supply-chain-id }} --generateSlsaProvenance --defaultRef=${{ inputs.default-ref }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }}
        continue-on-error: true
      - name: Fix workspace permissions (after provenance)
        run: |-
          sudo chown -R $(id -u):$(id -g) $GITHUB_WORKSPACE || true
          sudo chmod -R u+rw,g+r,o+r $GITHUB_WORKSPACE || true
        continue-on-error: true
      - name: Upload SLSA Provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: build.provenance.json
          name: build${{ inputs.image-suffix }}.provenance.json
    name: devguard:build-oci-image
  devguard_container_scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
      - name: Download Docker image artifact (created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: .
        if: ${{ inputs.fetch-image-from-registry == 'false' }}
      - name: Download image-tag artifact (created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download artifact purl (created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: artifact-purl${{ inputs.image-suffix }}
        if: ${{ inputs.devguard-artifact-name == '' }}
      - name: Resolve artifact name
        env:
          DEVGUARD_ARTIFACT_NAME: ${{ inputs.devguard-artifact-name }}
        run: |-
          if [ -z "$DEVGUARD_ARTIFACT_NAME" ] && [ -f artifact-purl.txt ]; then
            echo "ARTIFACT_NAME=$(cat artifact-purl.txt)" >> $GITHUB_ENV
          else
            echo "ARTIFACT_NAME=$DEVGUARD_ARTIFACT_NAME" >> $GITHUB_ENV
          fi
      - name: Setup crane
        uses: imjasonh/setup-crane@cacf28038427f6fb033ef9022f6a2281f23cb3f2
      - name: Download OCI Image from registry
        run: crane pull $(cat image-tag.txt) image.tar
        if: ${{ inputs.fetch-image-from-registry == 'true' }}
      - name: DevGuard Container-Scanning
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        continue-on-error: ${{ inputs.allow-failure }}
        with:
          args: devguard-scanner container-scanning --origin="${{ inputs.devguard-origin }}" --assetName="${{ inputs.devguard-asset-name }}" --apiUrl="${{ inputs.devguard-api-url }}" --token="${{ secrets.devguard-token }}" --path="${{ inputs.image-tar-path }}" --defaultRef="${{ inputs.default-ref }}" --ref="${{ inputs.commit-ref }}" --isTag="${{ inputs.is-tag }}" --artifactName="${{ env.ARTIFACT_NAME }}" --webUI="${{ inputs.devguard-web-ui }}" --failOnRisk="${{ inputs.fail-on-risk }}" --failOnCVSS="${{ inputs.fail-on-cvss }}" --ignoreExternalReferences=${{ inputs.ignore-external-references }} --ignoreUpstreamAttestations=${{ inputs.ignore-upstream-attestations }}
        env:
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
    needs:
      - devguard_build_oci_image
    name: devguard:container-scanning
  devguard_deploy:
    runs-on: ubuntu-latest
    if: inputs.should-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
      - name: Download oci-image artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: .
        if: inputs.image-already-in-registry == false
      - name: Download image-tag artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download image-digest artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: .
      - name: Read image-digest.txt
        id: read-digest
        run: echo "DIGEST=$(cat image-digest.txt)" >> $GITHUB_ENV
      - name: In-Toto Provenance run
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: devguard-scanner intoto run --step=deploy --materials=image-tag.txt --products=image-tag.txt --products=image-digest.txt --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ inputs.supply-chain-id }} --supplyChainOutputDigest="${{ env.DIGEST }}" --defaultRef=${{ inputs.default-ref }} --isTag=${{ inputs.is-tag }} --ref=${{ inputs.commit-ref }}
        continue-on-error: true
      - name: Setup crane
        uses: imjasonh/setup-crane@cacf28038427f6fb033ef9022f6a2281f23cb3f2
      - name: Push oci image to GitHub image Registry
        run: crane push image.tar "$(cat image-tag.txt)"
        if: inputs.image-already-in-registry == false
    needs:
      - devguard_build_oci_image
      - devguard_container_scanning
    name: devguard:deploy
  devguard_sign:
    runs-on: ubuntu-latest
    if: inputs.should-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
      - name: Download image-tag artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download image-digest artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: .
      - name: Set Image to be signed
        run: echo "IMAGE_TAG_AND_DIGEST=$(cat image-tag.txt)@$(cat image-digest.txt)" >> $GITHUB_ENV
      - name: DevGuard Image-Signing
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: devguard-scanner sign -u ${{ inputs.registry-user }} -r ${{ inputs.registry }} -p ${{ secrets.registry-password }} --token="${{ secrets.devguard-token }}" ${{ env.IMAGE_TAG_AND_DIGEST }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }}
    needs:
      - devguard_build_oci_image
      - devguard_container_scanning
      - devguard_deploy
    name: devguard:sign
  devguard_attest:
    runs-on: ubuntu-latest
    if: inputs.should-deploy
    steps:
      - name: Download image-digest artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: .
        continue-on-error: true
      - name: Download image-tag artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download artifact purl (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: artifact-purl${{ inputs.image-suffix }}
        if: inputs.devguard-artifact-name == ''
      - name: Download safe-artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: artifact-purl-safe${{ inputs.image-suffix }}
        if: inputs.devguard-artifact-name == ''
      - name: set artifact-name variable if it is empty
        env:
          DEVGUARD_ARTIFACT_NAME: ${{ inputs.devguard-artifact-name }}
        run: |-
          if [ -z "$DEVGUARD_ARTIFACT_NAME" ] && [ -f artifact-purl.txt ]; then
            echo "ARTIFACT_NAME=$(cat artifact-purl.txt)" >> $GITHUB_ENV
            echo "Using artifact name from file: $ARTIFACT_NAME"
            # For API calls, use safe artifact name if it exists
            if [ -f artifact-purl-safe.txt ]; then
              echo "API_ARTIFACT_NAME=$(cat artifact-purl-safe.txt)" >> $GITHUB_ENV
            else
              echo "API_ARTIFACT_NAME=$(cat artifact-purl.txt)" >> $GITHUB_ENV
            fi
          else
            # make sure to url encode
            echo "ARTIFACT_NAME=$DEVGUARD_ARTIFACT_NAME" >> $GITHUB_ENV
            echo "API_ARTIFACT_NAME=$(echo -n "$DEVGUARD_ARTIFACT_NAME" | jq -s -R -r @uri)" >> $GITHUB_ENV
            echo "Using provided artifact name: $DEVGUARD_ARTIFACT_NAME"
            echo "Encoded: $API_ARTIFACT_NAME"
          fi
          echo "Resolved artifact name for attestation: $DEVGUARD_ARTIFACT_NAME"
      - name: Get and Attest SBOM
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: |-
            sh -c "
              slug=$(devguard-scanner slug ${{ inputs.commit-ref }}) &&
              artifact_name="$ARTIFACT_NAME" &&
              echo 'Fetching SBOM for artifact:' '${{ env.API_ARTIFACT_NAME }}' &&
              devguard-scanner curl '${{ inputs.devguard-api-url }}/api/v1/organizations/${{ inputs.devguard-asset-name }}/refs/'$slug'/artifacts/${{ env.API_ARTIFACT_NAME }}/sbom.json/' --token='${{ secrets.devguard-token }}' > /tmp/sbom.json &&
              echo 'SBOM downloaded to /tmp/sbom.json' &&
              if [ -f image-digest.txt ]; then
                echo 'Attesting SBOM with image digest present' &&
                devguard-scanner attest -u ${{ inputs.registry-user }} -r ${{ inputs.registry }} -p ${{ secrets.registry-password }} /tmp/sbom.json --predicateType='https://cyclonedx.org/bom' \"$(cat image-tag.txt)@$(cat image-digest.txt)\" --token='${{ secrets.devguard-token }}' --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              else
                echo 'Attesting SBOM without image digest' &&
                devguard-scanner attest /tmp/sbom.json --predicateType='https://cyclonedx.org/bom' --token='${{ secrets.devguard-token }}' --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              fi
            "
        env:
          API_ARTIFACT_NAME: ${{ env.API_ARTIFACT_NAME }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
      - name: Get and Attest VeX
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: |-
            sh -c "
              slug=$(devguard-scanner slug ${{ inputs.commit-ref }}) &&
              artifact_name="$ARTIFACT_NAME" &&
              echo 'Fetching VeX for artifact:' '${{ env.API_ARTIFACT_NAME }}' &&
              devguard-scanner curl '${{ inputs.devguard-api-url }}/api/v1/organizations/${{ inputs.devguard-asset-name }}/refs/'$slug'/artifacts/${{ env.API_ARTIFACT_NAME }}/vex.json/' --token='${{ secrets.devguard-token }}' > /tmp/vex.json &&
              echo 'VeX downloaded to /tmp/vex.json' &&
              if [ -f image-digest.txt ]; then
                echo 'Attesting VeX with image digest present' &&
                devguard-scanner attest -u ${{ inputs.registry-user }} -r ${{ inputs.registry }} -p ${{ secrets.registry-password }} /tmp/vex.json \"$(cat image-tag.txt)@$(cat image-digest.txt)\" --token='${{ secrets.devguard-token }}' --predicateType='https://cyclonedx.org/vex' --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              else
                echo 'Attesting VeX without image digest' &&
                devguard-scanner attest /tmp/vex.json --predicateType='https://cyclonedx.org/vex' --token='${{ secrets.devguard-token }}' --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              fi
            "
        env:
          API_ARTIFACT_NAME: ${{ env.API_ARTIFACT_NAME }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
      - name: Get and Attest SAST-Results
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: |-
            sh -c "
              slug=$(devguard-scanner slug ${{ inputs.commit-ref }}) &&
              artifact_name="$ARTIFACT_NAME" &&
              echo 'Fetching SAST results for artifact:' '${{ env.ARTIFACT_NAME }}' &&
              devguard-scanner curl '${{ inputs.devguard-api-url }}/api/v1/organizations/${{ inputs.devguard-asset-name }}/refs/'$slug'/sarif.json' --token='${{ secrets.devguard-token }}' > /tmp/sarif.json &&
              echo 'SAST results downloaded to /tmp/sarif.json' &&
              if [ -f image-digest.txt ]; then
                echo 'Attesting SAST results with image digest present' &&
                devguard-scanner attest -u ${{ inputs.registry-user }} -r ghcr.io -p ${{ secrets.GITHUB_TOKEN }} /tmp/sarif.json \"$(cat image-tag.txt)@$(cat image-digest.txt)\" --predicateType='https://www.schemastore.org/schemas/json/sarif-2.1.0.json' --token='${{ secrets.devguard-token }}' --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              else
                echo 'Attesting SAST results without image digest' &&
                devguard-scanner attest /tmp/sarif.json --predicateType='https://www.schemastore.org/schemas/json/sarif-2.1.0.json' --token='${{ secrets.devguard-token }}' --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              fi
            "
        env:
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
      - name: Download and Attest build-provenance.json
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: build${{ inputs.image-suffix }}.provenance.json
      - name: Attest build-provenance.json
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        continue-on-error: true
        with:
          args: |-
            sh -c "
              artifact_name="$ARTIFACT_NAME" &&
              echo 'Building provenance attestation for artifact:' '${{ env.ARTIFACT_NAME }}' &&
              if [ -f image-digest.txt ]; then
                echo 'Attesting provenance with image digest present' &&
                devguard-scanner attest -u ${{ inputs.registry-user }} -r ghcr.io -p ${{ secrets.GITHUB_TOKEN }} build.provenance.json \"$(cat image-tag.txt)@$(cat image-digest.txt)\" --predicateType='https://slsa.dev/provenance/v1' --token='${{ secrets.devguard-token }}' --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              else
                echo 'Attesting provenance without image digest' &&
                devguard-scanner attest build.provenance.json --token='${{ secrets.devguard-token }}' --apiUrl=${{ inputs.devguard-api-url }} --predicateType='https://slsa.dev/provenance/v1' --assetName=${{ inputs.devguard-asset-name }} --ref=${{ inputs.commit-ref }} --isTag=${{ inputs.is-tag }} --artifactName="$artifact_name"
              fi
            "
        env:
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
    needs:
      - devguard_build_oci_image
      - devguard_container_scanning
      - devguard_deploy
    name: devguard:attest
