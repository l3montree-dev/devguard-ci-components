# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      asset-name:
        description: Name of the asset
        type: string
        required: true
      api-url:
        type: string
        required: false
        default: https://api.devguard.org
        description: URL of the DevGuard API
      web-ui:
        type: string
        required: false
        default: https://app.devguard.org
        description: URL of the DevGuard Web UI
      image-destination-path:
        description: Path to the OCI image tar file
        type: string
        required: false
        default: image.tar
      image:
        description: OCI image tag
        type: string
        required: false
        default: ""
      disable-artifact-registry-as-image-store:
        required: false
        default: false
        type: boolean
        description: Push image directly to registry instead of uploading as artifact
      image-suffix:
        description: Suffix for the image name when building multiple images
        type: string
        required: false
        default: ""
      artifact-name:
        type: string
        required: false
        default: ""
        description: The name of the artifact you are building
      should-deploy:
        description: Should the deploy job run
        type: boolean
        required: false
        default: true
      fail-on-risk:
        description: Fail if risk level reaches this threshold
        type: string
        required: false
        default: ""
      fail-on-cvss:
        description: Fail if CVSS score reaches this threshold
        type: string
        required: false
        default: ""
      fetch-depth:
        type: number
        required: false
        default: 1
        description: Number of commits to fetch
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
      build-args:
        description: Build arguments for Docker
        required: false
permissions:
  contents: read
  packages: write
jobs:
  call-build-image:
    uses: ./.github/workflows/build-image.yml
    with:
      image-destination-path: ${{ inputs.image-destination-path }}
      image: ${{ inputs.image }}
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-api-url: ${{ inputs.api-url }}
      disable-artifact-registry-as-image-store: ${{ inputs.disable-artifact-registry-as-image-store }}
      devguard-artifact-name: ${{ inputs.artifact-name }}
      image-suffix: ${{ inputs.image-suffix }}
      fetch-depth: ${{ inputs.fetch-depth }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
      build-args: ${{ secrets.build-args }}
  call-container-scanning:
    needs:
      - call-build-image
    uses: ./.github/workflows/container-scanning.yml
    with:
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-api-url: ${{ inputs.api-url }}
      image-tar-path: ${{ inputs.image-destination-path }}
      fetch-image-from-registry: ${{ inputs.disable-artifact-registry-as-image-store }}
      fail-on-risk: ${{ inputs.fail-on-risk }}
      fail-on-cvss: ${{ inputs.fail-on-cvss }}
      devguard-web-ui: ${{ inputs.web-ui }}
      devguard-artifact-name: ${{ inputs.artifact-name }}
      image-suffix: ${{ inputs.image-suffix }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
  call-deploy:
    needs:
      - call-build-image
      - call-container-scanning
    uses: ./.github/workflows/deploy.yml
    with:
      should-deploy: ${{ inputs.should-deploy }}
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-api-url: ${{ inputs.api-url }}
      image-already-in-registry: ${{ inputs.disable-artifact-registry-as-image-store }}
      image-suffix: ${{ inputs.image-suffix }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
  call-sign:
    needs:
      - call-build-image
      - call-container-scanning
      - call-deploy
    uses: ./.github/workflows/sign.yml
    with:
      should-deploy: ${{ inputs.should-deploy }}
      devguard-api-url: ${{ inputs.api-url }}
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-artifact-name: ${{ inputs.artifact-name }}
      image-suffix: ${{ inputs.image-suffix }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
  call-attest:
    needs:
      - call-build-image
      - call-container-scanning
      - call-deploy
    uses: ./.github/workflows/attest.yml
    with:
      should-deploy: ${{ inputs.should-deploy }}
      devguard-api-url: ${{ inputs.api-url }}
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-artifact-name: ${{ inputs.artifact-name }}
      image-suffix: ${{ inputs.image-suffix }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
name: Container Lifecycle
