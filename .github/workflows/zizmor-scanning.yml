# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      devguard-web-ui:
        description: The DevGuard Web-UI Instance URL
        type: string
        required: false
        default: https://app.devguard.org
      allow-failure:
        description: Whether the job is allowed to fail without stopping the pipeline
        type: boolean
        required: false
        default: false
      default-ref:
        description: Default branch reference
        type: string
        required: false
        default: ${{ github.event.repository.default_branch }}
      commit-ref:
        description: Current commit reference
        type: string
        required: false
        default: ${{ github.ref_name }}
      is-tag:
        description: Is the current commit a tag
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
jobs:
  devguard_zizmor_scanning:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - name: Run zizmor
        run: uvx zizmor --format=sarif .github/workflows/ > zizmor.sarif
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload SARIF to DevGuard
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        continue-on-error: ${{ inputs.allow-failure }}
        with:
          args: devguard-scanner sarif zizmor.sarif --assetName="${{ inputs.devguard-asset-name }}" --apiUrl="${{ inputs.devguard-api-url }}" --token="${{ secrets.devguard-token }}" --defaultRef="${{ inputs.default-ref }}" --ref="${{ inputs.commit-ref }}" --isTag="${{ inputs.is-tag }}" --webUI=${{ inputs.devguard-web-ui }}
    name: devguard:zizmor-scanning
