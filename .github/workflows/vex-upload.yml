        description: DevGuard API token
        required: true
jobs:
  devguard_vex_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: DevGuard VeX Upload
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        continue-on-error: ${{ inputs.allow-failure }}
        with:
          args: devguard-scanner vex ${{ inputs.vex-file }} --origin="${{ inputs.devguard-origin }}" --assetName="${{ inputs.devguard-asset-name }}" --apiUrl="${{ inputs.devguard-api-url }}" --token="${{ secrets.devguard-token }}" --defaultRef="${{ inputs.default-ref }}" --ref="${{ inputs.commit-ref }}" --isTag="${{ inputs.is-tag }}" --artifactName="${{ inputs.devguard-artifact-name }}" --ignoreExternalReferences=${{ inputs.ignore-external-references }}
    name: devguard:vex-upload
