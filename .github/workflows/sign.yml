# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      devguard-artifact-name:
        description: The name of the artifact (in purl format e.g., pkg:oci/k8s-tools)
        type: string
        required: false
        default: ""
      registry:
        description: Container registry URL
        type: string
        required: false
        default: ghcr.io
      registry-user:
        description: Container registry username
        type: string
        required: false
        default: ${{ github.actor }}
      image:
        description: The container image to sign (e.g., registry.example.com/project/image:tag)
        type: string
        required: false
        default: $CI_REGISTRY_IMAGE:latest
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
      should-deploy:
        description: Should the signing job run
        type: boolean
        required: false
        default: true
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
      registry-password:
        description: Registry password for pulling the image.
        required: true
jobs:
  devguard_sign:
    runs-on: ubuntu-latest
    if: inputs.should-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
      - name: Download image-tag artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download image-digest artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: .
      - name: Set Image to be signed
        run: echo "IMAGE_TAG_AND_DIGEST=$(cat image-tag.txt)@$(cat image-digest.txt)" >> $GITHUB_ENV
      - name: DevGuard Image-Signing
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: devguard-scanner sign -u ${{ inputs.registry-user }} -r ${{ inputs.registry }} -p ${{ secrets.registry-password }} --token="${{ secrets.devguard-token }}" ${{ env.IMAGE_TAG_AND_DIGEST }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }}
    name: devguard:sign
