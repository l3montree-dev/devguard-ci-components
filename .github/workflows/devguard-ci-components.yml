# DevSecOps Workflow Definition
# This workflow is triggered on every push to the repository
name: DevGuard CI Components

on:
  push:

permissions:
  packages: write
  contents: read

jobs:
  devguard-scanner:
    uses: ./.github/workflows/full.yml
    with:
      asset-name: "l3montree-cybersecurity/projects/devguard/assets/devguard-action"
      disable-artifact-registry-as-image-store: true
      api-url: https://api.main.devguard.org
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}

   
  devguard-scanner-with-artifact:
    uses: ./.github/workflows/full.yml
    with:
      asset-name: "l3montree-cybersecurity/projects/devguard/assets/devguard-action"
      disable-artifact-registry-as-image-store: true
      api-url: https://api.main.devguard.org
      artifact-name: "demo-artifact"
      image-suffix: demo-artifact
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}   


  build-test-image:
    uses: ./.github/workflows/build-image.yml
    with:
      artifact-name: "test"
      asset-name: l3montree-cybersecurity/projects/devguard/assets/devguard-action
      api-url: https://api.main.devguard.org
      image-suffix: "test"
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}  
      build-args: "--context=. --dockerfile=Dockerfile-test"


  container-scanning-test:
    uses: ./.github/workflows/container-scanning.yml
    needs: 
    - build-test-image
    with:
      asset-name: l3montree-cybersecurity/projects/devguard/assets/devguard-action
      api-url: https://api.main.devguard.org
      artifact-name: "test"
      image-suffix: "test"
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}    
    
  deploy-test:
    uses: ./.github/workflows/deploy.yml
    needs: 
    - container-scanning-test
    with:
      asset-name: l3montree-cybersecurity/projects/devguard/assets/devguard-action
      api-url: https://api.main.devguard.org
      image-suffix: "test"
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}    

  zizmor-scanning:
    uses: ./.github/workflows/zizmor-scanning.yml
    with:
      devguard_asset_name: l3montree-cybersecurity/projects/devguard/assets/devguard-ci-components
      devguard_api_url: https://api.main.devguard.org
      devguard_web_ui: https://main.devguard.org
      allow_failure: true
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}
