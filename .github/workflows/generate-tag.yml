# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
      image-variant:
        description: Variant for the image name (e.g., 'slim' for 'image-slim'). Leave empty for no variant.
        type: string
        required: false
        default: ""
      architecture:
        description: Target architecture (e.g., amd64 or arm64)
        type: string
        required: false
        default: amd64
      image-path:
        description: Path to the built image (e.g., registry.example.com/project/image). If not provided, the job will attempt to discover the image from previous jobs.
        type: string
        required: false
        default: $CI_REGISTRY_IMAGE
      upstream-version:
        description: Upstream version to use for tag generation. If not provided, the job will ignore this parameter.
        type: string
        required: false
        default: "0"
      devguard-artifact-name:
        description: The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If not provided, will use the generated PURL from the built image
        type: string
        required: false
        default: ""
    secrets: {}
jobs:
  devguard_generate_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Generate tag
        run: |-
          docker run --rm \
            -e IMAGE_SUFFIX \
            -e IMAGE_VARIANT \
            -e ARCHITECTURE \
            -e IMAGE_PATH \
            -e GITHUB_REF_NAME \
            -e UPSTREAM_VERSION \
            ghcr.io/l3montree-dev/devguard/scanner:main \
            devguard-scanner generate-tag \
              --imageSuffix="$IMAGE_SUFFIX" \
              --imageVariant="$IMAGE_VARIANT" \
              --architecture="$ARCHITECTURE" \
              --imagePath="$IMAGE_PATH" \
              --ref="$GITHUB_REF_NAME" \
              --upstreamVersion="$UPSTREAM_VERSION" \
            >> generate_tag_${UPSTREAM_VERSION}_${ARCHITECTURE}.env
          echo "Generated tag:"
          cat generate_tag_${UPSTREAM_VERSION}_${ARCHITECTURE}.env
        env:
          IMAGE_SUFFIX: ${{ inputs.image-suffix }}
          IMAGE_VARIANT: ${{ inputs.image-variant }}
          ARCHITECTURE: ${{ inputs.architecture }}
          IMAGE_PATH: ${{ inputs.image-path }}
          UPSTREAM_VERSION: ${{ inputs.upstream-version }}
      - name: Upload generate-tag env artifact
        uses: actions/upload-artifact@v4
        with:
          name: generate-tag-env${{ inputs.image-suffix }}
          path: generate_tag_${{ inputs.upstream-version }}_${{ inputs.architecture }}.env
    name: devguard:generate-tag
