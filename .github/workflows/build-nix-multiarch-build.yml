# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.opencode.de
      image-name:
        description: Full OCI image name without tag (e.g. ghcr.io/org/repo/image)
        type: string
        required: false
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: ""
      create-root-manifest:
        description: Whether to also create a manifest without the branch ref in the tag.
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
      nix-target-amd64:
        description: Nix flake build target for amd64 (e.g. coreutils-amd64)
        type: string
        required: false
      nix-target-arm64:
        description: Nix flake build target for arm64 (e.g. coreutils-arm64)
        type: string
        required: false
      nix-cache-substituter:
        description: Nix binary cache substituter URL. Set to empty string to disable.
        type: string
        required: false
        default: ""
      nix-cache-public-key:
        description: Trusted public key for the Nix binary cache.
        type: string
        required: false
        default: ""
      nix-cache-s3-endpoint:
        description: S3 API endpoint for pushing to the cache (e.g. s3.garage.l3montree.cloud). Leave empty to skip pushing.
        type: string
        required: false
        default: ""
      nix-cache-s3-bucket:
        description: S3 bucket name for the cache.
        type: string
        required: false
        default: ""
      nix-cache-region:
        description: S3 region for the cache bucket.
        type: string
        required: false
        default: ""
      nix-version:
        description: Pinned Nix version for deterministic builds
        type: string
        required: false
        default: 2.34.4
      allow-failure:
        description: Whether the job is allowed to fail without stopping the pipeline
        type: boolean
        required: false
        default: false
      fail-on-risk:
        description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
        type: string
        required: false
        default: critical
      fail-on-cvss:
        description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
        type: string
        required: false
        default: critical
    secrets:
      devguard-token:
        description: DevGuard API token
        required: false
      nix-cache-secret-key:
        description: Nix binary cache signing secret key.
        required: false
      nix-cache-aws-access-key-id:
        description: AWS access key ID for the Nix S3 cache.
        required: false
      nix-cache-aws-secret-access-key:
        description: AWS secret access key for the Nix S3 cache.
        required: false
jobs:
  devguard_build_nix_multiarch:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            nix_target: ${{ inputs.nix-target-amd64 }}
          - arch: arm64
            runner: ubuntu-24.04-arm
            nix_target: ${{ inputs.nix-target-arm64 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: ${{ format('https://releases.nixos.org/nix/nix-{0}/install', inputs.nix-version) }}
          extra_nix_config: |-
            experimental-features = nix-command flakes
            ${{ inputs.nix-cache-substituter != '' && format('substituters = https://cache.nixos.org {0}', inputs.nix-cache-substituter) || '' }}
            ${{ inputs.nix-cache-public-key != '' && format('trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= {0}', inputs.nix-cache-public-key) || '' }}
      - name: Install crane and devguard-scanner
        run: nix profile install nixpkgs#crane github:l3montree-dev/devguard#devguardScanner
      - name: In-Toto Provenance record start
        run: devguard-scanner intoto start --step=build --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ github.sha }}
        continue-on-error: true
      - name: Write Nix cache secret key
        if: inputs.nix-cache-s3-endpoint != ''
        run: echo "${{ secrets.nix-cache-secret-key }}" > /tmp/nix-cache-priv-key.pem
      - name: Build OCI image with Nix
        run: nix build .#${{ matrix.nix_target }}
      - name: Push build results to Nix cache
        if: inputs.nix-cache-s3-endpoint != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.nix-cache-aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.nix-cache-aws-secret-access-key }}
        run: |-
          mkdir -p ~/.aws
          echo "[profile nix-cache]" >> ~/.aws/config
          echo "s3.addressing_style = path" >> ~/.aws/config
          nix copy $(nix-store -qR $(readlink result)) \
            --to 's3://${{ inputs.nix-cache-s3-bucket }}?endpoint=${{ inputs.nix-cache-s3-endpoint }}&region=${{ inputs.nix-cache-region }}&scheme=https&profile=nix-cache&secret-key=/tmp/nix-cache-priv-key.pem' || true
      - name: Prepare image.tar
        run: gunzip -c "$(readlink -f result)" > image.tar
      - name: Get image digest
        run: crane digest --tarball=image.tar > image-digest.txt
      - name: Set image tag
        run: |-
          devguard-scanner generate-tag \
            --imagePath='${{ inputs.image-name }}' \
            --ref='${{ github.ref_name }}' \
            --architecture='${{ matrix.arch }}' \
            >> image-tag-env.txt
          grep '^IMAGE_TAG=' image-tag-env.txt | cut -d= -f2- > image-tag.txt
          grep '^ARTIFACT_NAME=' image-tag-env.txt | cut -d= -f2- > artifact-purl.txt
          grep '^ARTIFACT_URL_ENCODED=' image-tag-env.txt | cut -d= -f2- > artifact-purl-safe.txt
      - name: Upload oci-image artifact
        uses: actions/upload-artifact@v4
        with:
          name: oci-image${{ inputs.image-suffix }}-${{ matrix.arch }}
          path: image.tar
      - name: Upload image-tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag${{ inputs.image-suffix }}-${{ matrix.arch }}
          path: image-tag.txt
      - name: Upload image-digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest${{ inputs.image-suffix }}-${{ matrix.arch }}
          path: image-digest.txt
      - name: In-Toto Provenance record stop
        run: devguard-scanner intoto stop --step=build --products=image-digest.txt --products=image-tag.txt --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ github.sha }} --generateSlsaProvenance --defaultRef=${{ github.event.repository.default_branch }} --isTag=${{ github.ref_type == 'tag' }} --ref=${{ github.ref_name }}
        continue-on-error: true
      - name: Upload SLSA Provenance
        uses: actions/upload-artifact@v4
        with:
          path: build.provenance.json
          name: build${{ inputs.image-suffix }}-${{ matrix.arch }}.provenance.json
    name: devguard:build-nix-multiarch
