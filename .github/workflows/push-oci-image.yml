# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
      supply-chain-id:
        description: The supply chain ID to use for the in-toto attestation
        type: string
        required: false
        default: ${{ github.sha }}
      commit-ref:
        description: Current commit reference
        type: string
        required: false
        default: ${{ github.ref_name }}
      is-tag:
        description: Is the current commit a tag
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
      default-ref:
        description: Default branch reference
        type: string
        required: false
        default: ${{ github.event.repository.default_branch }}
      should-deploy:
        description: Should the push job run
        type: boolean
        required: false
        default: true
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
jobs:
  devguard_push_oci_image:
    runs-on: ubuntu-latest
    if: inputs.should-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Download oci-image artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: .
      - name: Download image-tag artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download image-digest artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: .
      - name: Log in to ghcr.io
        run: |-
          mkdir -p ${HOME}/.docker
          sudo chown -R 53111:53111 ${HOME}/.docker || true
          sudo chmod 700 ${HOME}/.docker || true
          docker run --rm \
            --user 53111:53111 \
            -v "${HOME}/.docker:/tmp/.docker" \
            ghcr.io/l3montree-dev/devguard/scanner:v1.8.0 \
            crane auth login ghcr.io -u $GITHUB_ACTOR -p $GITHUB_TOKEN
      - name: Push OCI image
        run: |-
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -v "${HOME}/.docker:/tmp/.docker:ro" \
            ghcr.io/l3montree-dev/devguard/scanner:v1.8.0 \
            crane push image.tar "$(cat image-tag.txt | tr '[:upper:]' '[:lower:]')"
      - name: In-Toto Provenance run
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:v1.8.0
        with:
          args: devguard-scanner intoto run --step=deploy --materials=image-tag.txt --products=image-tag.txt --products=image-digest.txt --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ inputs.supply-chain-id }} --supplyChainOutputDigest="$(cat image-digest.txt)" --defaultRef=${{ inputs.default-ref }} --isTag=${{ inputs.is-tag }} --ref=${{ inputs.commit-ref }}
        continue-on-error: true
    name: devguard:push-oci-image
