# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      image-suffix:
        description: The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If you build a single artifact - leave it empty.
        type: string
        required: false
        default: container
      should-deploy:
        description: Should the deploy job run
        type: boolean
        required: false
        default: true
      image-already-in-registry:
        description: If set to true, the image wont be pushed again
        type: boolean
        required: false
        default: false
      artifact-suffix:
        description: Suffix used to look up build artifacts by name. Defaults to image-suffix when not set.
        type: string
        required: false
        default: ""
      supply-chain-id:
        description: The supply chain ID to use for the in-toto attestation
        type: string
        required: false
        default: ${{ github.sha }}
      default-ref:
        description: Default branch reference
        type: string
        required: false
        default: ${{ github.event.repository.default_branch }}
      commit-ref:
        description: Current commit reference
        type: string
        required: false
        default: ${{ github.ref_name }}
      is-tag:
        description: Is the current commit a tag
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
jobs:
  devguard_deploy:
    runs-on: ubuntu-latest
    if: inputs.should-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
      - name: Download oci-image artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: .
        if: inputs.image-already-in-registry == false
      - name: Download image-tag artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download image-digest artifact (can be created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: .
      - name: Read image-digest.txt
        id: read-digest
        run: echo "DIGEST=$(cat image-digest.txt)" >> $GITHUB_ENV
      - name: In-Toto Provenance run
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:v1.8.0
        with:
          args: devguard-scanner intoto run --step=deploy --materials=image-tag.txt --products=image-tag.txt --products=image-digest.txt --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ inputs.supply-chain-id }} --supplyChainOutputDigest="${{ env.DIGEST }}" --defaultRef=${{ inputs.default-ref }} --isTag=${{ inputs.is-tag }} --ref=${{ inputs.commit-ref }}
        continue-on-error: true
      - name: Setup crane
        uses: imjasonh/setup-crane@cacf28038427f6fb033ef9022f6a2281f23cb3f2
      - name: Push oci image to GitHub image Registry
        run: crane push image.tar "$(cat image-tag.txt)"
        if: inputs.image-already-in-registry == false
    name: devguard:deploy
