# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      release-tag:
        description: The tag to create the release for
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
      release-name:
        description: The name of the release
        type: string
        required: false
        default: Release $CI_COMMIT_TAG
      release-description:
        description: Custom release description (optional, leave empty for auto-generated)
        type: string
        required: false
        default: ""
      allow-failure:
        description: Whether the job is allowed to fail without stopping the pipeline
        type: boolean
        required: false
        default: false
      prerelease:
        description: Whether the release is a prerelease (GitHub only)
        type: boolean
        required: false
        default: false
    secrets: {}
jobs:
  devguard_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Create GitHub Release
        continue-on-error: ${{ inputs.allow-failure }}
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
          RELEASE_NAME: ${{ inputs.release-name }}
          RELEASE_DESCRIPTION: ${{ inputs.release-description }}
        run: |-
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
          PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "$RELEASE_DESCRIPTION" $PRERELEASE_FLAG
    name: devguard:release
