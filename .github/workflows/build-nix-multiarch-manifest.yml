      fail-on-cvss:
        description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
        type: string
        required: false
        default: critical
    secrets: {}
jobs:
  devguard_create_nix_manifest_multi_arch:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Download amd64 image-tag artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}-amd64
          path: amd64
      - name: Download arm64 image-tag artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}-arm64
          path: arm64
      - name: Log in to ghcr.io
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create and push multi-arch manifest
        env:
          CREATE_ROOT_MANIFEST: ${{ inputs.create-root-manifest }}
        run: |-
          AMD64_TAG=$(cat amd64/image-tag.txt)
          ARM64_TAG=$(cat arm64/image-tag.txt)

          echo "amd64: $AMD64_TAG"
          echo "arm64: $ARM64_TAG"

          BASE_TAG="${AMD64_TAG%-amd64}"

          echo "Creating manifest: $BASE_TAG"
          docker manifest create "$BASE_TAG" "$AMD64_TAG" "$ARM64_TAG"
          docker manifest push "$BASE_TAG"

          if [ "$CREATE_ROOT_MANIFEST" = "true" ]; then
            ROOT_TAG=$(echo "$BASE_TAG" | sed "s/-${GITHUB_REF_NAME}//")
            if [ "$ROOT_TAG" != "$BASE_TAG" ]; then
              echo "Creating root manifest: $ROOT_TAG"
              docker manifest create "$ROOT_TAG" "$AMD64_TAG" "$ARM64_TAG"
              docker manifest push "$ROOT_TAG"
            fi
          fi
    name: devguard:create-nix-manifest-multi-arch
