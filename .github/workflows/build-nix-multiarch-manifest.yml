      nix-version:
        description: Pinned Nix version for deterministic builds
        type: string
        required: false
        default: 2.34.4
      allow-failure:
        description: Whether the job is allowed to fail without stopping the pipeline
        type: boolean
        required: false
        default: false
      fail-on-risk:
        description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
        type: string
        required: false
