# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      devguard-artifact-name:
        description: The name of the artifact (in purl format e.g., pkg:oci/k8s-tools)
        type: string
        required: false
        default: ""
      image:
        description: The image file to build (e.g. image.tar)
        type: string
        required: false
        default: image.tar
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
      image-tag:
        description: The tag to use for the built image
        type: string
        required: false
        default: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
      build-args:
        description: The build arguments to pass to the Kaniko build command
        type: string
        required: false
        default: --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile
      push-image:
        description: If your GitLab instance has small artifact size limits, set this to true to push the image to the registry instead of uploading artifacts.
        type: string
        required: false
        default: "false"
      supplyChainId:
        description: The supply chain ID to use for the in-toto attestation
        type: string
        required: false
        default: ${{ github.sha }}
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
      build-args:
        description: Build arguments passed to docker buildx build.
        required: false
      registry-user:
        description: Registry username for pushing the image.
        required: false
      registry-password:
        description: Registry password for pushing the image.
        required: false
jobs:
  devguard_build_oci_image_w_docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c887d9748da14dcb42b11cf8bcc773b301ea55b5
      - name: In-Toto Provenance record start
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: devguard-scanner intoto start --step=build --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ github.sha }}
        continue-on-error: true
      - name: Build Docker image
        run: |-
          BUILD_ARGS="${{ secrets.build-args }}"
          if [ -z "$BUILD_ARGS" ]; then
            BUILD_ARGS="--context=. --file=Dockerfile"
          fi
          docker buildx build $BUILD_ARGS --output type=docker,dest=./${{ inputs.image }} -t ${{ inputs.image-tag }}
      - name: Get image digest
        run: |-
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            ghcr.io/l3montree-dev/devguard/scanner:main \
            crane digest --tarball="${{ inputs.image }}" > image-digest.txt
      - name: Push image to registry
        if: inputs.push-image == 'true'
        run: |-
          docker load -i ${{ inputs.image }}
          docker push ${{ inputs.image-tag }}
      - name: Upload oci-image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: ${{ inputs.image }}
        if: inputs.push-image != 'true'
      - name: Upload image-digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: image-digest.txt
      - name: In-Toto Provenance record stop
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        with:
          args: devguard-scanner intoto stop --step=build --products=image-digest.txt --token=${{ secrets.devguard-token }} --apiUrl=${{ inputs.devguard-api-url }} --assetName=${{ inputs.devguard-asset-name }} --supplyChainId=${{ github.sha }} --generateSlsaProvenance --defaultRef=${{ github.event.repository.default_branch }} --isTag=${{ github.ref_type == 'tag' }} --ref=${{ github.ref_name }}
        continue-on-error: true
      - name: Upload SLSA Provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: build.provenance.json
          name: build${{ inputs.image-suffix }}.provenance.json
    name: devguard:build-oci-image-w-docker
