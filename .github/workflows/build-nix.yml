on:
  workflow_call:
    inputs:
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      image-name:
        description: Full OCI image name without tag (e.g. ghcr.io/org/repo/image)
        type: string
        required: false
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
      nix-target:
        description: Flake output attribute to build (e.g. devguardOCI). Must be a dockerTools.buildLayeredImage derivation.
        type: string
        required: false
      nix-cache-substituter:
        description: Nix binary cache substituter URL. Set to empty string to disable.
        type: string
        required: false
        default: ""
      nix-cache-public-key:
        description: Trusted public key for the Nix binary cache.
        type: string
        required: false
        default: ""
      nix-cache-s3-endpoint:
        description: S3 API endpoint for pushing to the cache (e.g. s3.garage.l3montree.cloud). Leave empty to skip pushing.
        type: string
        required: false
        default: ""
      nix-cache-s3-bucket:
        description: S3 bucket name for the cache.
        type: string
        required: false
        default: ""
      nix-cache-region:
        description: S3 region for the cache bucket.
        type: string
        required: false
        default: ""
      nix-version:
        description: Pinned Nix version for deterministic builds (must match other CI systems)
        type: string
        required: false
        default: 2.34.4
      architecture:
        description: Target architecture (e.g., amd64 or arm64)
        type: string
        required: false
        default: ""
      runner:
        description: GitHub Actions runner label to use (e.g. ubuntu-latest, ubuntu-24.04-arm)
        type: string
        required: false
        default: ubuntu-latest
      allow-failure:
        description: Whether the job is allowed to fail without stopping the pipeline
        type: boolean
        required: false
        default: false
      commit-ref:
        description: Current commit reference
        type: string
        required: false
        default: ${{ github.ref_name }}
      is-tag:
        description: Is the current commit a tag
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
    secrets:
      devguard-token:
        description: DevGuard API token
        required: false
      nix-cache-secret-key:
        description: Nix binary cache signing secret key.
        required: false
      nix-cache-aws-access-key-id:
        description: AWS access key ID for the Nix S3 cache.
        required: false
      nix-cache-aws-secret-access-key:
        description: AWS secret access key for the Nix S3 cache.
        required: false
jobs:
  devguard_build_nix:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          install_url: ${{ format('https://releases.nixos.org/nix/nix-{0}/install', inputs.nix-version) }}
          extra_nix_config: |-
            experimental-features = nix-command flakes
            ${{ inputs.nix-cache-substituter != '' && format('substituters = https://cache.nixos.org {0}', inputs.nix-cache-substituter) || '' }}
            ${{ inputs.nix-cache-public-key != '' && format('trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= {0}', inputs.nix-cache-public-key) || '' }}
      - name: Install crane and devguard-scanner
        run: nix profile install nixpkgs#crane github:l3montree-dev/devguard#devguardScanner
      - name: In-Toto Provenance record start
        env:
          DEVGUARD_API_URL: ${{ inputs.devguard-api-url }}
          DEVGUARD_ASSET_NAME: ${{ inputs.devguard-asset-name }}
        run: devguard-scanner intoto start --step=build --token=${{ secrets.devguard-token }} --apiUrl=$DEVGUARD_API_URL --assetName=$DEVGUARD_ASSET_NAME --supplyChainId=$GITHUB_SHA
        continue-on-error: true
      - name: Write Nix cache secret key
        if: inputs.nix-cache-s3-endpoint != ''
        run: echo "${{ secrets.nix-cache-secret-key }}" > /tmp/nix-cache-priv-key.pem
      - name: Build OCI image with Nix
        env:
          NIX_TARGET: ${{ inputs.nix-target }}
        run: nix build .#$NIX_TARGET
      - name: Push build results to Nix cache
        if: inputs.nix-cache-s3-endpoint != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.nix-cache-aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.nix-cache-aws-secret-access-key }}
          NIX_CACHE_S3_BUCKET: ${{ inputs.nix-cache-s3-bucket }}
          NIX_CACHE_S3_ENDPOINT: ${{ inputs.nix-cache-s3-endpoint }}
          NIX_CACHE_REGION: ${{ inputs.nix-cache-region }}
        run: |-
          mkdir -p ~/.aws
          echo "[profile nix-cache]" >> ~/.aws/config
          echo "s3.addressing_style = path" >> ~/.aws/config
          nix copy $(nix-store -qR $(readlink result)) \
            --to "s3://$NIX_CACHE_S3_BUCKET?endpoint=$NIX_CACHE_S3_ENDPOINT&region=$NIX_CACHE_REGION&scheme=https&profile=nix-cache&secret-key=/tmp/nix-cache-priv-key.pem" || true
      - name: Prepare image.tar
        run: gunzip -c "$(readlink -f result)" > image.tar
      - name: Get image digest
        run: crane digest --tarball=image.tar > image-digest.txt
      - name: Upload oci-image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: image.tar
      - name: Set image tag
        id: set-image-tag
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          ARCHITECTURE: ${{ inputs.architecture }}
        run: |-
          devguard-scanner generate-tag \
            --imagePath="$IMAGE_NAME" \
            --ref="$GITHUB_REF_NAME" \
            --isTag=${{ inputs.is-tag }} \
            --architecture="$ARCHITECTURE" \
            >> image-tag-env.txt
          IMAGE_TAG=$(grep '^IMAGE_TAG=' image-tag-env.txt | cut -d= -f2-)
          ARTIFACT_NAME=$(grep '^ARTIFACT_NAME=' image-tag-env.txt | cut -d= -f2-)
          ARTIFACT_URL_ENCODED=$(grep '^ARTIFACT_URL_ENCODED=' image-tag-env.txt | cut -d= -f2-)
          echo "$IMAGE_TAG" > image-tag.txt
          echo "$ARTIFACT_NAME" > artifact-purl.txt
          echo "$ARTIFACT_URL_ENCODED" > artifact-purl-safe.txt
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
      - name: Upload image-tag artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: image-tag.txt
      - name: Upload image-digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: image-digest${{ inputs.image-suffix }}
          path: image-digest.txt
      - name: Upload artifact-purl artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: artifact-purl${{ inputs.image-suffix }}
          path: artifact-purl.txt
      - name: Upload artifact-purl-safe artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: artifact-purl-safe${{ inputs.image-suffix }}
          path: artifact-purl-safe.txt
      - name: In-Toto Provenance record stop
        env:
          DEVGUARD_API_URL: ${{ inputs.devguard-api-url }}
          DEVGUARD_ASSET_NAME: ${{ inputs.devguard-asset-name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: devguard-scanner intoto stop --step=build --products=image-digest.txt --products=image-tag.txt --token=${{ secrets.devguard-token }} --apiUrl=$DEVGUARD_API_URL --assetName=$DEVGUARD_ASSET_NAME --supplyChainId=$GITHUB_SHA --generateSlsaProvenance --defaultRef=$DEFAULT_BRANCH --isTag=${{ inputs.is-tag }} --ref=${{ inputs.commit-ref }}
        continue-on-error: true
      - name: Upload SLSA Provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: build.provenance.json
          name: build${{ inputs.image-suffix }}.provenance.json
    name: devguard:build-nix
