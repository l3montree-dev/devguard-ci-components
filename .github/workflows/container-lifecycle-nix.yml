on:
  workflow_call:
    inputs:
      nix-target:
        description: Nix flake build target (e.g. devguardOCI)
        type: string
        required: true
      image-name:
        description: Full OCI image name without tag
        type: string
        required: true
      asset-name:
        description: DevGuard asset name for supply chain tracking
        type: string
        required: true
      api-url:
        type: string
        required: false
        default: https://api.devguard.org
        description: URL of the DevGuard API
      web-ui:
        type: string
        required: false
        default: https://app.devguard.org
        description: URL of the DevGuard Web UI
      artifact-name-suffix:
        description: Suffix appended to artifact names
        type: string
        required: false
        default: ""
      should-deploy:
        description: Whether to push the image to the container registry
        type: boolean
        required: false
        default: true
      fail-on-risk:
        description: Fail if risk level reaches this threshold
        type: string
        required: false
        default: ""
      fail-on-cvss:
        description: Fail if CVSS score reaches this threshold
        type: string
        required: false
        default: ""
      nix-cache-substituter:
        description: Nix binary cache substituter URL
        type: string
        required: false
        default: ""
      nix-cache-public-key:
        description: Trusted public key for the Nix binary cache
        type: string
        required: false
        default: ""
      nix-cache-s3-endpoint:
        description: S3 API endpoint for pushing to the Nix cache
        type: string
        required: false
        default: ""
      nix-cache-s3-bucket:
        description: S3 bucket name for the Nix cache
        type: string
        required: false
        default: nix
      nix-cache-region:
        description: S3 region for the Nix cache bucket
        type: string
        required: false
        default: garage
      nix-version:
        description: Pinned Nix version
        type: string
        required: false
        default: 2.34.4
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
      nix-cache-secret-key:
        description: Nix binary cache signing secret key
        required: false
      nix-cache-aws-access-key-id:
        description: AWS access key ID for the Nix S3 cache
        required: false
      nix-cache-aws-secret-access-key:
        description: AWS secret access key for the Nix S3 cache
        required: false
permissions:
  contents: read
  packages: write
jobs:
  build-image:
    uses: ./.github/workflows/build-nix.yml
    permissions:
      contents: read
    with:
      nix-target: ${{ inputs.nix-target }}
      image-name: ${{ inputs.image-name }}
      image-suffix: ${{ inputs.artifact-name-suffix }}
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-api-url: ${{ inputs.api-url }}
      nix-cache-substituter: ${{ inputs.nix-cache-substituter }}
      nix-cache-public-key: ${{ inputs.nix-cache-public-key }}
      nix-cache-s3-endpoint: ${{ inputs.nix-cache-s3-endpoint }}
      nix-cache-s3-bucket: ${{ inputs.nix-cache-s3-bucket }}
      nix-cache-region: ${{ inputs.nix-cache-region }}
      nix-version: ${{ inputs.nix-version }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
      nix-cache-secret-key: ${{ secrets.nix-cache-secret-key }}
      nix-cache-aws-access-key-id: ${{ secrets.nix-cache-aws-access-key-id }}
      nix-cache-aws-secret-access-key: ${{ secrets.nix-cache-aws-secret-access-key }}
  container-scanning:
    needs:
      - build-image
    uses: ./.github/workflows/container-scanning.yml
    permissions:
      contents: read
      security-events: write
    with:
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-api-url: ${{ inputs.api-url }}
      devguard-web-ui: ${{ inputs.web-ui }}
      fail-on-cvss: ${{ inputs.fail-on-cvss }}
      fail-on-risk: ${{ inputs.fail-on-risk }}
      image-suffix: ${{ inputs.artifact-name-suffix }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
  deploy:
    if: ${{ inputs.should-deploy }}
    needs:
      - build-image
      - container-scanning
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      packages: write
    with:
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-api-url: ${{ inputs.api-url }}
      image-suffix: ${{ inputs.artifact-name-suffix }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
  sign:
    if: ${{ inputs.should-deploy }}
    needs:
      - build-image
      - container-scanning
      - deploy
    uses: ./.github/workflows/sign.yml
    permissions:
      contents: read
      packages: write
    with:
      devguard-asset-name: ${{ inputs.asset-name }}
      devguard-api-url: ${{ inputs.api-url }}
      image-suffix: ${{ inputs.artifact-name-suffix }}
    secrets:
      devguard-token: ${{ secrets.devguard-token }}
  attest:
