# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      upstream-version:
        description: Upstream version to use for tag generation. If not provided, the job will ignore this parameter.
        type: string
        required: false
        default: "0"
      create-root-manifest:
        description: Whether to also create a manifest without the branch ref in the tag.
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
    secrets: {}
jobs:
  devguard_create_manifest_multi_arch:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Download amd64 generate-tag env
        uses: actions/download-artifact@v4
        with:
          name: generate-tag-env${{ inputs.image-suffix }}-amd64
          path: .
      - name: Download arm64 generate-tag env
        uses: actions/download-artifact@v4
        with:
          name: generate-tag-env${{ inputs.image-suffix }}-arm64
          path: .
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create and push multi-arch manifest
        run: |-
          AMD64_TAG=$(grep '^IMAGE_TAG=' generate_tag_${{ inputs.upstream-version }}_amd64.env | cut -d'=' -f2)
          ARM64_TAG=$(grep '^IMAGE_TAG=' generate_tag_${{ inputs.upstream-version }}_arm64.env | cut -d'=' -f2)

          if [ -z "$AMD64_TAG" ] || [ -z "$ARM64_TAG" ]; then
            echo "ERROR: Could not read arch-specific IMAGE_TAG from generate_tag env files"
            exit 1
          fi

          echo "amd64: $AMD64_TAG"
          echo "arm64: $ARM64_TAG"

          BASE_TAG="${AMD64_TAG%-amd64}"

          echo "Creating manifest: $BASE_TAG -> $AMD64_TAG + $ARM64_TAG"
          docker manifest create "$BASE_TAG" "$AMD64_TAG" "$ARM64_TAG"
          docker manifest push "$BASE_TAG"

          if [ "${{ inputs.create-root-manifest }}" = "true" ]; then
            ROOT_TAG=$(echo "$BASE_TAG" | sed "s/-${GITHUB_REF_NAME}//")
            if [ "$ROOT_TAG" != "$BASE_TAG" ]; then
              echo "Creating root manifest: $ROOT_TAG"
              docker manifest create "$ROOT_TAG" "$AMD64_TAG" "$ARM64_TAG"
              docker manifest push "$ROOT_TAG"
            fi
          fi
    name: devguard:create-manifest-multi-arch
