# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      upstream-version:
        description: Upstream version to use for tag generation. If not provided, the job will ignore this parameter.
        type: string
        required: false
        default: "0"
      create-root-manifest:
        description: Whether to also create a manifest without the branch ref in the tag.
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
      registry:
        description: Container registry URL
        type: string
        required: false
        default: ghcr.io
      registry-user:
        description: Container registry username
        type: string
        required: false
        default: ${{ github.actor }}
    secrets:
      registry-password:
        description: Registry password for pulling the image.
        required: false
jobs:
  devguard_create_manifest_multi_arch:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Resolve registry password
        run: |-
          if [ -n "$SECRET_PASSWORD" ]; then
            echo "REGISTRY_PASSWORD=$SECRET_PASSWORD" >> $GITHUB_ENV
          else
            echo "REGISTRY_PASSWORD=${{ github.token }}" >> $GITHUB_ENV
          fi
        env:
          SECRET_PASSWORD: ${{ secrets.registry-password }}
      - name: Download amd64 image-tag
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}-amd64
          path: amd64
      - name: Download arm64 image-tag
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}-arm64
          path: arm64
      - name: Log in to ghcr.io
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-user }}
          password: ${{ env.REGISTRY_PASSWORD }}
      - name: Create and push multi-arch manifest
        env:
          CREATE_ROOT_MANIFEST: ${{ inputs.create-root-manifest }}
        run: |-
          AMD64_TAG=$(cat amd64/image-tag.txt)
          ARM64_TAG=$(cat arm64/image-tag.txt)

          if [ -z "$AMD64_TAG" ] || [ -z "$ARM64_TAG" ]; then
            echo "ERROR: Could not read arch-specific IMAGE_TAG from image-tag artifacts"
            exit 1
          fi

          echo "amd64: $AMD64_TAG"
          echo "arm64: $ARM64_TAG"

          BASE_TAG="${AMD64_TAG%-amd64}"

          echo "Creating manifest: $BASE_TAG -> $AMD64_TAG + $ARM64_TAG"
          docker manifest create "$BASE_TAG" "$AMD64_TAG" "$ARM64_TAG"
          docker manifest push "$BASE_TAG"

          if [ "$CREATE_ROOT_MANIFEST" = "true" ]; then
            ROOT_TAG=$(echo "$BASE_TAG" | sed "s/-${GITHUB_REF_NAME}//")
            if [ "$ROOT_TAG" != "$BASE_TAG" ]; then
              echo "Creating root manifest: $ROOT_TAG"
              docker manifest create "$ROOT_TAG" "$AMD64_TAG" "$ARM64_TAG"
              docker manifest push "$ROOT_TAG"
            fi
          fi
    name: devguard:create-manifest-multi-arch
