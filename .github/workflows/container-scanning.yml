on:
  workflow_call:
    inputs:
      devguard-api-url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard-asset-name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      devguard-artifact-name:
        description: The name of the artifact (in purl format e.g., pkg:oci/k8s-tools)
        type: string
        required: false
        default: ""
      devguard-web-ui:
        description: The DevGuard Web-UI Instance URL
        type: string
        required: false
        default: https://app.devguard.org
      devguard-origin:
        description: "Origin of the resource/information (how it was generated). Examples: 'source-scanning', 'container-scanning', 'base-image'. (default 'DEFAULT')"
        type: string
        required: false
        default: DEFAULT
      allow-failure:
        description: Whether the job is allowed to fail without stopping the pipeline
        type: boolean
        required: false
        default: false
      image-tar-path:
        description: The path to the local image tar file to scan (e.g. image.tar). Used when image_tag is empty.
        type: string
        required: false
        default: image.tar
      fetch-image-from-registry:
        description: If the artifact size is too big for your GitLab instance and the image was pushed directly to the registry during build (small_artifact_registry=true), set this to true to pull the image from the registry for scanning instead of using a local tar artifact.
        type: string
        required: false
        default: "false"
      image-suffix:
        description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
        type: string
        required: false
        default: default
      default-ref:
        description: Default branch reference
        type: string
        required: false
        default: ${{ github.event.repository.default_branch }}
      commit-ref:
        description: Current commit reference
        type: string
        required: false
        default: ${{ github.ref_name }}
      is-tag:
        description: Is the current commit a tag
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
      fail-on-risk:
        description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
        type: string
        required: false
        default: critical
      fail-on-cvss:
        description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
        type: string
        required: false
        default: critical
      ignore-external-references:
        description: Whether to ignore external references in any discovered attestations. This is useful when you are using this component to scan your own built images which have a valid vex attestation.
        type: string
        required: false
        default: "false"
      ignore-upstream-attestations:
        description: Whether to ignore upstream attestations when scanning the image.
        type: string
        required: false
        default: "false"
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
jobs:
  devguard_container_scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: true
      - name: Download Docker image artifact (created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: oci-image${{ inputs.image-suffix }}
          path: .
        if: ${{ inputs.fetch-image-from-registry == 'false' }}
      - name: Download image-tag artifact (created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: image-tag${{ inputs.image-suffix }}
          path: .
      - name: Download artifact purl (created by build-image)
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: artifact-purl${{ inputs.image-suffix }}
        if: ${{ inputs.devguard-artifact-name == '' }}
      - name: Resolve artifact name
        run: |-
          if [ -z "${{ inputs.devguard-artifact-name }}" ] && [ -f artifact-purl.txt ]; then
            echo "ARTIFACT_NAME=$(cat artifact-purl.txt)" >> $GITHUB_ENV
          else
            echo "ARTIFACT_NAME=${{ inputs.devguard-artifact-name }}" >> $GITHUB_ENV
          fi
      - name: Setup crane
        uses: imjasonh/setup-crane@cacf28038427f6fb033ef9022f6a2281f23cb3f2
      - name: Download OCI Image from registry
        run: crane pull $(cat image-tag.txt) image.tar
        if: ${{ inputs.fetch-image-from-registry == 'true' }}
      - name: DevGuard Container-Scanning
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        continue-on-error: ${{ inputs.allow-failure }}
        with:
          args: devguard-scanner container-scanning --origin="${{ inputs.devguard-origin }}" --assetName="${{ inputs.devguard-asset-name }}" --apiUrl="${{ inputs.devguard-api-url }}" --token="${{ secrets.devguard-token }}" --path="${{ inputs.image-tar-path }}" --defaultRef="${{ inputs.default-ref }}" --ref="${{ inputs.commit-ref }}" --isTag="${{ inputs.is-tag }}" --artifactName="${{ env.ARTIFACT_NAME }}" --webUI="${{ inputs.devguard-web-ui }}" --failOnRisk="${{ inputs.fail-on-risk }}" --failOnCVSS="${{ inputs.fail-on-cvss }}" --ignoreExternalReferences=${{ inputs.ignore-external-references }} --ignoreUpstreamAttestations=${{ inputs.ignore-upstream-attestations }}
        env:
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
    name: devguard:container-scanning
