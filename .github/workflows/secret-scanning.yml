# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      devguard_api_url:
        description: The url of the API to send the scan request to (default 'https://api.devguard.org')
        type: string
        required: false
        default: https://api.devguard.org
      devguard_asset_name:
        description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
        type: string
        required: false
        default: $DEVGUARD_ASSET_NAME
      devguard_web_ui:
        description: The DevGuard Web-UI Instance URL
        type: string
        required: false
        default: https://app.devguard.org
      allow_failure:
        description: "Whether the job should be marked as failed or successful when open code risks are detected. (default: false, meaning the job will fail if any open code risk is found)"
        type: boolean
        required: false
        default: false
      path:
        description: The path to the git repository to scan
        type: string
        required: false
        default: /github/workspace
      default_ref:
        description: Default branch reference
        type: string
        required: false
        default: ${{ github.event.repository.default_branch }}
      commit_ref:
        description: Current commit reference
        type: string
        required: false
        default: ${{ github.ref_name }}
      is_tag:
        description: Is the current commit a tag
        type: string
        required: false
        default: ${{ github.ref_type == 'tag' }}
    secrets:
      devguard-token:
        description: DevGuard API token
        required: true
jobs:
  devguard:secret-scanning${{ inputs.job_suffix }}:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive
      - name: Run DevGuard Secret Scanning
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        continue-on-error: ${{ inputs.allow_failure }}
        with:
          args: devguard-scanner secret-scanning --assetName="${{ inputs.devguard_asset_name }}" --apiUrl="${{ inputs.devguard_api_url }}" --token="${{ secrets.devguard-token }}" --path="${{ inputs.path }}" --defaultRef="${{ inputs.default_ref }}" --ref="${{ inputs.commit_ref }}" --isTag="${{ inputs.is_tag }}" --webUI=${{ inputs.devguard_web_ui }}
