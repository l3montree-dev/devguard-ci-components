# DevSecOps Workflow Definition
# This workflow is triggered on every push to the repository
name: DevGuard Workflow

on:
  push:

permissions:
  packages: write
  contents: read

jobs:
  zizmor-scanning:
    uses: ./.github/workflows/zizmor-scanning.yml
    with:
      devguard-asset-name: l3montree-cybersecurity/projects/devguard/assets/devguard-ci-components
      devguard-api-url: https://api.main.devguard.org
      devguard-web-ui: https://main.devguard.org
      allow-failure: true
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}
