# This file is automatically generated. Do not edit directly.
on:
  workflow_call:
    inputs:
      registry:
        description: Container registry URL
        type: string
        required: false
        default: ghcr.io
      registry-user:
        description: Registry username. Defaults to github.actor when empty.
        type: string
        required: false
        default: ""
      predicate-type:
        description: The predicate type to discover. If empty, all attestations will be discovered.
        type: string
        required: false
        default: ""
      output:
        description: Output directory for discovered attestations (relative to project root).
        type: string
        required: false
        default: .
      path:
        description: Path to the Containerfile/Dockerfile
        type: string
        required: false
        default: Dockerfile
      allow-failure:
        description: Whether the job is allowed to fail without stopping the pipeline
        type: boolean
        required: false
        default: true
    secrets:
      registry-password:
        description: Registry password for pulling the base image.
        required: false
jobs:
  devguard_discover_baseimage_attestations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Discover base image attestations
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main
        continue-on-error: ${{ inputs.allow-failure }}
        with:
          args: devguard-scanner login -u ${{ inputs.registry-user || github.actor }} -p ${{ secrets.registry-password || github.token }} ${{ inputs.registry }} && devguard-scanner discover-baseimage-attestations --output "${{ inputs.output }}" --predicateType "${{ inputs.predicate-type }}" "${{ inputs.path }}"
      - name: Upload attestation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: baseimage-attestations
          path: ${{ inputs.output }}/attestation-*.json
        if: always()
    name: devguard:discover-baseimage-attestations
