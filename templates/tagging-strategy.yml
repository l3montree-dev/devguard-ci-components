spec:
  inputs:
    image_type:
      default: "runtime"
      description: "Type of image: 'runtime' or 'composed'"
    upstream_version:
      default: ""
      description: "For runtime images: upstream version (e.g., 24.2.0). For composed images: leave empty."
    architecture:
      default:
        - "amd64"
      type: array
      description: "Target architectures (e.g., amd64, arm64)"
    stage:
      default: "pre-build"
      description: "CI stage to run this job in"
---
devguard:generate_tag$[[ inputs.job_suffix ]]:
  stage: $[[ inputs.stage ]]
  image: bash:latest
  parallel:
    matrix:
      - ARCHITECTURE: $[[ inputs.architecture ]]
  script:
    - |
      #!/bin/bash
      set -euo pipefail
      IMAGE_TYPE="${IMAGE_TYPE:-$[[ inputs.image_type ]]}"
      UPSTREAM_VERSION="${UPSTREAM_VERSION:-$[[ inputs.upstream_version ]]}"
      CI_COMMIT_TAG="${CI_COMMIT_TAG:-}"
      CI_COMMIT_REF_NAME="${CI_COMMIT_REF_NAME:-unknown}"
      ARCHITECTURE_UPPER=$(echo "${ARCHITECTURE}" | tr '[:lower:]' '[:upper:]')

      echo "=========================================="
      echo "Image Tag Generator"
      echo "=========================================="
      echo "Image Type: ${IMAGE_TYPE}"
      echo "Architecture: ${ARCHITECTURE}"
      echo "Git Reference: ${CI_COMMIT_REF_NAME}"
      echo "Is Tag: ${CI_COMMIT_TAG:-false}"
      echo "=========================================="
      echo ""

      generate_development_tag() {
        local branch_name="$1"
        local arch="$2"
        local subject_version="$3"

        # Sanitize branch name (replace / with -)
        local sanitized_branch=$(echo "${branch_name}" | sed 's/\//-/g')

        # Build development tag
        if [[ -n "${subject_version}" ]]; then
          echo "${sanitized_branch}-${subject_version}-${arch}"
        else
          echo "${sanitized_branch}-${arch}"
        fi
      }

      generate_runtime_tags() {
        local upstream_version="$1"
        local arch="$2"
        local timestamp=$(date +%s)

        local base_tag="${upstream_version}-${arch}"
        local timestamped_tag="${base_tag}+oc-${timestamp}"
        local latest_tag="${base_tag}+oc-latest"

        echo "${base_tag}"
        echo "${timestamped_tag}"
        echo "${latest_tag}"
      }

      generate_composed_tags() {
        local version="$1"
        local arch="$2"
        # Validate semantic version format
        if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          echo "Error: Invalid semantic version format: ${version}" >&2
          echo "Expected format: MAJOR.MINOR.PATCH (e.g., 1.0.0)" >&2
          exit 1
        fi

        # Extract version components
        local major="${BASH_REMATCH[1]}"
        local minor="${BASH_REMATCH[2]}"

        local full_tag="${version}-${arch}"
        local major_minor_tag="${major}.${minor}-${arch}"
        local major_tag="${major}-${arch}"

        echo "${full_tag}"
        echo "${major_minor_tag}"
        echo "${major_tag}"
      }

      # Check if this is a development build (not triggered by a Git tag)
      if [[ -z "${CI_COMMIT_TAG}" ]]; then
        echo "Development build detected" >&2
        echo "" >&2
        # Determine subject version based on image type
        if [[ "${IMAGE_TYPE}" == "runtime" ]]; then
          SUBJECT_VERSION="${UPSTREAM_VERSION}"
        else
          SUBJECT_VERSION=""
        fi

        TAG=$(generate_development_tag "${CI_COMMIT_REF_NAME}" "${ARCHITECTURE}" "${SUBJECT_VERSION}")
        echo "Generated tag for ${ARCHITECTURE}: ${TAG}" >&2
        echo "IMAGE_TAG_${ARCHITECTURE_UPPER}=${TAG}" >> generate_tag.env
      else
        # Production builds (triggered by Git tags)
        echo "Production build detected (Git tag: ${CI_COMMIT_TAG})" >&2
        echo "" >&2

        case "${IMAGE_TYPE}" in
          runtime)
            if [[ -z "${UPSTREAM_VERSION}" ]]; then
              echo "Error: UPSTREAM_VERSION must be set for runtime images" >&2
              exit 1
            fi

            TAGS=$(generate_runtime_tags "${UPSTREAM_VERSION}" "${ARCHITECTURE}")
            echo "Generated tags for ${ARCHITECTURE}:" >&2
            echo "${TAGS}" | sed 's/^/  - /' >&2

            # Export all tags
            PRIMARY_TAG=$(echo "${TAGS}" | head -n 1)
            echo "IMAGE_TAG_${ARCHITECTURE_UPPER}=${PRIMARY_TAG}" >> generate_tag.env
            echo "IMAGE_TAGS_${ARCHITECTURE_UPPER}<<EOF" >> generate_tag.env
            echo "${TAGS}" >> generate_tag.env
            echo "EOF" >> generate_tag.env
            ;;

          composed)
            SEMANTIC_VERSION="${CI_COMMIT_TAG}"
            echo "Using Git tag as semantic version: ${SEMANTIC_VERSION}" >&2
            echo "" >&2

            TAGS=$(generate_composed_tags "${SEMANTIC_VERSION}" "${ARCHITECTURE}")
            echo "Generated tags for ${ARCHITECTURE}:" >&2
            echo "${TAGS}" | sed 's/^/  - /' >&2

            # Export all tags
            PRIMARY_TAG=$(echo "${TAGS}" | head -n 1)
            echo "IMAGE_TAG_${ARCHITECTURE_UPPER}=${PRIMARY_TAG}" >> generate_tag.env
            echo "IMAGE_TAGS_${ARCHITECTURE_UPPER}<<EOF" >> generate_tag.env
            echo "${TAGS}" >> generate_tag.env
            echo "EOF" >> generate_tag.env
            ;;

          *)
            echo "Error: IMAGE_TYPE must be either 'runtime' or 'composed'" >&2
            exit 1
            ;;
        esac
      fi

  artifacts:
    reports:
      dotenv: generate_tag.env
