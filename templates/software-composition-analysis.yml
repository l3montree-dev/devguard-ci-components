spec:
  inputs:
    devguard_api_url:
      description: "The DevGuard API URL"
      default: "https://api.devguard.org"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard API token (your private key)"
      default: "$DEVGUARD_TOKEN"
    devguard_artifact_name:
      default: "source"
      description: "The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If not provided, will use the generated PURL from the built image."
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard Web-UI Instance URL"
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
    path:
      default: "$CI_PROJECT_DIR"
      description: "The path to the git repository to scan"
    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "The default branch reference"
    ref: 
      default: "$CI_COMMIT_REF_NAME"
      description: "The branch or tag reference to scan"
    stage:
      default: "test"
      description: "The stage where the scan is executed"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    pull_policy:
      default: "if-not-present"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
    job_suffix:
      description: "A suffix to append to the job name (usefull when using the component several times in one pipeline)"
      default: "default"
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "clone"
    git_depth:
      description: "The Git depth to use for the job"
      default: 0
---
devguard:software_composition_analysis_$[[ inputs.job_suffix ]]:
  stage: "$[[ inputs.stage ]]"
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]
    GIT_DEPTH: $[[ inputs.git_depth ]]
  tags:
    - $[[ inputs.runner_tags ]]
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:v0.18.9@sha256:8b0829c908a39d54bd6f4e0a503d5e74b6fca9ae36d9434d7012974b830785e6
    pull_policy: "$[[ inputs.pull_policy ]]"
  script:
    - echo "Running DevGuard SCA (based on the Trivy Project)..."
    - |
      # Determine artifact name: use PURL if no artifact_name provided, otherwise use provided name
      if [ -z "$[[ inputs.devguard_artifact_name ]]" ] && [ -f artifact-purl.txt ]; then
        ARTIFACT_NAME=$(cat artifact-purl.txt)
        echo "Using PURL as artifact name: $ARTIFACT_NAME"
      else
        ARTIFACT_NAME="$[[ inputs.devguard_artifact_name ]]"
        echo "Using provided artifact name: $ARTIFACT_NAME"
      fi
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "Running on a tag? $IS_TAG"
    - devguard-scanner sca --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --path="$[[ inputs.path ]]" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.ref ]]" --isTag="$IS_TAG" --webUI=$[[ inputs.devguard_web_ui ]] --artifactName="$ARTIFACT_NAME" --failOnRisk=$[[ inputs.fail_on_risk ]] --failOnCVSS=$[[ inputs.fail_on_cvss ]]
