spec:
  inputs:
    api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The DevGuard asset name"
    token:
      description: "The DevGuard token"
    scan_stage:
      default: "test"
      description: "The stage where the scan is run"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    artifact_name:
      description: "The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If not provided, will use the generated PURL from the built image."  
---
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

devguard:software-composition-analysis:
  stage: "$[[ inputs.scan_stage ]]"
  tags:
    - $[[ inputs.runner_tags ]]
  dependencies: []
  needs: []
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"
  script:
    - echo "Running DevGuard SCA..."
    - |
      # Determine artifact name: use PURL if no artifact_name provided, otherwise use provided name
      if [ -z "$[[ inputs.artifact_name ]]" ] && [ -f artifact-purl.txt ]; then
        ARTIFACT_NAME=$(cat artifact-purl.txt)
        echo "Using PURL as artifact name: $ARTIFACT_NAME"
      else
        ARTIFACT_NAME="$[[ inputs.artifact_name ]]"
        echo "Using provided artifact name: $ARTIFACT_NAME"
      fi
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "IS_TAG - $IS_TAG"
    - devguard-scanner sca --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --path="$CI_PROJECT_DIR" --defaultRef="$CI_DEFAULT_BRANCH" --ref="$CI_COMMIT_REF_NAME" --isTag="$IS_TAG" --artifactName="$ARTIFACT_NAME"
