spec:
  inputs:
    build_stage:
      default: "build"
      description: "The stage where the build is run"
    build_args:
      default: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile"
      description: "The build arguments to pass to the Kaniko build command"
    push_image:
      default: "false"
      description: "If your GitLab instance has small artifact size limits, set this to true to push the image to the registry instead of uploading artifacts."
    artifact_name:
      default: ""
      description: "The name of the artifact you are building. Leave empty to use the generated PURL from the built image."
    token:
      description: "The token to authenticate against the DevGuard API"
    api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The name of the asset"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    image_suffix:
      default: "default"
      description: "Suffix for the image name (e.g. 'web'). Leave empty for no suffix."
---
variables:
  GIT_STRATEGY: clone

devguard:build-image:$[[ inputs.image_suffix ]]:
  needs: []
  dependencies: []
  stage: "$[[ inputs.build_stage ]]"
  tags:
    - $[[ inputs.runner_tags ]]
  image:
    name: registry.gitlab.com/l3montree/devguard/kaniko-crane:kaniko-v1.26.0-customized-busybox-jq@sha256:451d56ef53ebf75808bf5f92dae58275d09d5eb8e99468399c3f4440f0c02167
    entrypoint: [""]
  variables:
    IMAGE_SUFFIX: "$[[ inputs.image_suffix ]]"
  before_script:
    - apk add jq
    - echo "Uses Kaniko to build Docker images securely without requiring privileged access (docker in docker needs privileged access).\n The artifacts are not pushed to the registry until they have undergone security scanning to ensure vulnerabilities are addressed before deployment - therefore they are stored as artifacts rather than pushed to the registry."
    - |
        /devguard-scanner intoto start --step=build --ignore=image-digest.txt --ignore=image-tag.txt --ignore=artifact-purl.txt --token="$[[ inputs.token ]]" --apiUrl="$[[ inputs.api_url ]]" --assetName="$[[ inputs.asset_name ]]" --supplyChainId="${CI_COMMIT_SHA}"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        # Set IMAGE_TAG if the pipeline was triggered by a tag
        if [ "$IMAGE_SUFFIX" != "" && "$IMAGE_SUFFIX" != "default" ]; then
          echo "$CI_REGISTRY_IMAGE/$IMAGE_SUFFIX:$CI_COMMIT_TAG" > image-tag.txt
        else
          echo "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" > image-tag.txt
        fi

      else
        # Set IMAGE_TAG if the pipeline was triggered by a push to main
        branch=$(echo $CI_COMMIT_REF_NAME | sed 's/\//-/g')
        sha=${CI_COMMIT_SHORT_SHA}
        ts=$(date +%s)
        if [ "$IMAGE_SUFFIX" != "" && "$IMAGE_SUFFIX" != "default" ]; then
          echo "$CI_REGISTRY_IMAGE/$IMAGE_SUFFIX:${branch}-${sha}-${ts}" > image-tag.txt
        else
          echo "$CI_REGISTRY_IMAGE:${branch}-${sha}-${ts}" > image-tag.txt
        fi
      fi
    - |
      # Generate PURL from OCI image for artifact name
      IMAGE_TAG=$(cat image-tag.txt)
      echo "Image tag: $IMAGE_TAG"
      
      # Parse registry, namespace, name, and version
      # Example: registry.gitlab.com/namespace/project/suffix:version
      REGISTRY_AND_IMAGE=${IMAGE_TAG%:*}
      VERSION=${IMAGE_TAG##*:}
            
      # Extract namespace/name (everything after registry)
      NAMESPACE_AND_NAME=${REGISTRY_AND_IMAGE#*/}

      # Extract name (without namespace)
      NAME=${NAMESPACE_AND_NAME##*/}
      
      # URL encode registry for repository_url parameter
      REPOSITORY_URL="$REGISTRY_AND_IMAGE"
      
      # Generate PURL: pkg:oci/name?repository_url=registry
      PURL="pkg:oci/$NAME?repository_url=$REPOSITORY_URL"
      
      echo "Generated PURL: $PURL"
      echo "$PURL" > artifact-purl.txt
      
      # Create safe filename version for API calls (replace special chars)
      SAFE_PURL=$(echo -n "$PURL" | jq -s -R -r @uri)
      echo "$SAFE_PURL" > artifact-name-safe.txt
      
      echo "Safe artifact name: $SAFE_PURL"
    # Setting the image tag as env for crane as cat is not present after kaniko runs
    - export FINAL_IMAGE_TAG=$(cat image-tag.txt)
  script:
    - /crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - /kaniko/executor $[[ inputs.build_args ]] --ignore-path=/devguard-scanner --ignore-path=/crane --destination $(cat image-tag.txt) $([[ "$[[ inputs.push_image ]]" == "false" ]] && echo "--no-push --tarPath image.tar")
    
    # kaniko might remove all files after building - thus a second login is necessary.
    - /crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - /crane digest $([[ "$[[ inputs.push_image ]]" == "false" ]] && echo "--tarball=image.tar" || echo $FINAL_IMAGE_TAG) > image-digest.txt

    - |
        echo "Running DevGuard Intoto Build...stopping..."
        /devguard-scanner intoto stop --step=build --products=image-digest.txt --products=image-tag.txt --products=artifact-purl.txt --token="$[[ inputs.token ]]" --apiUrl="$[[ inputs.api_url ]]" --assetName="$[[ inputs.asset_name ]]" --supplyChainId="${CI_COMMIT_SHA}" --generateSlsaProvenance
  artifacts:
    paths:
      - image.tar
      - image-tag.txt
      - image-digest.txt
      - artifact-purl.txt
      - artifact-name-safe.txt
      - build.provenance.json
    when: on_success


