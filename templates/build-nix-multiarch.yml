build_image$[[ inputs.job_suffix ]]:
  stage: build
  parallel:
    matrix:
      - RUNNER_TAG: $[[ inputs.amd64_runner_tag ]]
        NIX_TARGET: $[[ inputs.nix_target_amd64 ]]
        ARCHITECTURE: amd64
      - RUNNER_TAG: $[[ inputs.arm64_runner_tag ]]
        NIX_TARGET: $[[ inputs.nix_target_arm64 ]]
        ARCHITECTURE: arm64
  trigger:
    strategy: depend
    include:
      - remote: https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/build-nix.yml
        inputs:
          devguard_asset_name: $[[ inputs.devguard_asset_name ]]
          devguard_token: $[[ inputs.devguard_token ]]
          devguard_api_url: $[[ inputs.devguard_api_url ]]
          nix_target: ${NIX_TARGET}
          stage: build
          job_suffix: $[[ inputs.job_suffix ]]
          image_suffix: $[[ inputs.image_suffix ]]
          runner_tags:
            - ${RUNNER_TAG}
          nix_cache_substituter: $[[ inputs.nix_cache_substituter ]]
          nix_cache_public_key: $[[ inputs.nix_cache_public_key ]]
          nix_cache_s3_endpoint: $[[ inputs.nix_cache_s3_endpoint ]]
          nix_cache_s3_bucket: $[[ inputs.nix_cache_s3_bucket ]]
          nix_cache_region: $[[ inputs.nix_cache_region ]]
      - remote: https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/container-scanning.yml
        inputs:
          devguard_asset_name: $[[ inputs.devguard_asset_name ]]
          devguard_token: $[[ inputs.devguard_token ]]
          devguard_api_url: $[[ inputs.devguard_api_url ]]
          devguard_web_ui: $[[ inputs.devguard_web_ui ]]
          runner_tags:
            - ${RUNNER_TAG}
          stage: test
          job_suffix: $[[ inputs.job_suffix ]]
          git_strategy: $[[ inputs.git_strategy ]]
          pull_policy: $[[ inputs.pull_policy ]]
          allow_failure: $[[ inputs.allow_failure ]]
          fail_on_risk: $[[ inputs.fail_on_risk ]]
          fail_on_cvss: $[[ inputs.fail_on_cvss ]]
          devguard_artifact_name: $ARTIFACT_NAME
          image_tar_path: image.tar
          needs:
            - devguard:generate_tag$[[ inputs.job_suffix ]]
