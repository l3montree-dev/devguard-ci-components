devguard:push_oci_image$[[ inputs.job_suffix ]]-arm64:
  tags:
    - $[[ inputs.arm64_runner_tag ]]
  stage: oci-image
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]-arm64
    - devguard:build_oci_image$[[ inputs.job_suffix ]]-arm64
    - devguard:container_scanning$[[ inputs.job_suffix ]]-arm64
  dependencies:
    - devguard:generate_tag$[[ inputs.job_suffix ]]-arm64
    - devguard:build_oci_image$[[ inputs.job_suffix ]]-arm64
    - devguard:container_scanning$[[ inputs.job_suffix ]]-arm64
  variables:
    GIT_STRATEGY: none
  image:
    name: registry.gitlab.com/l3montree/devguard/osscontainertools-kaniko-crane:kaniko-v1.27.3-devguard-scanner-v1.3.1@sha256:2966ade3c7d565ae56c48cfa50d5df6e36a5371f4173606eb4de57558186433d
    entrypoint:
      - ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $[[ inputs.disable_job ]] == "true"
      when: never
    - when: on_success
  script: |
    /crane auth login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]

    # Strip any "@sha256:..." digest suffix: the build job exports IMAGE_TAG as
    # "repo:tag@digest", and "crane push" against a tag+digest reference pushes by
    # digest only, never creating the tag that downstream jobs (manifest/sign/attest) need.
    IMAGE_REF="$[[ inputs.image_tag ]]"
    IMAGE_REF="${IMAGE_REF%@*}"

    echo "Image: image-arm64.tar"
    echo "Image Tag: ${IMAGE_REF}"

    /crane push image-arm64.tar "${IMAGE_REF}"

    /devguard-scanner intoto run --step=deploy --materials="image-arm64.tar" --products="" --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]" --supplyChainOutputDigest="${DIGEST}" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.ref ]]" --isTag="$[[ inputs.is_tag ]]"
devguard:sign_oci_image$[[ inputs.job_suffix ]]-arm64:
  tags:
    - $[[ inputs.arm64_runner_tag ]]
  stage: attestation
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]-arm64
    - devguard:push_oci_image$[[ inputs.job_suffix ]]-arm64
  dependencies:
    - devguard:generate_tag$[[ inputs.job_suffix ]]-arm64
    - devguard:push_oci_image$[[ inputs.job_suffix ]]-arm64
  variables:
    GIT_STRATEGY: none
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint:
      - ""
  script:
    - devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
    - devguard-scanner sign --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" "$IMAGE_TAG"
devguard:attest$[[ inputs.job_suffix ]]-arm64:
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint:
      - ""
  tags: $[[ inputs.runner_tags ]]
  stage: attestation
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]-arm64
    - devguard:build_oci_image$[[ inputs.job_suffix ]]-arm64
    - devguard:push_oci_image$[[ inputs.job_suffix ]]-arm64
  variables:
    GIT_STRATEGY: none
  script: |
    echo "Attesting artifacts for $[[ inputs.image ]]"
    echo "Artifact Name: $[[ inputs.devguard_artifact_name ]]"
    echo "Asset Name: $[[ inputs.devguard_asset_name ]]"

    # URL encode artifact name for API calls
    API_ARTIFACT_NAME=$(python3 -c "from urllib.parse import quote; print(quote('$[[ inputs.devguard_artifact_name ]]', safe=''))")
    echo "API Encoded Artifact Name: $API_ARTIFACT_NAME"

    # Slugify the commit ref (replace special characters with hyphens)
    API_COMMIT_REF=$(devguard-scanner slug "$[[ inputs.commit_ref ]]")
    echo "Slugified Commit Ref: $API_COMMIT_REF"

    # Login to registry
    devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]

    echo 'Attestations: $[[ inputs.attestations ]]'

    ATT_JSON_CLEAN=$(echo '$[[ inputs.attestations ]]' \
    | sed 's/:\([a-z_]\+\)=>/"\1":/g' \
    | sed 's/=>/:/g' \
    | sed "s/'/\"/g")

    ATTESTATIONS_JSON=$(echo "$ATT_JSON_CLEAN" | jq . )

    # Process each attestation
    echo "$ATTESTATIONS_JSON" | jq -c '.[]' | while read -r attestation; do
      SOURCE=$(echo "$attestation" | jq -r '.source')
      PREDICATE_TYPE=$(echo "$attestation" | jq -r '.predicate_type')

      echo ""
      echo "========================================"
      echo "Processing attestation with predicate: $PREDICATE_TYPE"
      SOURCE=$(echo "$SOURCE" | envsubst)

      # Check if source is a URL (starts with http:// or https://)
      if [[ "$SOURCE" =~ ^https?:// ]]; then
        # Replace ARTIFACT_NAME placeholder with URL-encoded artifact name
        URL="${SOURCE//ARTIFACT_NAME/$API_ARTIFACT_NAME}"

        # Replace COMMIT_REF placeholder with URL-encoded commit ref
        URL="${URL//COMMIT_REF/$API_COMMIT_REF}"

        # Also handle any environment variable substitution
        URL=$(echo "$URL" | envsubst)

        # Extract filename from URL or use a default
        FILENAME=$(basename "$URL" | cut -d'?' -f1)
        if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
          FILENAME="downloaded-$(echo "$PREDICATE_TYPE" | md5sum | cut -d' ' -f1).json"
        fi

        echo "Downloading from URL: $URL"
        echo "Saving as: $FILENAME"

        devguard-scanner curl "$URL" --token="$[[ inputs.devguard_token ]]" > "/tmp/$FILENAME"
        FILE_PATH="/tmp/$FILENAME"
      else
        # It's a file path
        FILE_PATH="$SOURCE"
        echo "Using local file: $FILE_PATH"
      fi

      # Create attestation
      if [ -f "$FILE_PATH" ]; then
        echo "Creating attestation for $FILE_PATH"
        devguard-scanner attest "$FILE_PATH" \
          --predicateType="$PREDICATE_TYPE" \
          $[[ inputs.image ]] \
          --defaultRef="$[[ inputs.default_ref ]]" \
          --ref="$[[ inputs.commit_ref ]]" \
          --token="$[[ inputs.devguard_token ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --artifactName="$[[ inputs.devguard_artifact_name ]]"
        echo "✓ Attestation created successfully"
      else
        echo "✗ Warning: File $FILE_PATH not found, skipping attestation"
      fi
      echo "========================================"
    done

    echo ""
    echo "All attestations completed"
devguard:create_manifest_multi_arch$[[ inputs.job_suffix ]]:
  stage: attestation
  image: api.devguard.org/docker.io/library/docker:28.5.2@sha256:2a232a42256f70d78e3cc5d2b5d6b3276710a0de0596c145f627ecfae90282ac
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]-amd64
    - devguard:generate_tag$[[ inputs.job_suffix ]]-arm64
    - devguard:push_oci_image$[[ inputs.job_suffix ]]-amd64
    - devguard:push_oci_image$[[ inputs.job_suffix ]]-arm64
  dependencies:
    - devguard:generate_tag$[[ inputs.job_suffix ]]-amd64
    - devguard:generate_tag$[[ inputs.job_suffix ]]-arm64
    - devguard:push_oci_image$[[ inputs.job_suffix ]]-amd64
    - devguard:push_oci_image$[[ inputs.job_suffix ]]-arm64
  before_script:
    - apk add --no-cache bash
    - mkdir -p ~/.docker
    - echo '{"experimental":"enabled"}' > ~/.docker/config.json
  script:
    - |-
      docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD

      AMD64_TAG=$(grep '^IMAGE_TAG=' ./generate_tag_$[[ inputs.upstream_version ]]_amd64.env | cut -d'=' -f2)
      ARM64_TAG=$(grep '^IMAGE_TAG=' ./generate_tag_$[[ inputs.upstream_version ]]_arm64.env | cut -d'=' -f2)

      if [ -z "$AMD64_TAG" ] || [ -z "$ARM64_TAG" ]; then
        echo "ERROR: Could not read arch-specific IMAGE_TAG from generate_tag env files"
        exit 1
      fi

      echo "amd64: $AMD64_TAG"
      echo "arm64: $ARM64_TAG"

      # Strip the -amd64 suffix to get the base tag
      BASE_TAG="${AMD64_TAG%-amd64}"

      echo "Creating manifest: $BASE_TAG -> $AMD64_TAG + $ARM64_TAG"
      docker manifest create "$BASE_TAG" "$AMD64_TAG" "$ARM64_TAG"
      docker manifest push "$BASE_TAG"

      echo "MANIFEST_IMAGE_TAG=$BASE_TAG" > manifest_image_tag.env

      if [ "$[[ inputs.create_root_manifest ]]" = "true" ]; then
        ROOT_TAG=$(echo "$BASE_TAG" | sed "s/-${CI_COMMIT_REF_NAME}//")
        if [ "$ROOT_TAG" != "$BASE_TAG" ]; then
          echo "Creating root manifest: $ROOT_TAG"
          docker manifest create "$ROOT_TAG" "$AMD64_TAG" "$ARM64_TAG"
          docker manifest push "$ROOT_TAG"
          echo "MANIFEST_WITHOUT_REF_TAG=$ROOT_TAG" >> manifest_image_tag.env
        fi
      fi
  artifacts:
    reports:
      dotenv: manifest_image_tag.env
    expire_in: 1 week
devguard:sign_oci_image$[[ inputs.job_suffix ]]-manifest:
  tags: $[[ inputs.runner_tags ]]
  stage: attestation
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:create_manifest_multi_arch$[[ inputs.job_suffix ]]
  dependencies:
    - devguard:create_manifest_multi_arch$[[ inputs.job_suffix ]]
  variables:
    GIT_STRATEGY: none
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint:
      - ""
  script:
    - devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
    - devguard-scanner sign --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" "$MANIFEST_IMAGE_TAG"
