  dependencies:
    - devguard:extract_scanner$[[ inputs.job_suffix ]]-amd64
    - devguard:generate_tag$[[ inputs.job_suffix ]]-amd64
  image:
    name: nixos/nix@sha256:0b1530edf840d9af519c7f3970cafbbed68d9d9554a83cc9adc04099753117e1
    entrypoint:
      - /bin/sh
      - -c
  before_script:
    - chmod +x ./devguard-scanner
    - mkdir -p /etc/nix
    - |-
      cat > /etc/nix/nix.conf << EOF
      sandbox = false
      filter-syscalls = false
      experimental-features = nix-command flakes
      $([[ -n "$[[ inputs.nix_cache_substituter ]]" ]] && echo "substituters = https://cache.nixos.org $[[ inputs.nix_cache_substituter ]]" || true)
      $([[ -n "$[[ inputs.nix_cache_public_key ]]" ]] && echo "trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= $[[ inputs.nix_cache_public_key ]]" || true)
      EOF
    - |-
      if [[ -n "$NIX_CACHE_SECRET_KEY" ]]; then
        echo "$NIX_CACHE_SECRET_KEY" > /tmp/nix-cache-priv-key.pem
      fi
    - |-
      mkdir -p ~/.aws
      echo "[profile nix-cache]" >> ~/.aws/config
      echo "s3.addressing_style = path" >> ~/.aws/config
  script:
    - ./devguard-scanner intoto start --ignore=devguard-scanner --step=build --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]"
