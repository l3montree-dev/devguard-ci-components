          --ignoreUpstreamAttestations=$[[ inputs.ignore_upstream_attestations ]]
      else
        echo "Scanning local tar file: image-amd64.tar"
        devguard-scanner container-scanning \
          --origin="$[[ inputs.devguard_origin ]]" \
