          --webUI="$[[ inputs.devguard_web_ui ]]" \
          --failOnRisk="$[[ inputs.fail_on_risk ]]" \
          --failOnCVSS="$[[ inputs.fail_on_cvss ]]" \
          --ignoreExternalReferences=$[[ inputs.ignore_external_references ]] \
          --ignoreUpstreamAttestations=$[[ inputs.ignore_upstream_attestations ]]
      else
        echo "Scanning local tar file: image-arm64.tar"
        devguard-scanner container-scanning \
          --origin="$[[ inputs.devguard_origin ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --token="$[[ inputs.devguard_token ]]" \
