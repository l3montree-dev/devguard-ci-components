      elif [ -n "$[[ inputs.image_tag ]]" ]; then
        echo "Scanning remote image: $[[ inputs.image_tag ]]"
        devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
        devguard-scanner container-scanning \
