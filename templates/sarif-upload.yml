spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard Web-UI Instance URL"

    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "test"
      description: "The stage where the scan is executed"
    job_suffix:
      description: "A suffix to append to the job name (usefull when using the component several times in one pipeline)"
      default: ""
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "fetch"
    pull_policy:
      default: "if-not-present"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      default: []
      type: array
      description: "List of jobs this scan depends on"
    dependencies:
      default: []
      type: array
      description: "List of jobs to download artifacts from"

    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "The default branch reference"
    commit_ref:
      default: "$CI_COMMIT_REF_NAME"
      description: "The branch or tag reference to scan"

    sarif_file:
      description: "The SARIF file to use for the scan"

---
devguard:sarif_upload$[[ inputs.job_suffix ]]:
  tags:
    - $[[ inputs.runner_tags ]]
  stage: $[[ inputs.stage ]]
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]

  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"

  script:
    - echo "Running DevGuard Dependency Risk Identification..."
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "IS_TAG - $IS_TAG"
    - devguard-scanner sarif $[[ inputs.sarif_file ]] --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.commit_ref ]] --isTag="$IS_TAG" --webUI=$[[ inputs.devguard_web_ui ]]
