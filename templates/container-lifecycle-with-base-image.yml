spec:
  inputs:
    # Stage Configuration
    build_stage:
      default: "build"
      description: "The stage where the build runs"
    image:
      default: "image.tar"
      description: "The image tar file to work with (used by build and scanning)"
    image_tag:
      default: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      description: "The tag to use for the built image"
    supplyChainId:
      default: "$CI_COMMIT_SHA"
      description: "Supply chain id for in-toto provenance"
    scan_stage:
      default: "test"
      description: "The stage where scanning runs"
    deploy_stage:
      default: "deploy"
      description: "The stage where signing and attestation runs"
    
    # DevGuard Configuration
    devguard_token:
      description: "The token to authenticate against the DevGuard API"
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The name of the asset"
    devguard_artifact_name:
      description: "The name of the artifact you are building. Leave empty to use the generated PURL from the built image."
  
    # Registry details forwarded to subcomponents
    registry:
      default: "$CI_REGISTRY"
      description: "Container registry URL"
    registry_user:
      default: "$CI_REGISTRY_USER"
      description: "Container registry username"
    registry_password:
      default: "$CI_REGISTRY_PASSWORD"
      description: "Container registry password"

    # Build Configuration
    build_args:
      default: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile"
      description: "The build arguments to pass to the Kaniko build command"
    dockerfile_path:
      default: "$CI_PROJECT_DIR/Dockerfile"
      description: "Path to the Dockerfile for base image discovery"
    push_image:
      default: "true"
      description: "Whether to push the image to the registry"
    
    # Job Configuration
    job_suffix:
      default: ""
      description: "Suffix for the job name. You need this if you are using the component multiple times in one pipeline."
    
    # Scanning Configuration
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
    
    # Base Image Configuration
    discover_base_image:
      default: "true"
      description: "Whether to discover and fetch base image attestations"
    upload_base_image_vex:
      default: "true"
      description: "Whether to upload base image VEX to DevGuard"
    ignore_external_references:
      default: "false"
      description: "Whether to ignore external references in discovered attestations"
    ignore_upstream_attestations:
      default: "false"
      description: "Whether to ignore attestations from upstream images"
    output:
      default: "."
      description: "Directory for discovered attestations (used by discover-baseimage-attestations)"
    
    # Job Configuration
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    
    # References
    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "Default branch reference"
    commit_ref:
      default: "$CI_COMMIT_REF_NAME"
      description: "Current commit reference"
    
    # Component version
    version:
      default: "main"
      description: "Version/ref of the components to use"
    image_suffix:
      default: "default"
      description: "Suffix for the image name (e.g., 'web'). Leave empty for no suffix."
---
include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/generate-tag@$[[ inputs.version ]]
    inputs:
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      image_suffix: $[[ inputs.image_suffix ]]

  # Include the base container-lifecycle (build, scan, sign, attest)
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/container-lifecycle@$[[ inputs.version ]]
    inputs:
      build_stage: $[[ inputs.build_stage ]]
      scan_stage: $[[ inputs.scan_stage ]]
      deploy_stage: $[[ inputs.deploy_stage ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_origin: $[[ inputs.devguard_origin ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      push_image: $[[ inputs.push_image ]]
      job_suffix: $[[ inputs.job_suffix ]]
      ignore_external_references: $[[ inputs.ignore_external_references ]]
      ignore_upstream_attestations: $[[ inputs.ignore_upstream_attestations ]]
      image_tag: "$IMAGE_TAG"
      devguard_artifact_name: "$ARTIFACT_PURL"
      registry: $[[ inputs.registry ]]
      registry_user: $[[ inputs.registry_user ]]
      registry_password: $[[ inputs.registry_password ]]
      image: $[[ inputs.image ]]
      build_args: $[[ inputs.build_args ]]
      supplyChainId: $[[ inputs.supplyChainId ]]
      images: $[[ inputs.images ]]
      fail_on_risk: $[[ inputs.fail_on_risk ]]
      fail_on_cvss: $[[ inputs.fail_on_cvss ]]
      runner_tags: $[[ inputs.runner_tags ]]
      pull_policy: $[[ inputs.pull_policy ]]
      version: $[[ inputs.version ]]
  # Discover attestations from base image
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/discover-baseimage-attestations@$[[ inputs.version ]]
    inputs:
      stage: $[[ inputs.scan_stage ]]
      path: $[[ inputs.dockerfile_path ]]
      output: $[[ inputs.output ]]
      registry: $[[ inputs.registry ]]
      registry_user: $[[ inputs.registry_user ]]
      registry_password: $[[ inputs.registry_password ]]
      job_suffix: $[[ inputs.job_suffix ]]
      pull_policy: $[[ inputs.pull_policy ]]

  # 2.1. Upload VeX from discovered base image attestations
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/vex-upload@$[[ inputs.version ]]
    inputs:
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_artifact_name: "$ARTIFACT_PURL"
      job_suffix: $[[ inputs.job_suffix ]]
      runner_tags: $[[ inputs.runner_tags ]]
      pull_policy: $[[ inputs.pull_policy ]]
      needs:
        - devguard:discover_baseimage_attestations$[[ inputs.job_suffix ]]
      dependencies:
        - devguard:discover_baseimage_attestations$[[ inputs.job_suffix ]]
      ignore_external_references: $[[ inputs.ignore_external_references ]]
      vex_file: "$[[ inputs.output ]]/attestation-*.json"

  # 2.2. Upload SBOM from discovered base image attestations
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/sbom-upload@$[[ inputs.version ]]
    inputs:
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_artifact_name: "$ARTIFACT_PURL"
      job_suffix: $[[ inputs.job_suffix ]]
      runner_tags: $[[ inputs.runner_tags ]]
      pull_policy: $[[ inputs.pull_policy ]]
      needs:
        - devguard:discover_baseimage_attestations$[[ inputs.job_suffix ]]
      dependencies:
        - devguard:discover_baseimage_attestations$[[ inputs.job_suffix ]]
      ignore_external_references: $[[ inputs.ignore_external_references ]]
      sbom_file: "$[[ inputs.output ]]/attestation-*.json"
---
variables:
  GIT_STRATEGY: clone

  