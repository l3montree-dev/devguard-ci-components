spec:
  inputs:
    deploy_stage:
      default: "deploy"
      description: "The stage where the image is built and tagged"
    token:
      description: "The token to authenticate against the DevGuard API"
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The name of the asset"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"  
---
devguard:attest:
  stage: "$[[ inputs.deploy_stage ]]"
  image: ghcr.io/l3montree-dev/devguard-scanner:main-latest
  tags:
    - $[[ inputs.runner_tags ]]
  artifacts:
    paths:
      - sbom.json
      - vex.json
      - sarif.json
      - build.provenance.json
    expire_in: 1 week
  script:
    - |
      # Get artifacts
      devguard-scanner get "$[[ inputs.api_url ]]/api/v1/organizations/$[[ inputs.asset_name ]]/refs/$CI_COMMIT_REF_NAME/sbom.json" --token="$[[ inputs.token ]]" > sbom.json
      devguard-scanner get "$[[ inputs.api_url ]]/api/v1/organizations/$[[ inputs.asset_name ]]/refs/$CI_COMMIT_REF_NAME/vex.json" --token="$[[ inputs.token ]]" > vex.json
      devguard-scanner get "$[[ inputs.api_url ]]/api/v1/organizations/$[[ inputs.asset_name ]]/refs/$CI_COMMIT_REF_NAME/sarif.json" --token="$[[ inputs.token ]]" > sarif.json

      devguard-scanner login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
      
      # Attest SBOM
     
      

