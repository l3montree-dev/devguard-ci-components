devguard:push_oci_image$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
  stage: oci-image
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - $[[ inputs.job_prefix ]]devguard:build_oci_image$[[ inputs.job_suffix ]]
    - devguard:container_scanning$[[ inputs.job_suffix ]]
  dependencies:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - $[[ inputs.job_prefix ]]devguard:build_oci_image$[[ inputs.job_suffix ]]
    - devguard:container_scanning$[[ inputs.job_suffix ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]
  image:
    name: registry.gitlab.com/l3montree/devguard/osscontainertools-kaniko-crane:kaniko-v1.27.3-devguard-scanner-v1.3.1@sha256:2966ade3c7d565ae56c48cfa50d5df6e36a5371f4173606eb4de57558186433d
    entrypoint:
      - ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $[[ inputs.small_artifact_registry ]] == "true"
      when: never
    - when: on_success
  script: |
    /crane auth login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]

    # Strip any "@sha256:..." digest suffix: the build job exports IMAGE_TAG as
    # "repo:tag@digest", and "crane push" against a tag+digest reference pushes by
    # digest only, never creating the tag that downstream jobs (manifest/sign/attest) need.
    IMAGE_REF="$IMAGE_TAG"
    IMAGE_REF="${IMAGE_REF%@*}"
    IMAGE_REF=$(echo "${IMAGE_REF}" | tr '[:upper:]' '[:lower:]')

    echo "Image: image.tar"
    echo "Image Tag: ${IMAGE_REF}"

    /crane push image.tar "${IMAGE_REF}"

    /devguard-scanner intoto run --step=deploy --materials="image.tar" --products="" --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supply_chain_id ]]" --supplyChainOutputDigest="${DIGEST}" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.ref ]]" --isTag="$[[ inputs.is_tag ]]"
devguard:sign_oci_image$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
