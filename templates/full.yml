spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
    devguard_asset_name:
      description: "DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)"
      default: "$DEVGUARD_ASSET_NAME"
    devguard_token:
      description: "The DevGuard API token (use CI/CD variable, your private key)"
      default: "$DEVGUARD_TOKEN"
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard Web-UI Instance URL"
    devguard_artifact_name:
      default: ""
      description: "The name of the artifact you are building. Useful when a pipeline builds more than one artifact (e.g. different containers). If not provided, will use the generated PURL from the built image."

    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"

    runner_tags:
      default: []
      type: array
      description: "The runner tags to use for the job"
    job_suffix:
      default: ""
      description: "Suffix for the job name. You need this if you are using the component multiple times in one pipeline."
    git_strategy:
      default: "fetch"
      description: "The Git strategy to use for the job"
    pull_policy:
      default: "always"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the jobs are allowed to fail without stopping the pipeline"

    build_args:
      default: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile"
      description: "The build arguments to pass to the Docker build command"

    version:
      default: main
      description: "The version of the components. Since we are using remote templates, we need to specify the version of the components."
    image_suffix:
      default: "default"
      description: "Suffix for the image name (e.g. 'web'). Leave empty for no suffix. This will create images like $CONTAINER_IMAGE/<IMAGE_SUFFIX>:tag"
---
variables:
  GIT_STRATEGY: $[[ inputs.git_strategy ]]

include:
  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/secret-scanning.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/static-application-security-testing.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/infrastructure-as-code-scanning.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/software-composition-analysis.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      fail_on_cvss: $[[ inputs.fail_on_cvss ]]
      fail_on_risk: $[[ inputs.fail_on_risk ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/generate-tag.yml"
    inputs:
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      image_suffix: $[[ inputs.image_suffix ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/build-oci-image.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      build_args: $[[ inputs.build_args ]]
      needs:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
      dependencies:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
      image_tag: "$IMAGE_TAG"

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/container-scanning.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_artifact_name: "$ARTIFACT_NAME"
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      fail_on_cvss: $[[ inputs.fail_on_cvss ]]
      fail_on_risk: $[[ inputs.fail_on_risk ]]
      needs:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:build_oci_image$[[ inputs.job_suffix ]]
      dependencies:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:build_oci_image$[[ inputs.job_suffix ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/push-oci-image.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      needs:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:build_oci_image$[[ inputs.job_suffix ]]
        - devguard:container_scanning$[[ inputs.job_suffix ]]
      dependencies:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:build_oci_image$[[ inputs.job_suffix ]]
        - devguard:container_scanning$[[ inputs.job_suffix ]]
      image_tag: "$IMAGE_TAG"

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/sign-oci-image.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      needs:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:push_oci_image$[[ inputs.job_suffix ]]
      image: "$IMAGE_TAG"

  - remote: https://gitlab.opencode.de/open-code/badgebackend/source-provenance-attestation-service/-/raw/main/templates/attestation.yml
    inputs:
      job_suffix: $[[ inputs.job_suffix ]]
      image: "$IMAGE_TAG"
      needs: 
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:push_oci_image$[[ inputs.job_suffix ]]
      dependencies:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:push_oci_image$[[ inputs.job_suffix ]]
    rules:
      - if: '$CI_SERVER_FQDN == "gitlab.opencode.de"'

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/attest.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_artifact_name: "$ARTIFACT_NAME"
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      needs:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:sign_oci_image$[[ inputs.job_suffix ]]
        - devguard:build_oci_image$[[ inputs.job_suffix ]]
        # source-provenance-trigger job (source-provenance-attestation.yml) is defined here: https://gitlab.opencode.de/open-code/badgebackend/source-provenance-attestation-service/-/blob/main/templates/attestation.yml
        - job: source-provenance-artifacts$[[ inputs.job_suffix ]]
          optional: true
      dependencies:
        - devguard:generate_tag$[[ inputs.job_suffix ]]
        - devguard:sign_oci_image$[[ inputs.job_suffix ]]
        - devguard:build_oci_image$[[ inputs.job_suffix ]]
      image: "$IMAGE_TAG"
      attestations:
        - source: "$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/artifacts/ARTIFACT_NAME/sbom.json/"
          predicate_type: "https://cyclonedx.org/bom"
        - source: "$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/artifacts/ARTIFACT_NAME/vex.json/"
          predicate_type: "https://cyclonedx.org/vex"
        - source: "$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/sarif.json/"
          predicate_type: "https://www.schemastore.org/schemas/json/sarif-2.1.0.json"
        - source: "build.provenance.json"
          predicate_type: "https://slsa.dev/provenance/v1"
        - source: "./artifacts/attestation-report.sarif"
          predicate_type: "https://gitlab.opencode.de/open-code/badgebackend/source-provenance-attestation-service/-/raw/main/schema/source-provenance-schema-1.0.0.json"
