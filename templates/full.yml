    - devguard-scanner sign --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" "$IMAGE_TAG"
devguard:attest$[[ inputs.job_suffix ]]:
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:v1.9.0
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint:
      - ""
  tags: $[[ inputs.runner_tags ]]
  stage: attestation
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - devguard:sign_oci_image$[[ inputs.job_suffix ]]
    - $[[ inputs.job_prefix ]]devguard:build_oci_image$[[ inputs.job_suffix ]]
    - job: source-provenance-artifacts
      optional: true
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]
  script: |
    echo "Attesting artifacts for $IMAGE_TAG"
    echo "Artifact Name: $ARTIFACT_NAME"
    echo "Asset Name: $[[ inputs.devguard_asset_name ]]"

    # URL encode artifact name for API calls
    API_ARTIFACT_NAME=$(python3 -c "from urllib.parse import quote; print(quote('$ARTIFACT_NAME', safe=''))")
    echo "API Encoded Artifact Name: $API_ARTIFACT_NAME"

    # Slugify the commit ref (replace special characters with hyphens)
    API_COMMIT_REF=$(devguard-scanner slug "$[[ inputs.commit_ref ]]")
    echo "Slugified Commit Ref: $API_COMMIT_REF"

    # Login to registry
    devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]

    echo 'Attestations: [{"source":"$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/artifacts/ARTIFACT_NAME/sbom.json/","predicate_type":"https://cyclonedx.org/bom"},{"source":"$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/artifacts/ARTIFACT_NAME/vex.json/","predicate_type":"https://cyclonedx.org/vex"},{"source":"$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/sarif.json/","predicate_type":"https://www.schemastore.org/schemas/json/sarif-2.1.0.json"},{"source":"build.provenance.json","predicate_type":"https://slsa.dev/provenance/v1"},{"source":"artifacts/attestation-report.json","predicate_type":"https://gitlab.opencode.de/open-code/badgebackend/source-provenance-attestation-service/-/raw/main/schema/source-provenance-schema-1.0.1.json"}]'

    ATT_JSON_CLEAN=$(echo '[{"source":"$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/artifacts/ARTIFACT_NAME/sbom.json/","predicate_type":"https://cyclonedx.org/bom"},{"source":"$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/artifacts/ARTIFACT_NAME/vex.json/","predicate_type":"https://cyclonedx.org/vex"},{"source":"$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/COMMIT_REF/sarif.json/","predicate_type":"https://www.schemastore.org/schemas/json/sarif-2.1.0.json"},{"source":"build.provenance.json","predicate_type":"https://slsa.dev/provenance/v1"},{"source":"artifacts/attestation-report.json","predicate_type":"https://gitlab.opencode.de/open-code/badgebackend/source-provenance-attestation-service/-/raw/main/schema/source-provenance-schema-1.0.1.json"}]' \
    | sed 's/:\([a-z_]\+\)=>/"\1":/g' \
    | sed 's/=>/:/g' \
    | sed "s/'/\"/g")

    ATTESTATIONS_JSON=$(echo "$ATT_JSON_CLEAN" | jq . )

    # Process each attestation
    echo "$ATTESTATIONS_JSON" | jq -c '.[]' | while read -r attestation; do
      SOURCE=$(echo "$attestation" | jq -r '.source')
      PREDICATE_TYPE=$(echo "$attestation" | jq -r '.predicate_type')

      echo ""
      echo "========================================"
      echo "Processing attestation with predicate: $PREDICATE_TYPE"
      SOURCE=$(echo "$SOURCE" | envsubst)

      # Check if source is a URL (starts with http:// or https://)
      if [[ "$SOURCE" =~ ^https?:// ]]; then
        # Replace ARTIFACT_NAME placeholder with URL-encoded artifact name
        URL="${SOURCE//ARTIFACT_NAME/$API_ARTIFACT_NAME}"

        # Replace COMMIT_REF placeholder with URL-encoded commit ref
        URL="${URL//COMMIT_REF/$API_COMMIT_REF}"

        # Also handle any environment variable substitution
        URL=$(echo "$URL" | envsubst)

        # Extract filename from URL or use a default
        FILENAME=$(basename "$URL" | cut -d'?' -f1)
        if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
          FILENAME="downloaded-$(echo "$PREDICATE_TYPE" | md5sum | cut -d' ' -f1).json"
        fi

        echo "Downloading from URL: $URL"
        echo "Saving as: $FILENAME"

        devguard-scanner curl "$URL" --token="$[[ inputs.devguard_token ]]" > "/tmp/$FILENAME"
        FILE_PATH="/tmp/$FILENAME"
      else
        # It's a file path
        FILE_PATH="$SOURCE"
        echo "Using local file: $FILE_PATH"
      fi

      # Create attestation
      if [ -f "$FILE_PATH" ]; then
        echo "Creating attestation for $FILE_PATH"
        devguard-scanner attest "$FILE_PATH" \
          --predicateType="$PREDICATE_TYPE" \
          $IMAGE_TAG \
          --defaultRef="$[[ inputs.default_ref ]]" \
          --ref="$[[ inputs.commit_ref ]]" \
          --isTag="$[[ inputs.is_tag ]]" \
          --token="$[[ inputs.devguard_token ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --artifactName="$ARTIFACT_NAME"
        echo "✓ Attestation created successfully"
      else
        echo "✗ Warning: File $FILE_PATH not found, skipping attestation"
      fi
      echo "========================================"
    done

    echo ""
    echo "All attestations completed"
