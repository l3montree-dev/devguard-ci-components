spec:
  inputs:
    token:
      description: 'The DevGuard token'
    asset_name:
      description: 'The DevGuard asset name'
    scan_stage:
      default: 'test'
      description: 'The stage where the scan is run'
    build_stage:
      default: build
      description: 'The stage where the image is built and tagged'

    build_context:
      default: $CI_PROJECT_DIR
      description: 'The build context to pass to the Docker build command'    
    build_dockerfile:
      default: $CI_PROJECT_DIR/Dockerfile
      description: 'The Dockerfile to pass to the Docker build command'  
    build_args:
      type: array
      default: 
      - []
      description: 'The build arguments to pass to the Docker build command'  
    deploy_stage:
      default: deploy
      description: 'The stage where the image should be pushed into the registry'
---

include:
- local: /templates/sast.yml
  inputs:
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]

- local: /templates/secret-scanning.yml
  inputs:
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]    

- local: /templates/software-composition-analysis.yml
  inputs:
    asset_name: $[[ inputs.asset_name ]]
    token: $[[ inputs.token ]]
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]

- local: /templates/container-scanning.yml
  inputs:
    asset_name: $[[ inputs.asset_name ]]
    token: $[[ inputs.token ]]
    #You can change these to the desired stages. Make sure they match one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]
    build_stage: $[[ inputs.build_stage ]]
    build_args: $[[ inputs.build_args ]]
    build_context: $[[ inputs.build_context ]]
    build_dockerfile: $[[ inputs.build_dockerfile ]]

- local: /templates/deploy.yml
  inputs:
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    deploy_stage: $[[ inputs.deploy_stage ]]
