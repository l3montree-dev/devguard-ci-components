spec:
  inputs:
    job_suffix:
      type: string
      description: Suffix for the job name. You need this if you are using the component multiple times in one pipeline.
      default: ""
    devguard_api_url:
      description: The url of the API to send the scan request to (default 'https://api.devguard.org')
      default: https://api.devguard.org
    devguard_asset_name:
      description: DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)
      default: $DEVGUARD_ASSET_NAME
    devguard_token:
      description: The DevGuard API token (use CI/CD variable, your private key)
      default: $DEVGUARD_TOKEN
    devguard_artifact_name:
      description: The name of the artifact (in purl format e.g., pkg:oci/k8s-tools)
    runner_tags:
      default: []
      type: array
      description: The runner tags to use for the job
    stage:
      default: oci-image
      description: The pipeline stage for the job
    git_strategy:
      description: The Git strategy to use for the job
      default: fetch
    pull_policy:
      description: The pull policy for the container image (can be [always, if-not-present, never])
      default: always
    allow_failure:
      description: Whether the job is allowed to fail without stopping the pipeline
      type: boolean
      default: false
    needs:
      description: List of jobs this attestation depends on
      type: array
      default: []
    dependencies:
      description: List of jobs to download artifacts from
      type: array
      default: []
    default_ref:
      description: Default branch reference
      default: $CI_DEFAULT_BRANCH
    commit_ref:
      description: Current commit reference
      default: $CI_COMMIT_REF_NAME
    registry:
      description: Container registry URL
      default: $CI_REGISTRY
    registry_user:
      description: Container registry username
      default: $CI_REGISTRY_USER
    registry_password:
      description: Container registry password
      default: $CI_REGISTRY_PASSWORD
    attestations:
      description: "|

        \      List of attestations to create. Each item should have:

        \      - source: file path OR full URL (URLs are automatically detected and downloaded). Special string ARTIFACT_NAME will be replaced with URL-encoded artifact name.

        \      - predicate_type: the predicate type URL

        \      "
      default: []
      type: array
    image:
      description: Container image to use for attestation
      default: $CI_REGISTRY_IMAGE
    devguard_web_ui:
      description: The DevGuard Web-UI Instance URL
      default: https://app.devguard.org
    path:
      description: The path to the git repository to scan
      default: $CI_PROJECT_DIR
    is_tag:
      description: Is the current commit a tag
      default: $(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    devguard_origin:
      description: "Origin of the resource/information (how it was generated). Examples: 'source-scanning', 'container-scanning', 'base-image'. (default 'DEFAULT')"
      default: DEFAULT
    fail_on_risk:
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
      default: critical
    fail_on_cvss:
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
      default: critical
    ignore_external_references:
      description: Whether to ignore external references in any discovered attestations. This is useful when you are using this component to scan your own built images which have a valid vex attestation.
      default: "false"
    image_suffix:
      default: default
      description: Suffix for the image name (e.g. 'web'). Leave empty for no suffix.
    image_variant:
      default: ""
      description: Variant for the image name (e.g., 'slim' for 'image-slim'). Leave empty for no variant.
    architecture:
      default: amd64
      description: Target architecture (e.g., amd64 or arm64)
    image_path:
      default: $CI_REGISTRY_IMAGE
      description: Path to the built image (e.g., registry.example.com/project/image). If not provided, the job will attempt to discover the image from previous jobs.
    upstream_version:
      default: "0"
      description: Upstream version to use for tag generation. If not provided, the job will ignore this parameter.
---
include:
  - component: $CI_SERVER_FQDN/open-code/badgebackend/source-provenance-attestation-service/attestation@main
    inputs:
      job_suffix: $[[ inputs.job_suffix ]]
    rules:
      - if: $CI_SERVER_FQDN == "gitlab.opencode.de"
devguard:attest$[[inputs.job_suffix]]:
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint:
      - ""
  tags: $[[inputs.runner_tags]]
  stage: $[[inputs.stage]]
  allow_failure: $[[inputs.allow_failure]]
  needs: $[[inputs.needs]]
  dependencies: $[[inputs.dependencies]]
  variables:
    GIT_STRATEGY: $[[inputs.git_strategy]]
  before_script:
    - apk add --no-cache jq gettext
  script:
    - echo "Attesting artifacts for $[[ inputs.image ]]"
    - 'echo "Artifact Name: $[[ inputs.devguard_artifact_name ]]"'
    - 'echo "Asset Name: $[[ inputs.devguard_asset_name ]]"'
    - "# URL encode artifact name for API calls"
    - API_ARTIFACT_NAME=$(python3 - c "from urllib.parse import quote; print(quote('$[[ inputs.devguard_artifact_name ]]', safe=''))")
    - 'echo "API Encoded Artifact Name: $API_ARTIFACT_NAME"'
    - "# Slugify the commit ref(replace special characters with hyphens)"
    - API_COMMIT_REF=$(devguard-scanner slug "$[[ inputs.commit_ref ]]")
    - 'echo "Slugified Commit Ref: $API_COMMIT_REF"'
    - "echo 'Attestations: $[[ inputs.attestations ]]'"
    - "# Login to registry"
    - devguard-scanner login -u $[[inputs.registry_user]] -p $[[inputs.registry_password]] $[[inputs.registry]]
    - "# Convert inputs.attestations to a valid JSON array if it's an array of JSON strings"
    - ATT_JSON_CLEAN=$(echo '$[[ inputs.attestations ]]' | sed 's/:([a-z_]+)=>/"\1":/g' | sed 's/=>/:/g' | sed "s/'/\"/g")
    - ATTESTATIONS_JSON=$(echo "$ATT_JSON_CLEAN" | jq .)
    - "# Process each attestation"
    - |
      echo "$ATTESTATIONS_JSON" | jq -c '.[]' | while read -r attestation; do
              SOURCE=$(echo "$attestation" | jq -r '.source')
              PREDICATE_TYPE=$(echo "$attestation" | jq -r '.predicate_type')
              
              echo ""
              echo "========================================"
              echo "Processing attestation with predicate: $PREDICATE_TYPE"
              SOURCE=$(echo "$SOURCE" | envsubst)
              
              # Check if source is a URL (starts with http:// or https://)
              if [[ "$SOURCE" =~ ^https?:// ]]; then
                # Replace ARTIFACT_NAME placeholder with URL-encoded artifact name
                URL="${SOURCE//ARTIFACT_NAME/$API_ARTIFACT_NAME}"
                
                # Replace COMMIT_REF placeholder with URL-encoded commit ref
                URL="${URL//COMMIT_REF/$API_COMMIT_REF}"
                
                # Also handle any environment variable substitution
                URL=$(echo "$URL" | envsubst)

                # Extract filename from URL or use a default
                FILENAME=$(basename "$URL" | cut -d'?' -f1)
                if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
                  FILENAME="downloaded-$(echo "$PREDICATE_TYPE" | md5sum | cut -d' ' -f1).json"
                fi
                
                echo "Downloading from URL: $URL"
                echo "Saving as: $FILENAME"
                
                devguard-scanner curl "$URL" --token="$[[ inputs.devguard_token ]]" > "$FILENAME"
                FILE_PATH="$FILENAME"
              else
                # It's a file path
                FILE_PATH="$SOURCE"
                echo "Using local file: $FILE_PATH"
              fi
              
              # Create attestation
              if [ -f "$FILE_PATH" ]; then
                echo "Creating attestation for $FILE_PATH"
                devguard-scanner attest "$FILE_PATH"             --predicateType="$PREDICATE_TYPE"             $[[ inputs.image ]]             --defaultRef="$[[ inputs.default_ref ]]"             --ref="$[[ inputs.commit_ref ]]"             --token="$[[ inputs.devguard_token ]]"             --apiUrl="$[[ inputs.devguard_api_url ]]"             --assetName="$[[ inputs.devguard_asset_name ]]"             --artifactName="$[[ inputs.devguard_artifact_name ]]"
                echo "✓ Attestation created successfully"
              else
                echo "✗ Warning: File $FILE_PATH not found, skipping attestation"
              fi
              echo "========================================"
            done
    - echo ""
    - echo "All attestations completed"
