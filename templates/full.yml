spec:
  inputs:
    token:
      description: "The DevGuard token"
    asset_name:
      description: "The DevGuard asset name"
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    scan_stage:
      default: "test"
      description: "The stage where the scan is run"
    build_stage:
      default: build
      description: "The stage where the image is built and tagged"
    build_args:
      default: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile"
      description: "The build arguments to pass to the Docker build command"
    deploy_stage:
      default: deploy
      description: "The stage where the image should be pushed into the registry"
    do_risk_management:
      default: $CI_COMMIT_TAG != null || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      description: "Whether the results of the scan should be used for risk management"
    small_artifact_registry:
      default: "false"
      description: "If the artifact size is too big for your gitlab instance, set this to true. This will push the image directly to the registry instead of uploading it as artifact."
    version:
      default: "main"
      description: "The version of the components. Since we are using remote templates, we need to specify the version of the components."
---
include:
- remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/sast.yml"
  inputs:
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]

- remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/secret-scanning.yml"
  inputs:
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]

- remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/software-composition-analysis.yml"
  inputs:
    asset_name: $[[ inputs.asset_name ]]
    api_url: $[[ inputs.api_url ]]
    token: $[[ inputs.token ]]
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]
    do_risk_management: $[[ inputs.do_risk_management ]]

- remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/build.yml"
  inputs:
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    build_stage: $[[ inputs.build_stage ]]
    build_args: $[[ inputs.build_args ]]
    push_image: $[[ inputs.small_artifact_registry ]]

- remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/container-scanning.yml"
  inputs:
    asset_name: $[[ inputs.asset_name ]]
    api_url: $[[ inputs.api_url ]]
    token: $[[ inputs.token ]]
    #You can change these to the desired stages. Make sure they match one of your defined stages.
    scan_stage: $[[ inputs.scan_stage ]]
    do_risk_management: $[[ inputs.do_risk_management ]]
    fetch_image_from_registry: $[[ inputs.small_artifact_registry ]]

- remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/deploy.yml"
  inputs:
    #You can change this to the desired stage. Make sure it matches one of your defined stages.
    deploy_stage: $[[ inputs.deploy_stage ]]
    image_already_in_registry: $[[ inputs.small_artifact_registry ]]

- remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/sign.yml"
  inputs:
    token: $[[ inputs.token ]]
    asset_name: $[[ inputs.asset_name ]]
    api_url: $[[ inputs.api_url ]]
