spec:
  inputs:
    stage:
      default: "build"
      description: "The pipeline stage for the job"
    predicate_type:
      default: ""
      description: "The predicate type to discover. If empty, all attestations will be discovered."
    path:
      description: "Path to the Containerfile/Dockerfile"
    output:
      default: "."
      description: "Output directory for the discovered attestations"
    registry_user:
      default: "$CI_REGISTRY_USER"
      description: "Container registry username"
    registry_password:
      default: "$CI_REGISTRY_PASSWORD"
      description: "Container registry password"
    registry:
      default: "$CI_REGISTRY"
      description: "Container registry URL"
    allow_failure:
      default: true
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      default: []
      type: array
      description: "List of jobs this depends on"
    dependencies:
      default: []
      type: array
      description: "List of jobs to download artifacts from"
    job_suffix:
      default: ""
      description: "Suffix for the job name. You need this if you are using the component multiple times in one pipeline."
    pull_policy:
      default: "always"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
---
devguard:discover_baseimage_attestations$[[ inputs.job_suffix ]]:
  stage: $[[ inputs.stage ]]
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:v1.4.2
    pull_policy: "$[[ inputs.pull_policy ]]"
    entrypoint: [""]
  needs: $[[ inputs.needs ]]
  allow_failure: $[[ inputs.allow_failure ]]
  dependencies: $[[ inputs.dependencies ]]
  script:
    - |
      devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
      devguard-scanner discover-baseimage-attestations  --output "$[[ inputs.output ]]" --predicateType "$[[ inputs.predicate_type ]]" "$[[ inputs.path ]]"
  artifacts:
    paths:
      - $[[ inputs.output ]]/attestation-*.json