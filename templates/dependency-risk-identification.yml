spec:
  inputs:
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The DevGuard asset name"
    token:
      description: "The DevGuard token"
    scan_stage:
      default: "test"
      description: "The stage where the scan is run"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    sbom_file:
      description: "The SBOM file to use for the scan"
    needs:
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      default: []
      description: "The jobs that this job depends on"
    scanner_id:
      default: "sbom-upload"
      description: "The scanner ID to use for the job"
---
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0
devguard:dependency-risk-identification:
    stage: "$[[ inputs.scan_stage ]]"
    tags:
        - $[[ inputs.runner_tags ]]
    needs:
        - $[[ inputs.needs ]]
    dependencies:
        - $[[ inputs.dependencies ]]
    image:
        name: ghcr.io/l3montree-dev/devguard-scanner:0.12.0
        pull_policy: always
    before_script:
        - git remote set-head origin -a
    script:
        - echo "Running DevGuard Dependency Risk Identification..."
        - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
        - echo "IS_TAG - $IS_TAG"
        - devguard-scanner sbom $[[ inputs.sbom_file ]] --scannerId="$[[ inputs.scanner_id ]]"  --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --defaultRef="$CI_DEFAULT_BRANCH" --ref="$CI_COMMIT_REF_NAME" --isTag="$IS_TAG"