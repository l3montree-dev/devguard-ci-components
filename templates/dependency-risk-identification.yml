spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"
    scan_stage:
      default: "test"
      description: "The stage where the scan is run"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    sbom_file:
      description: "The SBOM file to use for the scan"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs that this job depends on"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    artifact_name:
      default: "source"
      description: "The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If you build a single artifact - leave it empty."
    web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard web UI URL"
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
---
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0
devguard:dependency-risk-identification:$[[ inputs.artifact_name ]]:
  stage: "$[[ inputs.scan_stage ]]"
  tags:
    - $[[ inputs.runner_tags ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"
  script:
    - echo "Running DevGuard Dependency Risk Identification..."
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "IS_TAG - $IS_TAG"
    - devguard-scanner sbom $[[ inputs.sbom_file ]] --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --defaultRef="$CI_DEFAULT_BRANCH" --ref="$CI_COMMIT_REF_NAME" --isTag="$IS_TAG" --artifactName="$[[ inputs.artifact_name ]]" --webUI=$[[ inputs.web_ui ]] --failOnRisk=$[[ inputs.fail_on_risk ]] --failOnCVSS=$[[ inputs.fail_on_cvss ]]
