#
# Creates a multi-arch docker manifest from arch-specific images already in the
# registry. Reads IMAGE_TAG from generate_tag_{upstream_version}_amd64.env and
# generate_tag_{upstream_version}_arm64.env produced by generate-tag.yml.
spec:
  inputs:
    stage:
      description: "The stage to run this job in."
      default: "oci-image"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs to download artifacts from"
    job_suffix:
      description: "Suffix for the job name."
      default: ""
    upstream_version:
      default: "0"
      description: "Upstream version used in generate-tag env file names."
    create_root_manifest:
      default: '$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)'
      description: "Whether to also create a manifest without the branch ref in the tag."
    artifacts_subdirectory:
      default: "."
      description: "Directory to store generated artifacts in (relative to project root)."
---

devguard:create_manifest_multi_arch$[[ inputs.job_suffix ]]:
  stage: $[[ inputs.stage ]]
  image: docker:28.5.2@sha256:2a232a42256f70d78e3cc5d2b5d6b3276710a0de0596c145f627ecfae90282ac
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  before_script:
    - apk add --no-cache bash
    - mkdir -p ~/.docker
    - echo '{"experimental":"enabled"}' > ~/.docker/config.json
  script: |
    docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD

    AMD64_TAG=$(grep '^IMAGE_TAG=' $[[ inputs.artifacts_subdirectory]]/generate_tag_$[[ inputs.upstream_version ]]_amd64.env | cut -d'=' -f2)
    ARM64_TAG=$(grep '^IMAGE_TAG=' $[[ inputs.artifacts_subdirectory]]/generate_tag_$[[ inputs.upstream_version ]]_arm64.env | cut -d'=' -f2)

    if [ -z "$AMD64_TAG" ] || [ -z "$ARM64_TAG" ]; then
      echo "ERROR: Could not read arch-specific IMAGE_TAG from generate_tag env files"
      exit 1
    fi

    echo "amd64: $AMD64_TAG"
    echo "arm64: $ARM64_TAG"

    # Strip the -amd64 suffix to get the base tag
    BASE_TAG="${AMD64_TAG%-amd64}"

    echo "Creating manifest: $BASE_TAG -> $AMD64_TAG + $ARM64_TAG"
    docker manifest create "$BASE_TAG" "$AMD64_TAG" "$ARM64_TAG"
    docker manifest push "$BASE_TAG"

    echo "MANIFEST_IMAGE_TAG=$BASE_TAG" > manifest_image_tag.env

    if [ "$[[ inputs.create_root_manifest ]]" = "true" ]; then
      ROOT_TAG=$(echo "$BASE_TAG" | sed "s/-${CI_COMMIT_REF_NAME}//")
      if [ "$ROOT_TAG" != "$BASE_TAG" ]; then
        echo "Creating root manifest: $ROOT_TAG"
        docker manifest create "$ROOT_TAG" "$AMD64_TAG" "$ARM64_TAG"
        docker manifest push "$ROOT_TAG"
        echo "MANIFEST_WITHOUT_REF_TAG=$ROOT_TAG" >> manifest_image_tag.env
      fi
    fi
  artifacts:
    reports:
      dotenv: manifest_image_tag.env
    expire_in: 1 week
