spec:
  inputs:
    scan_stage:
      default: test
      description: The stage where the scan is run
    environment:
      default: "go"
      description: "The environment to scan [go, npm]"
    decision_file:
      default: "./docs/dependency_decisions.yml"
      description: "The path to the dependency decisions file"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"        
---
variables:
  GIT_STRATEGY: clone

devguard:license-scanning:
  stage: $[[ inputs.scan_stage ]]
  tags:
    - $[[ inputs.runner_tags ]]
  image: registry.gitlab.com/l3montree/devguard/license-finder-$[[ inputs.environment ]]
  dependencies: []
  needs: []
  script:
    - export PATH=$PATH:/usr/local/go/bin
    - |
      if [ "$[[ inputs.environment ]]" == "go" ]; then
        license_finder --decisions_file $[[ inputs.decision_file ]] --enabled-package-managers gomodules
      else
        license_finder --decisions_file $[[ inputs.decision_file ]] --enabled-package-managers npm
      fi
