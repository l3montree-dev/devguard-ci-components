spec:
  inputs:
    deploy_stage:
      default: "deploy"
      description: "The stage where the image should be pushed into the registry"
    image_already_in_registry:
      default: "false"
      description: "If the image is already in the registry, set this to true. This will skip the initial push step."
    token:
      description: "The token to authenticate against the DevGuard API"
    api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The name of the asset"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    image_suffix:
      default: "default"
      description: "Suffix for the image name (e.g. 'web'). Leave empty for no suffix."
---
variables:
  GIT_STRATEGY: clone
  
devguard:deploy:$[[ inputs.image_suffix ]]:
  needs:
    - devguard:build-image:$[[ inputs.image_suffix ]]
    - devguard:container-scanning:$[[ inputs.image_suffix ]]
  dependencies:
    - devguard:build-image:$[[ inputs.image_suffix ]]
    - devguard:container-scanning:$[[ inputs.image_suffix ]]
  stage: "$[[ inputs.deploy_stage ]]"
  tags:
    - $[[ inputs.runner_tags ]]
  image:
    name: registry.gitlab.com/l3montree/devguard/kaniko-crane:kaniko-v1.26.0-customized@sha256:e26e87bf8f762c4e2447212e02b29c68b2f775bdb0de68aebaa8d825c215d636
    entrypoint: [""]
  script: |
    /crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    if [ $[[ inputs.image_already_in_registry ]] == "false" ]; then
      /crane push image.tar $(cat image-tag.txt)
    fi
    if [[ -z "$CI_COMMIT_TAG" ]]; then
      branch=$(echo $CI_COMMIT_REF_NAME | sed 's/\//-/g')
      /crane cp $(cat image-tag.txt) $CI_REGISTRY_IMAGE:${branch}-latest
    else
      echo "Skipping -latest tag: Running on a Git tag."
    fi
    
    /devguard-scanner intoto run --step=deploy --materials=image-tag.txt --products=image-tag.txt --products=image-digest.txt --token="$[[ inputs.token ]]" --apiUrl="$[[ inputs.api_url ]]" --assetName="$[[ inputs.asset_name ]]" --supplyChainId="${CI_COMMIT_SHA}" --supplyChainOutputDigest="${DIGEST}" 
