spec:
  inputs:
    intoto_stage:
      default: "intoto"
      description: "The stage where the intoto scan should be executed"
    asset_name:
      description: "The DevGuard asset name"
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    token:
      description: "The DevGuard token"
---
devguard:intoto-build-step:
  stage: "$[[ inputs.intoto_stage ]]"
  image:
    name: ghcr.io/l3montree-dev/devguard-scanner:main-latest
    entrypoint: [""]
  script:
    - echo "Running DevGuard Intoto Build...starting..."
    - devguard-scanner intoto start \
      --step=build \
      --ignore="image-digest.txt" \
      --ignore="image-tag.txt" \
      --token="$[[ inputs.token ]]" \
      --apiUrl="${{ inputs.api-url }}" \
      --assetName="${{ inputs.asset-name }}" \
      --supplyChainId="${{ inputs.supply-chain-id }}" \
    - echo "Running DevGuard Intoto Build...stopping..."
    - devguard-scanner intoto stop \
      --step=build \
      --products="image-digest.txt" \
      --products="image-tag.txt" \
      --token="$[[ inputs.token ]]" \
      --apiUrl="${{ inputs.api-url }}" \
      --assetName="${{ inputs.asset-name }}" \
      --supplyChainId="${{ inputs.supply-chain-id }}" \

  devguard:intoto-depoly-step:
    stage: "$[[ inputs.intoto_stage ]]"
    image:
      name: ghcr.io/l3montree-dev/devguard-scanner:main-latest
      entrypoint: [""]
    script:
      - echo "Running DevGuard Intoto Deploy..."
      - echo "Reading image-digest.txt..."
      - export DIGEST=$(cat image-digest.txt)
      - echo "DIGEST=$DIGEST"
      - devguard-scanner intoto run \
        --step=deploy \
        --materials=image-tag.txt \
        --products=image-tag.txt \
        --products=image-digest.txt \
        --token="$[[ inputs.token ]]" \
        --apiUrl="${{ inputs.api-url }}" \
        --assetName="${{ inputs.asset-name }}" \
        --supplyChainId="${CI_COMMIT_SHA}" \
        --supplyChainOutputDigest="${DIGEST}"
