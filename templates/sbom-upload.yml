spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard web UI URL"
    devguard_artifact_name:
      default: "source"
      description: "The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If not provided, will use the generated PURL from the built image."
    devguard_origin:
      default: "DEFAULT"
      description: "Origin of the SBOM (how it was generated). Examples: 'source-scanning', 'container-scanning', 'base-image'. Default: 'container-scanning'. (default 'DEFAULT')"
    
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "test"
      description: "The stage where the image is scanned"
    job_suffix:
      default: ""
      description: "Suffix for the image name. You probably need this if you are building multiple images. For example building a <abc>/scanner image and a <abc>/web image."
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "fetch"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs to download artifacts from"

    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "Default branch reference"
    commit_ref:
      default: "$CI_COMMIT_REF_NAME"
      description: "Current commit reference"

    sbom_file:
      description: "The SBOM file to use for the scan"
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
    is_tag:
      default: '$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)'
      description: "Is the current commit a tag"
---
devguard:sbom_upload$[[ inputs.job_suffix ]]:
  tags:
    - "$[[ inputs.runner_tags ]]"
  stage: "$[[ inputs.stage ]]"
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]

  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"

  script:
    - echo "Running DevGuard Dependency Risk Identification..."
    - devguard-scanner sbom $[[ inputs.sbom_file ]] --origin="$[[ inputs.devguard_origin ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.commit_ref ]]" --isTag="$[[ inputs.is_tag ]]" --artifactName="$[[ inputs.devguard_artifact_name ]]" --webUI=$[[ inputs.devguard_web_ui ]] --failOnRisk=$[[ inputs.fail_on_risk ]] --failOnCVSS=$[[ inputs.fail_on_cvss ]]
