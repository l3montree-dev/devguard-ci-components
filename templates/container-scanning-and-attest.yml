      default: $DEVGUARD_TOKEN
    devguard_origin:
      description: "Origin of the resource/information (how it was generated). Examples: 'source-scanning', 'container-scanning', 'base-image'. (default 'DEFAULT')"
      default: DEFAULT
    devguard_web_ui:
      description: The DevGuard Web-UI Instance URL
      default: https://app.devguard.org
    default_ref:
      description: Default branch reference
      default: $CI_DEFAULT_BRANCH
    commit_ref:
      description: Current commit reference
      default: $CI_COMMIT_REF_NAME
    registry:
      description: Container registry URL
      default: $CI_REGISTRY
    registry_user:
      description: Container registry username
      default: $CI_REGISTRY_USER
    registry_password:
      description: Container registry password
      default: $CI_REGISTRY_PASSWORD
    image_tar_path:
      default: image.tar
      description: The path to the local image tar file to scan (e.g. image.tar). Used when image_tag is empty.
    image_tag:
      default: ""
      description: The (remote) OCI image reference to scan (e.g. ghcr.io/org/image:tag). If provided, this takes precedence over image_tar_path.
    fail_on_risk:
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
      default: critical
    fail_on_cvss:
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
      default: critical
    is_tag:
      description: Is the current commit a tag
      default: $(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    ignore_external_references:
      description: Whether to ignore external references in any discovered attestations. This is useful when you are using this component to scan your own built images which have a valid vex attestation.
      default: "false"
    ignore_upstream_attestations:
      default: "false"
      description: Whether to ignore upstream attestations when scanning the image.
    fetch_image_from_registry:
      default: "false"
      description: If the artifact size is too big for your GitLab instance and the image was pushed directly to the registry during build (small_artifact_registry=true), set this to true to pull the image from the registry for scanning instead of using a local tar artifact.
    supplyChainId:
      default: $CI_COMMIT_SHA
      description: The supply chain ID to use for the in-toto attestation
    ref:
      description: Current commit reference
      default: $CI_COMMIT_REF_NAME
    disable_job:
      default: "false"
      description: Whether to disable the job. This is useful when you want to conditionally disable this job in orchestration templates.
    attestations:
      description: |-
        List of attestations to create. Each item should have:
        - source: file path OR full URL (URLs are automatically detected and downloaded). Special string ARTIFACT_NAME will be replaced with URL-encoded artifact name.
        - predicate_type: the predicate type URL
      default: []
      type: array
    image:
      description: Container image to use for attestation
      default: $CI_REGISTRY_IMAGE
---

include: []
devguard:generate_tag$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
  stage: oci-image
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: fetch
    IMAGE_SUFFIX: $[[ inputs.image_suffix ]]
    DEVGUARD_ARTIFACT_NAME: $[[ inputs.devguard_artifact_name ]]
    ENV_FILENAME: generate_tag_$[[ inputs.upstream_version ]]_$[[ inputs.architecture ]].env
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main
    pull_policy: $[[ inputs.pull_policy ]]
  script: |
    echo "Running generate-tag job..."
    devguard-scanner generate-tag --imageSuffix "$IMAGE_SUFFIX" --imageVariant "$[[ inputs.image_variant ]]" --architecture "$[[ inputs.architecture ]]" --imagePath "$[[ inputs.image_path ]]" --ref "$CI_COMMIT_REF_NAME" --upstreamVersion "$[[ inputs.upstream_version ]]" >> ${ENV_FILENAME}
    echo "Tag generation completed. Generated tags:"
    cat ${ENV_FILENAME}
    echo "Filename: ${ENV_FILENAME}"
  artifacts:
    reports:
      dotenv: ${ENV_FILENAME}
    paths:
      - ${ENV_FILENAME}
devguard:container_scanning$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
  stage: oci-image
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - $[[ inputs.build_job_name ]]
  dependencies:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - $[[ inputs.build_job_name ]]
  variables:
    GIT_STRATEGY: fetch
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main
    pull_policy: $[[ inputs.pull_policy ]]
  script:
    - echo "Running DevGuard Container Scanning..."
    - 'echo "Image Tag: $[[ inputs.image_tag ]]"'
    - 'echo "Image Tar Path: $[[ inputs.image_tar_path ]]"'
    - 'echo "Fetch Image From Registry: $[[ inputs.fetch_image_from_registry ]]"'
    - 'echo "Origin: $[[ inputs.devguard_origin ]]"'
    - 'echo "Asset Name: $[[ inputs.devguard_asset_name ]]"'
    - 'echo "API URL: $[[ inputs.devguard_api_url ]]"'
    - 'echo "Path: $[[ inputs.image_tar_path ]]"'
    - 'echo "Default Ref: $[[ inputs.default_ref ]]"'
    - 'echo "Commit Ref: $[[ inputs.commit_ref ]]"'
    - 'echo "Is Tag: $[[ inputs.is_tag ]]"'
    - 'echo "Artifact Name: $[[ inputs.devguard_artifact_name ]]"'
    - 'echo "Web UI: $[[ inputs.devguard_web_ui ]]"'
    - 'echo "Fail on Risk: $[[ inputs.fail_on_risk ]]"'
    - 'echo "Fail on CVSS: $[[ inputs.fail_on_cvss ]]"'
    - |-
      echo "---"
      if [ "$[[ inputs.fetch_image_from_registry ]]" = "true" ]; then
          echo "Scanning remote image from registry: $IMAGE_TAG"
          devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
          devguard-scanner container-scanning \
              --origin="$[[ inputs.devguard_origin ]]" \
              --assetName="$[[ inputs.devguard_asset_name ]]" \
              --apiUrl="$[[ inputs.devguard_api_url ]]" \
              --token="$[[ inputs.devguard_token ]]" \
              --image="$IMAGE_TAG" \
              --defaultRef="$[[ inputs.default_ref ]]" \
              --ref="$[[ inputs.commit_ref ]]" \
              --isTag="$[[ inputs.is_tag ]]" \
              --artifactName="$[[ inputs.devguard_artifact_name ]]" \
              --webUI="$[[ inputs.devguard_web_ui ]]" \
              --failOnRisk="$[[ inputs.fail_on_risk ]]" \
              --failOnCVSS="$[[ inputs.fail_on_cvss ]]" \
              --ignoreExternalReferences=$[[ inputs.ignore_external_references ]] \
              --ignoreUpstreamAttestations=$[[ inputs.ignore_upstream_attestations ]]
      elif [ -n "$[[ inputs.image_tag ]]" ]; then
        echo "Scanning remote image: $[[ inputs.image_tag ]]"
        devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
        devguard-scanner container-scanning \
          --origin="$[[ inputs.devguard_origin ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --token="$[[ inputs.devguard_token ]]" \
          --image="$[[ inputs.image_tag ]]" \
          --defaultRef="$[[ inputs.default_ref ]]" \
          --ref="$[[ inputs.commit_ref ]]" \
          --isTag="$[[ inputs.is_tag ]]" \
          --artifactName="$[[ inputs.devguard_artifact_name ]]" \
          --webUI="$[[ inputs.devguard_web_ui ]]" \
          --failOnRisk="$[[ inputs.fail_on_risk ]]" \
          --failOnCVSS="$[[ inputs.fail_on_cvss ]]" \
          --ignoreExternalReferences=$[[ inputs.ignore_external_references ]] \
          --ignoreUpstreamAttestations=$[[ inputs.ignore_upstream_attestations ]]
      else
        echo "Scanning local tar file: $[[ inputs.image_tar_path ]]"
        devguard-scanner container-scanning \
          --origin="$[[ inputs.devguard_origin ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --token="$[[ inputs.devguard_token ]]" \
          --path="$[[ inputs.image_tar_path ]]" \
          --defaultRef="$[[ inputs.default_ref ]]" \
          --ref="$[[ inputs.commit_ref ]]" \
          --isTag="$[[ inputs.is_tag ]]" \
          --artifactName="$[[ inputs.devguard_artifact_name ]]" \
          --webUI="$[[ inputs.devguard_web_ui ]]" \
          --failOnRisk="$[[ inputs.fail_on_risk ]]" \
          --failOnCVSS="$[[ inputs.fail_on_cvss ]]"
      fi
devguard:push_oci_image$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
  stage: oci-image
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - devguard:container_scanning$[[ inputs.job_suffix ]]
    - $[[ inputs.build_job_name ]]
  dependencies:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - devguard:container_scanning$[[ inputs.job_suffix ]]
    - $[[ inputs.build_job_name ]]
  variables:
    GIT_STRATEGY: none
  image:
    name: registry.gitlab.com/l3montree/devguard/osscontainertools-kaniko-crane:kaniko-v1.27.3-devguard-scanner-v1.3.1@sha256:2966ade3c7d565ae56c48cfa50d5df6e36a5371f4173606eb4de57558186433d
    entrypoint:
      - ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $[[ inputs.disable_job ]] == "true"
      when: never
    - when: on_success
  script: |
    /crane auth login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]

    # Strip any "@sha256:..." digest suffix: the build job exports IMAGE_TAG as
    # "repo:tag@digest", and "crane push" against a tag+digest reference pushes by
    # digest only, never creating the tag that downstream jobs (manifest/sign/attest) need.
    IMAGE_REF="$IMAGE_TAG"
    IMAGE_REF="${IMAGE_REF%@*}"

    echo "Image: image.tar"
    echo "Image Tag: ${IMAGE_REF}"

    /crane push image.tar "${IMAGE_REF}"

    /devguard-scanner intoto run --step=deploy --materials="image.tar" --products="" --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]" --supplyChainOutputDigest="${DIGEST}" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.ref ]]" --isTag="$[[ inputs.is_tag ]]"
devguard:sign_oci_image$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
  stage: attestation
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - devguard:push_oci_image$[[ inputs.job_suffix ]]
  dependencies:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - devguard:push_oci_image$[[ inputs.job_suffix ]]
  variables:
    GIT_STRATEGY: none
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint:
      - ""
  script:
    - devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
    - devguard-scanner sign --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" "$IMAGE_TAG"
devguard:attest$[[ inputs.job_suffix ]]:
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint:
      - ""
  tags: $[[ inputs.runner_tags ]]
  stage: attestation
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:generate_tag$[[ inputs.job_suffix ]]
    - $[[ inputs.build_job_name ]]
    - devguard:container_scanning$[[ inputs.job_suffix ]]
    - devguard:push_oci_image$[[ inputs.job_suffix ]]
  variables:
    GIT_STRATEGY: none
  script: |
    echo "Attesting artifacts for $[[ inputs.image ]]"
    echo "Artifact Name: $[[ inputs.devguard_artifact_name ]]"
    echo "Asset Name: $[[ inputs.devguard_asset_name ]]"

    # URL encode artifact name for API calls
    API_ARTIFACT_NAME=$(python3 -c "from urllib.parse import quote; print(quote('$[[ inputs.devguard_artifact_name ]]', safe=''))")
    echo "API Encoded Artifact Name: $API_ARTIFACT_NAME"

    # Slugify the commit ref (replace special characters with hyphens)
    API_COMMIT_REF=$(devguard-scanner slug "$[[ inputs.commit_ref ]]")
    echo "Slugified Commit Ref: $API_COMMIT_REF"

    # Login to registry
    devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]

    echo 'Attestations: $[[ inputs.attestations ]]'

    ATT_JSON_CLEAN=$(echo '$[[ inputs.attestations ]]' \
    | sed 's/:\([a-z_]\+\)=>/"\1":/g' \
    | sed 's/=>/:/g' \
    | sed "s/'/\"/g")

    ATTESTATIONS_JSON=$(echo "$ATT_JSON_CLEAN" | jq . )

    # Process each attestation
    echo "$ATTESTATIONS_JSON" | jq -c '.[]' | while read -r attestation; do
      SOURCE=$(echo "$attestation" | jq -r '.source')
      PREDICATE_TYPE=$(echo "$attestation" | jq -r '.predicate_type')

      echo ""
      echo "========================================"
      echo "Processing attestation with predicate: $PREDICATE_TYPE"
      SOURCE=$(echo "$SOURCE" | envsubst)

      # Check if source is a URL (starts with http:// or https://)
      if [[ "$SOURCE" =~ ^https?:// ]]; then
        # Replace ARTIFACT_NAME placeholder with URL-encoded artifact name
        URL="${SOURCE//ARTIFACT_NAME/$API_ARTIFACT_NAME}"

        # Replace COMMIT_REF placeholder with URL-encoded commit ref
        URL="${URL//COMMIT_REF/$API_COMMIT_REF}"

        # Also handle any environment variable substitution
        URL=$(echo "$URL" | envsubst)

        # Extract filename from URL or use a default
        FILENAME=$(basename "$URL" | cut -d'?' -f1)
        if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
          FILENAME="downloaded-$(echo "$PREDICATE_TYPE" | md5sum | cut -d' ' -f1).json"
        fi

        echo "Downloading from URL: $URL"
        echo "Saving as: $FILENAME"

        devguard-scanner curl "$URL" --token="$[[ inputs.devguard_token ]]" > "/tmp/$FILENAME"
        FILE_PATH="/tmp/$FILENAME"
      else
        # It's a file path
        FILE_PATH="$SOURCE"
        echo "Using local file: $FILE_PATH"
      fi

      # Create attestation
      if [ -f "$FILE_PATH" ]; then
        echo "Creating attestation for $FILE_PATH"
        devguard-scanner attest "$FILE_PATH" \
          --predicateType="$PREDICATE_TYPE" \
          $[[ inputs.image ]] \
          --defaultRef="$[[ inputs.default_ref ]]" \
          --ref="$[[ inputs.commit_ref ]]" \
          --token="$[[ inputs.devguard_token ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --artifactName="$[[ inputs.devguard_artifact_name ]]"
        echo "✓ Attestation created successfully"
      else
        echo "✗ Warning: File $FILE_PATH not found, skipping attestation"
      fi
      echo "========================================"
    done

    echo ""
    echo "All attestations completed"
