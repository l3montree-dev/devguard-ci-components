spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"
    devguard_artifact_name:
      default: "source"
      description: "The name of the artifact you want to upload this vex to"
    stage:
      default: "test"
      description: "The stage where the scan is run"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    vex_file:
      description: "The VEX file to upload"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs that this job depends on"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    job_suffix:
      default: ""
      description: "A suffix to append to the job name (usefull when using the component several times in one pipeline)"
    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "Default branch reference"
    commit_ref:
      default: "$CI_COMMIT_REF_NAME"
      description: "Current commit reference"
    is_tag:
      default: "$(if [ \"$CI_COMMIT_TAG\" != \"\" ]; then echo \"true\"; else echo \"false\"; fi)"
      description: "Is the current commit a tag"
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "none"
---
variables:
  GIT_STRATEGY: $[[ inputs.git_strategy ]]
devguard:vex-upload:$[[ inputs.job_suffix ]]:
  stage: "$[[ inputs.stage ]]"
  tags:
    - $[[ inputs.runner_tags ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"
  script:
    - echo "Running DevGuard VeX Upload..."
    - devguard-scanner vex $[[ inputs.vex_file ]] --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.commit_ref ]]" --isTag="$[[ input.is_tag ]]" --artifactName="$[[ inputs.devguard_artifact_name ]]"
