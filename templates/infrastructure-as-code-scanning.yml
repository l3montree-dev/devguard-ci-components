spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"
    scan_stage:
      default: test
      description: The stage where the scan is run
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    allow_open_code_risk:
      default: true
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard web UI URL"
---
variables:
  GIT_STRATEGY: clone

devguard:infrastructure-as-code-scanning:
  stage: $[[ inputs.scan_stage ]]
  tags:
    - $[[ inputs.runner_tags ]]
  dependencies: []
  needs: []
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"
  script:
    - echo "Running DevGuard IaC Scanning..."
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "IS_TAG - $IS_TAG"
    - devguard-scanner iac --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --path="$CI_PROJECT_DIR" --defaultRef="$CI_DEFAULT_BRANCH" --ref="$CI_COMMIT_REF_NAME" --isTag="$IS_TAG" --webUI=$[[ inputs.web_ui ]]
  allow_failure: $[[ inputs.allow_open_code_risk ]]
