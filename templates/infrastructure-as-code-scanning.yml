spec:
  inputs:
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The DevGuard asset name"
    token:
      description: "The DevGuard token"
    scan_stage:
      default: test
      description: The stage where the scan is run
    scan_stage:
      default: test
      description: The stage where the scan is run
---
variables:
  GIT_STRATEGY: clone

devguard:infrastructure-as-code-scanning:
  stage: $[[ inputs.scan_stage ]]
  dependencies: []
  needs: []
  image:
    name: ghcr.io/l3montree-dev/devguard-scanner:main-latest
    pull_policy: always
  before_script:

    - git remote set-head origin -a
  script:
    - echo "Running DevGuard IaC Scanning..."
    - devguard-scanner iac --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --path="$CI_PROJECT_DIR"