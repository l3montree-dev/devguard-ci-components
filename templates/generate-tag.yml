spec:
  inputs:
    devguard_artifact_name:
      default: ""
      description: "The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If not provided, will use the generated PURL from the built image."
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "oci-image"
      description: "The pipeline stage for the job"
    job_suffix:
      default: ""
      description: "Suffix for the job name. You need this if you are using the component multiple times in one pipeline."
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "fetch"
    pull_policy:
      default: "always"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs to download artifacts from"

    image_suffix:
      default: "default"
      description: "Suffix for the image name (e.g. 'web'). Leave empty for no suffix."
    image_variant:
      default: ""
      description: "Variant for the image name (e.g., 'slim' for 'image-slim'). Leave empty for no variant."
    architecture:
      default: "amd64"
      description: "Target architecture (e.g., amd64 or arm64)"
    image_path:
      default: "$CI_REGISTRY_IMAGE"
      description: "Path to the built image (e.g., registry.example.com/project/image). If not provided, the job will attempt to discover the image from previous jobs."
    upstream_version:
      default: "0"
      description: "Upstream version to use for tag generation. If not provided, the job will ignore this parameter."
---
devguard:generate_tag$[[ inputs.job_suffix ]]:
  tags:
    - $[[ inputs.runner_tags ]]
  stage: $[[ inputs.stage ]]
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]
    IMAGE_SUFFIX: "$[[ inputs.image_suffix ]]"
    DEVGUARD_ARTIFACT_NAME: "$[[ inputs.devguard_artifact_name ]]"
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-6294329e-1764851400
    pull_policy: "$[[ inputs.pull_policy ]]"
  script: |
    echo "Running generate-tag job..."
    devguard-scanner generate-tag --imageSuffix "$IMAGE_SUFFIX" --imageVariant "$[[ inputs.image_variant ]]" --architecture "$[[ inputs.architecture ]]" --imagePath "$[[ inputs.image_path ]]" --ref "$CI_COMMIT_REF_NAME" --upstreamVersion "$[[ inputs.upstream_version ]]" >> generate_tag_$[[ inputs.upstream_version ]]_$[[ inputs.architecture ]].env
    echo "Tag generation completed. Generated tags:"
    cat generate_tag_$[[ inputs.upstream_version ]]_$[[ inputs.architecture ]].env
    echo 'Filename: generate_tag_$[[ inputs.upstream_version ]]_$[[ inputs.architecture ]].env'
  artifacts:
    reports:
      dotenv: generate_tag_$[[ inputs.upstream_version ]]_$[[ inputs.architecture ]].env
    paths: 
      - generate_tag_$[[ inputs.upstream_version ]]_$[[ inputs.architecture ]].env