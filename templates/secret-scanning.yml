spec:
  inputs:
    devguard_api_url:
      description: "The DevGuard API URL"
      default: "https://api.devguard.org"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard API token (your private key)"
      default: "$DEVGUARD_TOKEN"
    path:
      default: "$CI_PROJECT_DIR"
      description: "The path to the git repository to scan"
    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "The default branch reference"
    ref: 
      default: "$CI_COMMIT_REF_NAME"
      description: "The branch or tag reference to scan"
    stage:
      default: "test"
      description: "The stage where the scan is executed"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    pull_policy:
      default: "if-not-present"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
    allow_open_code_risk:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline (found risks will still be reported to DevGuard)"
    web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard Web-UI Instance URL"
    job_suffix:
      description: "A suffix to append to the job name (usefull when using the component several times in one pipeline)"
      default: "default"
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "clone"
---
devguard:secret_scanning_$[[ inputs.job_suffix ]]:
  stage: $[[ inputs.stage ]]
  tags:
    - $[[ inputs.runner_tags ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]
  image: 
    name: ghcr.io/l3montree-dev/devguard/scanner:v0.18.9@sha256:8b0829c908a39d54bd6f4e0a503d5e74b6fca9ae36d9434d7012974b830785e6
    pull_policy: "$[[ inputs.pull_policy ]]"
  script: 
    - echo "Running DevGuard Secret Scanning (using gitleaks git)..."
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "Running on a tag? $IS_TAG"
    - devguard-scanner secret-scanning --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --path="$[[ inputs.path ]]" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.ref ]]" --isTag="$IS_TAG" --webUI=$[[ inputs.web_ui ]]
  allow_failure: $[[ inputs.allow_open_code_risk ]]  