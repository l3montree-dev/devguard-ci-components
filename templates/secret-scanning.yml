spec:
  inputs:
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The DevGuard asset name"
    token:
      description: "The DevGuard token"
    scan_stage:
      default: "test"
      description: "The stage where the scan is run"
    verbose:
      default: "false"
      description: "Enable verbose output"
---
variables:
  GIT_STRATEGY: clone

devguard:secret-scanning:
  image:
    stage: $[[ inputs.scan_stage ]]
    dependencies: []
    needs: []
    image:
      name: ghcr.io/l3montree-dev/devguard-scanner:main-latest
      pull_policy: always
    before_script:
      - git remote set-head origin -a  
  script: gitleaks detect -b leaks-baseline.json --verbose=$[[ inputs.verbose ]]
