variables:
  GIT_STRATEGY: clone

spec:
  inputs:
    scan_stage:
      default: "test"
      description: "The stage where the scan is run"
    verbose:
      default: "false"
      description: "Enable verbose output"

---
devguard:secret-scanning:
  image:
    name: ghcr.io/gitleaks/gitleaks:v8.23.2@sha256:d09cbc6b5faa03d81ef4bf430f1a9b6468d992cd30f30ad213b0c53e057fc817
    entrypoint: [""]
  dependencies: []
  needs: []
  stage: $[[ inputs.scan_stage ]]
  script: gitleaks detect -b leaks-baseline.json --verbose=$[[ inputs.verbose ]]
