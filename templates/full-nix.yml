spec:
  inputs:
    devguard_asset_name:
      type: string
    devguard_api_url:
      type: string
      default: "https://api.devguard.opencode.de"
    devguard_token:
      type: string
      default: "$DEVGUARD_TOKEN"
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard Web-UI Instance URL"
    image_suffix:
      type: string
      default: ""
    create_root_manifest:
      default: '$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)'
      description: "Whether to create a root multi-architecture manifest for the built images (without ref name)."
    nix_target_amd64:
      description: "Nix flake build target for amd64 (e.g. coreutils-amd64)"
      type: string
    nix_target_arm64:
      description: "Nix flake build target for arm64 (e.g. coreutils-arm64)"
      type: string
    amd64_runner_tag:
      description: "Runner tag for amd64 builds"
      type: string
      default: "nix-target-amd64"
    arm64_runner_tag:
      description: "Runner tag for arm64 builds"
      type: string
      default: "nix-target-arm64"

    version:
      default: "main"
      description: "Version/ref of the devguard-ci-component templates to use"
    runner_tags:
      default: []
      type: array
      description: "The runner tags to use for scanning jobs"
    job_suffix:
      default: ""
      description: "Suffix for scanning job names"
    git_strategy:
      default: "fetch"
      description: "The Git strategy to use for scanning jobs"
    pull_policy:
      default: "always"
      description: "The pull policy for scanner container images"
    allow_failure:
      default: false
      type: boolean
      description: "Whether scanning jobs are allowed to fail without stopping the pipeline"
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail SCA/container scanning on. Options: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail SCA/container scanning on. Options: none, low, medium, high, critical"
---
.common: &common
  devguard_asset_name: "$[[ inputs.devguard_asset_name ]]"
  devguard_token: "$[[ inputs.devguard_token ]]"
  devguard_api_url: "$[[ inputs.devguard_api_url ]]"

include:
  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/secret-scanning.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/static-application-security-testing.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/infrastructure-as-code-scanning.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]

  - remote: "https://gitlab.com/l3montree/devguard/-/raw/$[[ inputs.version ]]/templates/software-composition-analysis.yml"
    inputs:
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      runner_tags: $[[ inputs.runner_tags ]]
      job_suffix: $[[ inputs.job_suffix ]]
      git_strategy: $[[ inputs.git_strategy ]]
      pull_policy: $[[ inputs.pull_policy ]]
      allow_failure: $[[ inputs.allow_failure ]]
      fail_on_cvss: $[[ inputs.fail_on_cvss ]]
      fail_on_risk: $[[ inputs.fail_on_risk ]]


build_image$[[ inputs.job_suffix ]]:
  stage: build
  parallel:
    matrix:
      - RUNNER_TAG: "$[[ inputs.amd64_runner_tag ]]"
        NIX_TARGET: "$[[ inputs.nix_target_amd64 ]]"
      - RUNNER_TAG: "$[[ inputs.arm64_runner_tag ]]"
        NIX_TARGET: "$[[ inputs.nix_target_arm64 ]]"
  trigger:
    strategy: depend
    include:
      - remote: "https://gitlab.com/l3montree/devguard-ci-components/-/raw/$[[ inputs.version ]]/templates/build-nix.yml"
        inputs:
          <<: *common
          nix_target: "${NIX_TARGET}"
          runner_tags:
            - "${RUNNER_TAG}"

      - remote: https://gitlab.com/l3montree/devguard-ci-components/-/raw/$[[ inputs.version ]]/templates/push-and-attest.yml
        inputs:
          <<: *common
          build_job_name: "devguard:build_oci_image$[[ inputs.job_suffix ]]"
          version: $[[ inputs.version ]]
          build_stage: build
          attest_stage: test
          image_suffix: $[[ inputs.image_suffix ]]
          architecture: ${ARCHITECTURE}


create_and_sign_manifest$[[ inputs.job_suffix ]]:
  stage: attestation
  variables:
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
  trigger:
    strategy: depend
    forward:
      pipeline_variables: true
    include:
      ##############################################
      - remote: https://gitlab.opencode.de/oci-community/tools/container-hardening-work-bench/-/raw/main/templates/collect-child-pipeline-artifacts.yml
        inputs:
          stage: "build"
          job_suffix: "$[[ inputs.job_suffix ]]"
          downstream_pipeline_trigger_job_name_prefix: "build_image$[[ inputs.job_suffix ]]:"
          parent_pipeline_id: $PARENT_PIPELINE_ID

      - remote: "https://gitlab.com/l3montree/devguard-ci-components/-/raw/$[[ inputs.version ]]/templates/create-manifest-multi-arch.yml"
        inputs:
          stage: "build"
          job_suffix: "$[[ inputs.job_suffix ]]"
          create_root_manifest: "$[[ inputs.create_root_manifest ]]"
          needs:
            - collect_child_pipeline_artifacts$[[ inputs.job_suffix ]]
          dependencies:
            - collect_child_pipeline_artifacts$[[ inputs.job_suffix ]]

      - remote: "https://gitlab.com/l3montree/devguard-ci-components/-/raw/$[[ inputs.version ]]/templates/sign-oci-image.yml"
        inputs:
          <<: *common
          image: $MANIFEST_IMAGE_TAG
          stage: "deploy"
          job_suffix: "$[[ inputs.job_suffix ]]"
          needs:
            - create_manifest_multi_arch$[[ inputs.job_suffix ]]
          dependencies:
            - create_manifest_multi_arch$[[ inputs.job_suffix ]]


