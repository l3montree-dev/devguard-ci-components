spec:
  inputs:
    devguard_api_url:
      description: "The DevGuard API URL"
      default: "https://api.devguard.org"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard API token (your private key)"
      default: "$DEVGUARD_TOKEN"

    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "sign"
      description: "The stage where the scan is executed"
    job_suffix:
      description: "A suffix to append to the job name (usefull when using the component several times in one pipeline)"
      default: ""
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "clone"
    pull_policy:
      default: "if-not-present"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      default: []
      type: array
      description: "List of jobs this scan depends on"
    dependencies:
      default: []
      type: array
      description: "List of jobs to download artifacts from"

    registry:
      default: "$CI_REGISTRY"
      description: "Container registry URL"
    registry_user:
      default: "$CI_REGISTRY_USER"
      description: "Container registry username"
    registry_password:
      default: "$CI_REGISTRY_PASSWORD"
      description: "Container registry password"

    images:
      description: "The image tags to sign (array)"
      type: array
---
devguard:sign_oci_image$[[ inputs.job_suffix ]]:
  tags:
    - $[[ inputs.runner_tags ]]
  stage: $[[ inputs.stage ]]
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]

  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest@sha256:8b0829c908a39d54bd6f4e0a503d5e74b6fca9ae36d9434d7012974b830785e6
    pull_policy: "$[[ inputs.pull_policy ]]"
    entrypoint: [""]

  parallel:
    matrix:
      - IMAGE: $[[ inputs.images ]]
  script:
    - devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
    - devguard-scanner sign --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" "$IMAGE"
