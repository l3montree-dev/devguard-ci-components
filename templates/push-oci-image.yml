spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"

    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "oci-image"
      description: "The stage where the image is scanned"
    job_suffix:
      default: ""
      description: "Suffix for the image name. You probably need this if you are building multiple images. For example building a <abc>/scanner image and a <abc>/web image."
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "none"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs to download artifacts from"

    registry:
      default: "$CI_REGISTRY"
      description: "Container registry URL"
    registry_user:
      default: "$CI_REGISTRY_USER"
      description: "Container registry username"
    registry_password:
      default: "$CI_REGISTRY_PASSWORD"
      description: "Container registry password"

    image:
      default: "image.tar"
      description: "The image file to build (e.g. image.tar)"
    image_tag:
      default: "$CI_REGISTRY_IMAGE"
      description: "The tag to use for the built image. Leave empty to use the generated tag from the 'generate-tag' component."
    supplyChainId:
      default: "$CI_COMMIT_SHA"
      description: "The supply chain ID to use for the in-toto attestation"
---
devguard:push_oci_image$[[ inputs.job_suffix ]]:
  tags:
    - $[[ inputs.runner_tags ]]
  stage: $[[ inputs.stage ]]
  allow_failure: $[[ inputs.allow_failure ]]
  dependencies: $[[ inputs.dependencies ]]
  needs: $[[ inputs.needs ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]

  image:
    name: registry.gitlab.com/l3montree/devguard/osscontainertools-kaniko-crane:kaniko-v1.26.0-devguard-scanner-v0.19.2-customized-busybox-jq@sha256:3a81ba6eb1c5e3ba8904faef26411a177dbbc0de2005bc0f2eb20ab9ee7f71a2
    entrypoint: [""]

  script: |
    /crane auth login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]

    echo "Image: $[[ inputs.image ]]"
    echo "Image Tag: $[[ inputs.image_tag ]]"

    /crane push $[[ inputs.image ]] $[[ inputs.image_tag ]]

    if [[ -z "$CI_COMMIT_TAG" ]]; then
      branch=$(echo $CI_COMMIT_REF_NAME | sed 's/\//-/g')
      /crane cp $[[ inputs.image_tag ]] $CI_REGISTRY_IMAGE:${branch}-latest
    else
      echo "Skipping -latest tag: Running on a Git tag."
    fi

    /devguard-scanner intoto run --step=deploy --materials="$[[ inputs.image ]]" --products="" --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]" --supplyChainOutputDigest="${DIGEST}"
