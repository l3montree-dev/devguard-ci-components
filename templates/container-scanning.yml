spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard web UI URL"
    scan_stage:
      default: "test"
      description: "The stage where the image is scanned"
    needs:
      type: array
      default:
        - "devguard:build-image:$[[ inputs.image_suffix ]]"
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default:
        - "devguard:build-image:$[[ inputs.image_suffix ]]"
      description: "The jobs to download artifacts from"
    artifact_name:
      default: ""
      description: "The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If not provided, will use the generated PURL from the built image."
    image_suffix:
      default: "default"
      description: "Suffix for the image name. You probably need this if you are building multiple images. For example building a <abc>/scanner image and a <abc>/web image."
    fetch_image_from_registry:
      default: "false"
      description: "Whether the image should be fetched from the registry or from the artifacts"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
---
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

devguard:container-scanning:$[[ inputs.image_suffix ]]:
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"
  stage: "$[[ inputs.scan_stage ]]"
  tags:
    - "$[[ inputs.runner_tags ]]"
  before_script: |
    if [ "$[[ inputs.fetch_image_from_registry ]]" == "true" ]; then
      crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
      crane pull $(cat image-tag.txt) image.tar
    fi

    # Determine artifact name: use PURL if no artifact_name provided, otherwise use provided name
    if [ -z "$[[ inputs.artifact_name ]]" ] && [ -f artifact-purl.txt ]; then
      ARTIFACT_NAME=$(cat artifact-purl.txt)
      echo "Using PURL as artifact name: $ARTIFACT_NAME"
    else
      ARTIFACT_NAME="$[[ inputs.artifact_name ]]"
      echo "Using provided artifact name: $ARTIFACT_NAME"
    fi
    export ARTIFACT_NAME
  script:
    - echo "Running DevGuard Container Scanning..."
    - echo "Artifact Name - $ARTIFACT_NAME"
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "IS_TAG - $IS_TAG"
    - devguard-scanner container-scanning --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --path="image.tar" --defaultRef="$CI_DEFAULT_BRANCH" --ref="$CI_COMMIT_REF_NAME" --isTag="$IS_TAG" --artifactName="$ARTIFACT_NAME" --webUI=$[[ inputs.devguard_web_ui ]] --failOnRisk=$[[ inputs.fail_on_risk ]] --failOnCVSS=$[[ inputs.fail_on_cvss ]]
