spec:
  inputs:
    api_url:
      default: 'https://api.main.devguard.org'
      description: 'The DevGuard API URL'
    asset_name:
      description: 'The DevGuard asset name'
    token:
      description: 'The DevGuard token'
    scan_stage:
      default: 'test'
      description: 'The stage where the image is scanned'
    do_risk_management:
      default: CI_COMMIT_TAG != null || $CI_COMMIT_BRANCH == "main"
      description: 'Whether the results of the scan should be used for risk management'
--- 

devguard:container-scanning:
  stage: "$[[ inputs.scan_stage ]]"
  image: ghcr.io/l3montree-dev/devguard-scanner:main-6d49f9ea-1731503037
  needs:
  - devguard:build-image
  dependencies:
  - devguard:build-image
  script:
  - echo "Running DevGuard Container Scanning..."
  - devguard-scanner container-scanning --riskManagement=false --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --path="image.tar"
  rules:
  - if: $[[ inputs.do_risk_management ]]
    when: never
  - when: always

devguard:container-scanning-risk-management:
  stage: "$[[ inputs.scan_stage ]]"
  image: ghcr.io/l3montree-dev/devguard-scanner:main-a2e00929-1731436946
  needs:
  - devguard:build-image
  dependencies:
  - devguard:build-image
  script:
  - echo "Running DevGuard Container Scanning..."
  - devguard-scanner container-scanning --riskManagement=true --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --path="image.tar"
  rules:
  - if: $[[ inputs.do_risk_management ]]
  