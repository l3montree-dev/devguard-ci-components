spec:
  inputs:
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The DevGuard asset name"
    token:
      description: "The DevGuard token"
    scan_stage:
      default: "test"
      description: "The stage where the image is scanned"
    fetch_image_from_registry:
      default: "false"
      description: "Whether the image should be fetched from the registry or from the artifacts"
---
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

.devguard:container-scanning-base:
  image:
    name: ghcr.io/l3montree-dev/devguard-scanner:main-latest
    pull_policy: always
  stage: "$[[ inputs.scan_stage ]]"
  needs:
    - devguard:build-image
  dependencies:
    - devguard:build-image
  before_script: |
    if [ "$[[ inputs.fetch_image_from_registry ]]" == "true" ]; then
      crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
      crane pull $(cat image-tag.txt) image.tar
    fi
    git remote set-head origin -a
devguard:container-scanning:
  extends: .devguard:container-scanning-base
  script:
    - echo "Running DevGuard Container Scanning..."
    - devguard-scanner container-scanning --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --path="image.tar"
