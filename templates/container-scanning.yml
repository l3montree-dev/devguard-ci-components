spec:
  inputs:
    api_url:
      default: 'https://api.main.devguard.org'
      description: 'The DevGuard API URL'
    asset_name:
      description: 'The DevGuard asset name'
    token:
      description: 'The DevGuard token'
    build_stage:
      default: 'build'
      description: 'The stage where the image is built and tagged'
    build_args:
      default: ''
      description: 'The build arguments to pass to the Docker build command'
    build_context:
      default: $CI_PROJECT_DIR
      description: 'The build context to pass to the Docker build command'    
    build_dockerfile:
      default: $CI_PROJECT_DIR/Dockerfile
      description: 'The Dockerfile to pass to the Docker build command'  
    build_args:
      type: array
      default: []  
      description: 'The build arguments to pass to the Docker build command'
    scan_stage:
      default: 'test'
      description: 'The stage where the image is scanned'
---

# OCI Build: Uses Kaniko to build Docker images securely without requiring privileged access (docker in docker needs privileged access). The artifacts are not pushed to the registry until they have undergone security scanning to ensure vulnerabilities are addressed before deployment - therefore they are stored as artifacts rather than pushed to the registry.
devguard:build-image:
  stage: "$[[ inputs.build_stage ]]"
  needs: []
  dependencies: []
  image:
    name: gcr.io/kaniko-project/executor:v1.22.0-debug@sha256:7b3699e9e105521075812cd3f3f4c62c913cb5cd113c929975502022df3bcf60 # gitlab ci always needs a shell in the container it executes... i would have preferred the non-debug version
    entrypoint: [""]
  before_script:
  - echo "Uses Kaniko to build Docker images securely without requiring privileged access (docker in docker needs privileged access).\n The artifacts are not pushed to the registry until they have undergone security scanning to ensure vulnerabilities are addressed before deployment - therefore they are stored as artifacts rather than pushed to the registry."
  - |
    if [ -n "$CI_COMMIT_TAG" ]; then
      # Set IMAGE_TAG if the pipeline was triggered by a tag
      echo "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" > image-tag.txt
    else
      # Set IMAGE_TAG if the pipeline was triggered by a push to main
      branch=$(echo $CI_COMMIT_REF_NAME | sed 's/\//-/g')
      sha=${CI_COMMIT_SHORT_SHA}
      ts=$(date +%s)
      echo "$CI_REGISTRY_IMAGE:${branch}-${sha}-${ts}" > image-tag.txt
    fi
  script:
   - |

    kaniko_cmd="/kaniko/executor --cleanup --no-push --build-arg $[[inputs.build_args]] --context $[[inputs.build_context]] --dockerfile $[[inputs.build_dockerfile]] --destination $(cat image-tag.txt) --tarPath image.tar"
 
    for arg in "${inputs.build_args[@]}"; do
      kaniko_cmd="${kaniko_cmd} --build-arg ${arg}"
    done

    eval $kaniko_cmd
  artifacts:
    paths:
    - image.tar
    - image-tag.txt
    when: on_success


devguard:container-scanning:
  stage: "$[[ inputs.scan_stage ]]"
  image: ghcr.io/l3montree-dev/devguard-scanner:main-7e94178b-1727680457
  needs:
  - devguard:build-image
  dependencies:
  - devguard:build-image
  script:
  - echo "Running DevGuard Container Scanning..."
  - devguard-scanner container-scanning --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --path="image.tar"
