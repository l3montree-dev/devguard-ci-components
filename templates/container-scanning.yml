spec:
  inputs:
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The DevGuard asset name"
    token:
      description: "The DevGuard token"
    scan_stage:
      default: "test"
      description: "The stage where the image is scanned"
    artifact_name:
      description: "The name of the artifact that contains the image. This is used to pass the image to the container scanning job."  
    fetch_image_from_registry:
      default: "false"
      description: "Whether the image should be fetched from the registry or from the artifacts"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"        
---
variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

.devguard:container-scanning-base:
  image:
    name: ghcr.io/l3montree-dev/devguard-scanner:main-latest
    pull_policy: always
  stage: "$[[ inputs.scan_stage ]]"
  tags:
    - "$[[ inputs.runner_tags ]]"
  needs:
    - devguard:build-image:$[[ inputs.artifact_name ]]
  dependencies:
    - devguard:build-image:$[[ inputs.artifact_name ]]
  before_script: |
    if [ "$[[ inputs.fetch_image_from_registry ]]" == "true" ]; then
      crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
      crane pull $(cat image-tag.txt) image.tar
    fi
    git remote set-head origin -a
devguard:container-scanning:
  extends: .devguard:container-scanning-base
  script:
    - echo "Running DevGuard Container Scanning..."
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "IS_TAG - $IS_TAG"
    - devguard-scanner container-scanning --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]" --token="$[[ inputs.token ]]" --path="image.tar" --defaultRef="$CI_DEFAULT_BRANCH" --ref="$CI_COMMIT_REF_NAME" --isTag="$IS_TAG" --artifactName="$[[ inputs.artifact_name ]]"
