spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The url of the API to send the scan request to (default 'https://api.devguard.org')"
    devguard_asset_name:
      description: "The id of the asset which is scanned (your repository in DevGuard)"
    devguard_origin:
      default: "DEFAULT"
      description: "Origin of the SBOM (how it was generated). Examples: 'source-scanning', 'container-scanning', 'base-image'. Default: 'container-scanning'. (default 'DEFAULT')"
    devguard_token:
      description: "The DevGuard token"
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard web UI URL"
    devguard_artifact_name:
      default: ""
      description: "The name of the artifact you are building. This is useful when a single pipeline builds more than a single artifact like a container with a shell inside and one without. If not provided, will use the generated PURL from the built image."

    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "test"
      description: "The stage where the image is scanned"
    job_suffix:
      default: ""
      description: "Suffix for the image name. You probably need this if you are building multiple images. For example building a <abc>/scanner image and a <abc>/web image."
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "fetch"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs to download artifacts from"

    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "Default branch reference"
    commit_ref:
      default: "$CI_COMMIT_REF_NAME"
      description: "Current commit reference"

    registry:
      default: "$CI_REGISTRY"
      description: "Container registry URL"
    registry_user:
      default: "$CI_REGISTRY_USER"
      description: "Container registry username"
    registry_password:
      default: "$CI_REGISTRY_PASSWORD"
      description: "Container registry password"

    image_tar_path:
      default: "image.tar"
      description: "The path to the local image tar file to scan (e.g. image.tar). Used when remote_image is empty."
    remote_image:
      default: ""
      description: "The remote OCI image reference to scan (e.g. ghcr.io/org/image:tag). If provided, this takes precedence over image_tar_path."
    
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
    is_tag:
      default: '$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)'
      description: "Is the current commit a tag"
---
devguard:container_scanning$[[ inputs.job_suffix ]]:
  tags:
    - "$[[ inputs.runner_tags ]]"
  stage: "$[[ inputs.stage ]]"
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"
  script:
    - echo "Running DevGuard Container Scanning..."
    - |
      if [ -n "$[[ inputs.remote_image ]]" ]; then
        echo "Scanning remote image: $[[ inputs.remote_image ]]"
        devguard-scanner login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
        devguard-scanner container-scanning \
          --origin="$[[ inputs.devguard_origin ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --token="$[[ inputs.devguard_token ]]" \
          --image="$[[ inputs.remote_image ]]" \
          --defaultRef="$[[ inputs.default_ref ]]" \
          --ref="$[[ inputs.commit_ref ]]" \
          --isTag="$[[ inputs.is_tag ]]" \
          --artifactName="$[[ inputs.devguard_artifact_name ]]" \
          --webUI="$[[ inputs.devguard_web_ui ]]" \
          --failOnRisk="$[[ inputs.fail_on_risk ]]" \
          --failOnCVSS="$[[ inputs.fail_on_cvss ]]"
      else
        echo "Scanning local tar file: $[[ inputs.image_tar_path ]]"
        devguard-scanner container-scanning \
          --origin="$[[ inputs.devguard_origin ]]" \
          --assetName="$[[ inputs.devguard_asset_name ]]" \
          --apiUrl="$[[ inputs.devguard_api_url ]]" \
          --token="$[[ inputs.devguard_token ]]" \
          --path="$[[ inputs.image_tar_path ]]" \
          --defaultRef="$[[ inputs.default_ref ]]" \
          --ref="$[[ inputs.commit_ref ]]" \
          --isTag="$[[ inputs.is_tag ]]" \
          --artifactName="$[[ inputs.devguard_artifact_name ]]" \
          --webUI="$[[ inputs.devguard_web_ui ]]" \
          --failOnRisk="$[[ inputs.fail_on_risk ]]" \
          --failOnCVSS="$[[ inputs.fail_on_cvss ]]"
      fi
