spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The url of the API to send the scan request to (default 'https://api.devguard.org')"
    devguard_asset_name:
      description: "DevGuard asset name (e.g., @opencode/projects/oci/assets/k8s-tools)"
      default: "$DEVGUARD_ASSET_NAME"
    devguard_token:
      description: "The DevGuard API token (use CI/CD variable, your private key)"
      default: "$DEVGUARD_TOKEN"
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "oci-image"
      description: "The pipeline stage for the job"
    job_suffix:
      default: ""
      description: "Suffix for the job name. You need this if you are using the component multiple times in one pipeline."
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "fetch"
    pull_policy:
      default: "always"
      description: "The pull policy for the container image (can be [always, if-not-present, never])"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      default: []
      type: array
      description: "List of jobs this attestation depends on"
    dependencies:
      default: []
      type: array
      description: "List of jobs to download artifacts from"

    registry:
      default: "$CI_REGISTRY"
      description: "Container registry URL"
    registry_user:
      default: "$CI_REGISTRY_USER"
      description: "Container registry username"
    registry_password:
      default: "$CI_REGISTRY_PASSWORD"
      description: "Container registry password"

    image:
      default: "image.tar"
      description: "The image file to build (e.g. image.tar)"
    image_tag:
      default: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      description: "The tag to use for the built image"
    build_args:
      default: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile"
      description: "The build arguments to pass to the Kaniko build command"
    push_image:
      default: "false"
      description: "If your GitLab instance has small artifact size limits, set this to true to push the image to the registry instead of uploading artifacts."
    supplyChainId:
      default: "$CI_COMMIT_SHA"
      description: "The supply chain ID to use for the in-toto attestation"
---
devguard:build_oci_image$[[ inputs.job_suffix ]]:
  tags:
    - $[[ inputs.runner_tags ]]
  stage: "$[[ inputs.stage ]]"
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]

  image:
    name: registry.gitlab.com/l3montree/devguard/osscontainertools-kaniko-crane:kaniko-v1.26.0-devguard-scanner-v0.19.2-customized-busybox-jq@sha256:3a81ba6eb1c5e3ba8904faef26411a177dbbc0de2005bc0f2eb20ab9ee7f71a2
    pull_policy: $[[ inputs.pull_policy ]]
    entrypoint: [""]

  before_script:
    - apk add jq
    - echo "Uses Kaniko to build Docker images securely without requiring privileged access (docker in docker needs privileged access).\n The artifacts are not pushed to the registry until they have undergone security scanning to ensure vulnerabilities are addressed before deployment - therefore they are stored as artifacts rather than pushed to the registry."
    - |
      /devguard-scanner intoto start --step=build --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]"
  script:
    - /crane auth login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
    - /kaniko/executor $[[ inputs.build_args ]] --ignore-path=/devguard-scanner --ignore-path=/crane --destination $[[ inputs.image_tag ]] $( [ "$[[ inputs.push_image ]]" = "false" ] && echo "--no-push --tarPath $[[ inputs.image ]]" )

      # kaniko might remove all files after building - thus a second login is necessary.
    - /crane auth login -u $[[ inputs.registry_user ]] -p $[[ inputs.registry_password ]] $[[ inputs.registry ]]
    - /crane digest $([[ "$[[ inputs.push_image ]]" == "false" ]] && echo "--tarball=$[[ inputs.image ]]" || echo "$[[ inputs.image_tag ]]" ) > image-digest.txt

    - |
      echo "Running DevGuard Intoto Build...stopping..."
      /devguard-scanner intoto stop --step=build --products=image-digest.txt --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]" --generateSlsaProvenance
  artifacts:
    paths:
      - $[[ inputs.image ]]
      - image-digest.txt
      - build.provenance.json
    when: on_success
