spec:
  inputs:
    token:
      description: "The DevGuard token"
    sign_stage:
      default: "deploy"
      description: "The stage where the scan is run"
    api_url:
      default: "https://api.main.devguard.org"
      description: "The DevGuard API URL"
    asset_name:
      description: "The DevGuard asset name"
    runner_tag:
      default: ""
      description: "The runner tag to use for the job"        
---
variables:
  GIT_STRATEGY: clone

devguard:sign:
  stage: "$[[ inputs.sign_stage ]]"
  tags:
    - $[[ inputs.runner_tag ]]
  image:
    name: ghcr.io/l3montree-dev/devguard-scanner:main-latest
    pull_policy: always
    entrypoint: [""]
  script:
    - devguard-scanner login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - devguard-scanner sign --token="$[[ inputs.token ]]" "$(cat image-tag.txt)@$(cat image-digest.txt)" --assetName="$[[ inputs.asset_name ]]" --apiUrl="$[[ inputs.api_url ]]"
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
