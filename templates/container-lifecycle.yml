spec:
  inputs:
    # Stage Configuration
    build_stage:
      default: "build"
      description: "The stage where the build runs"
    scan_stage:
      default: "test"
      description: "The stage where scanning runs"
    deploy_stage:
      default: "deploy"
      description: "The stage where signing and attestation runs"
    
    # DevGuard Configuration
    devguard_token:
      description: "The token to authenticate against the DevGuard API"
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The name of the asset"
    devguard_artifact_name:
      description: "The name of the artifact you are building. Leave empty to use the generated PURL from the built image."
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard Web UI base URL"
    devguard_origin:
      default: "DEFAULT"
      description: "Origin string for DevGuard requests (e.g., 'container-scanning')."
    
    # Build Configuration
    build_args:
      default: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile"
      description: "The build arguments to pass to the Kaniko build command"
    push_image:
      default: "true"
      description: "Whether to push the image to the registry"
    image:
      default: "image.tar"
      description: "Path to tar file created by Kaniko for scanning"
    image_tag:
      default: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      description: "Tag for the built image"
    
    # Job suffix used to disambiguate job names across multiple instances
    job_suffix:
      default: ""
      description: "Suffix for the job name. Provide when using the component multiple times in a pipeline."
    
    # Scanning Configuration
    fail_on_risk:
      default: "critical"
      description: "The risk level to fail the job on. Options are: none, low, medium, high, critical"
    fail_on_cvss:
      default: "critical"
      description: "The CVSS score to fail the job on. Options are: none, low, medium, high, critical"
    ignore_external_references:
      default: "false"
      description: "Whether to ignore external references in discovered attestations"
    ignore_upstream_attestations:
      default: "false"
      description: "Whether to ignore attestations from upstream images"
    
    # Job Configuration
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    registry:
      default: "$CI_REGISTRY"
      description: "Container registry URL"
    registry_user:
      default: "$CI_REGISTRY_USER"
      description: "Container registry username"
    registry_password:
      default: "$CI_REGISTRY_PASSWORD"
      description: "Container registry password"    
    # Component version
    version:
      default: "main"
      description: "Version/ref of the components to use"
---
include:
  # 1. Build OCI Image
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/build-oci-image@$[[ inputs.version ]]
    inputs:
      stage: $[[ inputs.build_stage ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      runner_tags: $[[ inputs.runner_tags ]]
      pull_policy: $[[ inputs.pull_policy ]]
      job_suffix: $[[ inputs.job_suffix ]]
      registry: $[[ inputs.registry ]]
      registry_user: $[[ inputs.registry_user ]]
      registry_password: $[[ inputs.registry_password ]]
      image: $[[ inputs.image ]]
      image_tag: $[[ inputs.image_tag ]]
      build_args: $[[ inputs.build_args ]]
      push_image: $[[ inputs.push_image ]]
      supplyChainId: $[[ inputs.supplyChainId ]]

  # 2. Container Scanning
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/container-scanning@$[[ inputs.version ]]
    inputs:
      stage: $[[ inputs.scan_stage ]]
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_artifact_name: $[[ inputs.devguard_artifact_name ]]
      devguard_origin: $[[ inputs.devguard_origin ]]
      devguard_web_ui: $[[ inputs.devguard_web_ui ]]
      job_suffix: $[[ inputs.job_suffix ]]
      runner_tags: $[[ inputs.runner_tags ]]
      pull_policy: $[[ inputs.pull_policy ]]
      fail_on_risk: $[[ inputs.fail_on_risk ]]
      fail_on_cvss: $[[ inputs.fail_on_cvss ]]
      registry: $[[ inputs.registry ]]
      registry_user: $[[ inputs.registry_user ]]
      registry_password: $[[ inputs.registry_password ]]
      image: $[[ inputs.image ]]
      image_tag: $[[ inputs.image_tag ]]
      image_tar_path: $[[ inputs.image ]]
      ignore_external_references: $[[ inputs.ignore_external_references ]]
      ignore_upstream_attestations: $[[ inputs.ignore_upstream_attestations ]]

  # 3. Sign Image
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/sign-oci-image@$[[ inputs.version ]]
    inputs:
      stage: $[[ inputs.deploy_stage ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      runner_tags: $[[ inputs.runner_tags ]]
      pull_policy: $[[ inputs.pull_policy ]]
      job_suffix: $[[ inputs.job_suffix ]]
      registry: $[[ inputs.registry ]]
      registry_user: $[[ inputs.registry_user ]]
      registry_password: $[[ inputs.registry_password ]]
      images: $[[ inputs.images ]]

  # 4. Attest
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/attest@$[[ inputs.version ]]
    inputs:
      stage: $[[ inputs.deploy_stage ]]
      devguard_token: $[[ inputs.devguard_token ]]
      devguard_api_url: $[[ inputs.devguard_api_url ]]
      devguard_asset_name: $[[ inputs.devguard_asset_name ]]
      devguard_artifact_name: $[[ inputs.devguard_artifact_name ]]
      runner_tags: $[[ inputs.runner_tags ]]
      pull_policy: $[[ inputs.pull_policy ]]
      registry: $[[ inputs.registry ]]
      registry_user: $[[ inputs.registry_user ]]
      registry_password: $[[ inputs.registry_password ]]
      image: $[[ inputs.image_tag ]]
      attestations:
        - source: "$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/$CI_COMMIT_REF_NAME/artifacts/ARTIFACT_NAME/sbom.json/"
          predicate_type: "https://cyclonedx.org/bom"
        - source: "$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/$CI_COMMIT_REF_NAME/artifacts/ARTIFACT_NAME/vex.json/"
          predicate_type: "https://cyclonedx.org/vex"
        - source: "$[[ inputs.devguard_api_url ]]/api/v1/organizations/$[[ inputs.devguard_asset_name ]]/refs/$CI_COMMIT_REF_NAME/sarif.json/"
          predicate_type: "https://www.schemastore.org/schemas/json/sarif-2.1.0.json"
        - source: "build.provenance.json"
          predicate_type: "https://slsa.dev/provenance/v1"