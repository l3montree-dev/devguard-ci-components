spec:
  inputs:
    release_stage:
      default: "release"
      description: "The stage where the release should be created"
    release_description:
      description: "Custom release description (optional, leave empty for auto-generated)"
      default: ""
    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    needs:
      default: []
      type: array
      description: "List of jobs this release depends on"
    dependencies:
      default: []
      type: array
      description: "List of jobs to download artifacts from"
---
devguard:release:
  stage: $[[ inputs.release_stage ]]
  tags:
    - $[[ inputs.runner_tags ]]
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Release $CI_COMMIT_TAG"
    description: |
      $[[ inputs.release_description ]]

      ## 📦 Release Assets

      See attached artifacts below for binaries, checksums, and attestations.
  artifacts:
    paths:
      - dist/
    expire_in: never
