#
# Builds a Nix flake OCI image output and produces the same artifact contract
# as build-oci-image.yml (image.tar, image-digest.txt, build.provenance.json)
# so that container-scanning, push-oci-image, sign-oci-image, and attest
# work unchanged.
#
# Adapted from the container-hardening-work-bench build-nix.yml pattern:
# https://gitlab.opencode.de/open-code/oci/container-hardening-work-bench
#
# The devguard-scanner binary is extracted from the scanner image in a
# .pre job and passed as an artifact, avoiding a download in every job.
#
# Requirements:
#   • GitLab runner must be Linux x86_64.
#   • No remote Nix builder needed — buildLayeredImage targets Linux natively.
spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The url of the DevGuard API"
    devguard_asset_name:
      default: "$DEVGUARD_ASSET_NAME"
      description: "DevGuard asset name (e.g., l3montree-cybersecurity/projects/devguard/assets/devguard)"
    devguard_token:
      default: "$DEVGUARD_TOKEN"
      description: "The DevGuard API token"

    nix_target:
      description: "Flake output attribute to build (e.g. devguardOCI, devguardScannerOCI). Must be a dockerTools.buildLayeredImage derivation."

    image:
      default: "image.tar"
      description: "Filename for the produced OCI image tarball."

    job_suffix:
      default: ""
      description: "Suffix appended to the job name. Use when including this template multiple times."
    stage:
      default: "oci-image"
      description: "Pipeline stage for the build job."
    runner_tags:
      default: []
      type: array
      description: "Runner tags to use."
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail."
    needs:
      default: []
      type: array
      description: "Jobs this build depends on."
    dependencies:
      default: []
      type: array
      description: "Jobs to download artifacts from."

    supplyChainId:
      default: "$CI_COMMIT_SHA"
      description: "Supply chain ID forwarded to intoto provenance."
---

# Extract the devguard-scanner binary once and share it as a job artifact.
# Mirrors the `.pre` scanner job in container-hardening-work-bench/build-nix.yml.
devguard:extract_scanner$[[ inputs.job_suffix ]]:
  stage: .pre
  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    entrypoint: [""]
  script:
    - cp /usr/local/bin/devguard-scanner ./devguard-scanner
  artifacts:
    paths:
      - devguard-scanner

devguard:build_oci_image$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
  stage: "$[[ inputs.stage ]]"
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:extract_scanner$[[ inputs.job_suffix ]]
    - $[[ inputs.needs ]]
  dependencies:
    - devguard:extract_scanner$[[ inputs.job_suffix ]]
    - $[[ inputs.dependencies ]]
  image:
    name: nixos/nix@sha256:0b1530edf840d9af519c7f3970cafbbed68d9d9554a83cc9adc04099753117e1
    entrypoint: ["/bin/sh", "-c"]
  before_script:
    - chmod +x ./devguard-scanner
    - mkdir -p /etc/nix
    - |
      cat > /etc/nix/nix.conf << 'EOF'
      sandbox = false
      filter-syscalls = false
      experimental-features = nix-command flakes
      EOF
  script:
    - ./devguard-scanner intoto start
        --ignore=devguard-scanner
        --step=build
        --token="$[[ inputs.devguard_token ]]"
        --apiUrl="$[[ inputs.devguard_api_url ]]"
        --assetName="$[[ inputs.devguard_asset_name ]]"
        --supplyChainId="$[[ inputs.supplyChainId ]]"
    - nix build -L ".#$[[ inputs.nix_target ]]" --no-update-lock-file
    - cp -L result "$[[ inputs.image ]]"
    # Compute image digest using crane from nixpkgs (no extra install needed).
    - nix run nixpkgs#crane -- digest --tarball="$[[ inputs.image ]]" > image-digest.txt
    - ./devguard-scanner intoto stop
        --ignore=devguard-scanner
        --step=build
        --products=image-digest.txt
        --token="$[[ inputs.devguard_token ]]"
        --apiUrl="$[[ inputs.devguard_api_url ]]"
        --assetName="$[[ inputs.devguard_asset_name ]]"
        --supplyChainId="$[[ inputs.supplyChainId ]]"
        --generateSlsaProvenance
  artifacts:
    paths:
      - $[[ inputs.image ]]
      - image-digest.txt
      - build.provenance.json
    when: on_success
