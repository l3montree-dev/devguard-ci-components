devguard:build_oci_image$[[ inputs.job_suffix ]]:
  tags: $[[ inputs.runner_tags ]]
  stage: $[[ inputs.stage ]]
  allow_failure: $[[ inputs.allow_failure ]]
  needs:
    - devguard:extract_scanner$[[ inputs.job_suffix ]]
    - $[[ inputs.needs ]]
  dependencies:
    - devguard:extract_scanner$[[ inputs.job_suffix ]]
    - $[[ inputs.dependencies ]]
  image:
    name: nixos/nix@sha256:0b1530edf840d9af519c7f3970cafbbed68d9d9554a83cc9adc04099753117e1
    entrypoint:
      - /bin/sh
      - -c
  before_script:
    - chmod +x ./devguard-scanner
    - mkdir -p /etc/nix
    - |-
      cat > /etc/nix/nix.conf << EOF
      sandbox = false
      filter-syscalls = false
      experimental-features = nix-command flakes
      $([[ -n "$[[ inputs.nix_cache_substituter ]]" ]] && echo "substituters = https://cache.nixos.org $[[ inputs.nix_cache_substituter ]]" || true)
      $([[ -n "$[[ inputs.nix_cache_public_key ]]" ]] && echo "trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= $[[ inputs.nix_cache_public_key ]]" || true)
      EOF
    - |-
      if [[ -n "$NIX_CACHE_SECRET_KEY" ]]; then
        echo "$NIX_CACHE_SECRET_KEY" > /tmp/nix-cache-priv-key.pem
      fi
    - |-
      mkdir -p ~/.aws
      echo "[profile nix-cache]" >> ~/.aws/config
      echo "s3.addressing_style = path" >> ~/.aws/config
  script:
    - ./devguard-scanner intoto start --ignore=devguard-scanner --step=build --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]"
    - nix build -L ".#$[[ inputs.nix_target ]]" --no-update-lock-file
    - gzip -cd result > "$[[ inputs.image ]]"
    - |-
      if [[ -n "$[[ inputs.nix_cache_s3_endpoint ]]" && -n "$NIX_CACHE_AWS_ACCESS_KEY_ID" ]]; then
        export AWS_ACCESS_KEY_ID="$NIX_CACHE_AWS_ACCESS_KEY_ID"
        export AWS_SECRET_ACCESS_KEY="$NIX_CACHE_AWS_SECRET_ACCESS_KEY"
        nix copy $(nix-store -qR $(readlink result)) --to 's3://$[[ inputs.nix_cache_s3_bucket ]]?endpoint=$[[ inputs.nix_cache_s3_endpoint ]]&region=$[[ inputs.nix_cache_region ]]&scheme=https&profile=nix-cache&secret-key=/tmp/nix-cache-priv-key.pem' || true
      fi
    - nix run nixpkgs#crane -- digest --tarball="$[[ inputs.image ]]" > image-digest.txt
    - ./devguard-scanner intoto stop --ignore=devguard-scanner --step=build --products=image-digest.txt --token="$[[ inputs.devguard_token ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --assetName="$[[ inputs.devguard_asset_name ]]" --supplyChainId="$[[ inputs.supplyChainId ]]" --generateSlsaProvenance
  artifacts:
    paths:
      - $[[ inputs.image ]]
      - image-digest.txt
      - build.provenance.json
    when: on_success
