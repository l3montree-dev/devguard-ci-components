spec:
  inputs:
    devguard_api_url:
      default: "https://api.devguard.org"
      description: "The DevGuard API URL"
    devguard_asset_name:
      description: "The DevGuard asset name"
    devguard_token:
      description: "The DevGuard token"
    devguard_web_ui:
      default: "https://app.devguard.org"
      description: "The DevGuard Web-UI Instance URL"

    runner_tags:
      default: ""
      description: "The runner tag to use for the job"
    stage:
      default: "test"
      description: "The stage where the image is scanned"
    job_suffix:
      default: ""
      description: "Suffix for the image name. You probably need this if you are building multiple images. For example building a <abc>/scanner image and a <abc>/web image."
    git_strategy:
      description: "The Git strategy to use for the job"
      default: "fetch"
    pull_policy:
      default: "always"
      description: "The pull policy for the Docker image"
    allow_failure:
      default: false
      type: boolean
      description: "Whether the job is allowed to fail without stopping the pipeline"
    needs:
      type: array
      default: []
      description: "The jobs that this job depends on"
    dependencies:
      type: array
      default: []
      description: "The jobs to download artifacts from"

    path:
      default: "$CI_PROJECT_DIR"
      description: "The path to the git repository to scan"
    default_ref:
      default: "$CI_DEFAULT_BRANCH"
      description: "The default branch reference"
    commit_ref:
      default: "$CI_COMMIT_REF_NAME"
      description: "The branch or tag reference to scan"
---
devguard:static-application-security-testing:
  tags:
    - $[[ inputs.runner_tags ]]
  stage: $[[ inputs.stage ]]
  allow_failure: $[[ inputs.allow_failure ]]
  needs: $[[ inputs.needs ]]
  dependencies: $[[ inputs.dependencies ]]
  variables:
    GIT_STRATEGY: $[[ inputs.git_strategy ]]

  image:
    name: ghcr.io/l3montree-dev/devguard/scanner:main-latest
    pull_policy: "$[[ inputs.pull_policy ]]"

  script:
    - echo "Running DevGuard SAST..."
    - export IS_TAG=$(if [ "$CI_COMMIT_TAG" != "" ]; then echo "true"; else echo "false"; fi)
    - echo "IS_TAG - $IS_TAG"
    - devguard-scanner sast --assetName="$[[ inputs.devguard_asset_name ]]" --apiUrl="$[[ inputs.devguard_api_url ]]" --token="$[[ inputs.devguard_token ]]" --path="$[[ inputs.path ]]" --defaultRef="$[[ inputs.default_ref ]]" --ref="$[[ inputs.commit_ref ]]" --isTag="$IS_TAG" --webUI=$[[ inputs.devguard_web_ui ]]
