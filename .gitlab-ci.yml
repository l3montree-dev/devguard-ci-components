# This is a test configuration for the DevGuard scanner components.
# The results can be viewed on the DevGuard dashboard at:
# https://main.devguard.org/l3montree-cybersecurity/projects/devguard-pipeline/assets/devguard-pipeline

stages:
  - build-custom-images
  - build
  - test
  - test-additional
  - deploy
  - release

build-kaniko-crane:
  stage: build-custom-images
  image:
    name: registry.gitlab.com/l3montree/devguard/kaniko-project/executor:v1.24.0-debug@sha256:0acd73a81eb8a1a2f69cd431d0834bb53dce221f8b996f2d28a62a5e84abfdc9
    entrypoint: [""]
  script:
    - /kaniko/executor --cleanup --context $CI_PROJECT_DIR/images --dockerfile $CI_PROJECT_DIR/images/Dockerfile.kaniko-crane --destination $CI_REGISTRY_IMAGE/kaniko-crane:kaniko-v1.24.0-debug
  when: manual

include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/full@$CI_COMMIT_SHA
    inputs:
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      version: "$CI_COMMIT_REF_NAME"
      iac_config_file: "checkov.yaml"
      api_url: "https://api.main.devguard.org"
      
  - examples/sbom-gets-generated/.gitlab-ci.yml

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/dependency-risk-identification@$CI_COMMIT_SHA
    inputs:
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      artifact_name: "test-additional-artifact"
      sbom_file: "sbom-in-repo.json"
      api_url: "https://api.main.devguard.org"

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/build@$CI_COMMIT_SHA
    inputs:
      build_stage: "build"
      build_args: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile-test"
      artifact_name: "test-additional-artifact"
      token: "$DEVGUARD_TOKEN"
      asset_name: "$DEVGUARD_ASSET_NAME"
      image_suffix: "test-additional-artifact"
      api_url: "https://api.main.devguard.org"

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/container-scanning@$CI_COMMIT_SHA
    inputs:
      scan_stage: "test-additional"
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      artifact_name: "test-additional-artifact"
      image_suffix: "test-additional-artifact"
      api_url: "https://api.main.devguard.org"

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/deploy@$CI_COMMIT_SHA
    inputs:
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      api_url: "https://api.main.devguard.org"
      
create-release:
  stage: release
  dependencies:
    - devguard:software-composition-analysis
    - devguard:container-scanning:default
    - devguard:deploy
  image: registry.gitlab.com/gitlab-org/release-cli:v0.21.0@sha256:d588d48319b516a8c91ea5d56c2a84f6df04d34927c331f93240ae5cc7f2ac7e
  script: echo "Creating release $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG of components in $CI_PROJECT_PATH"
