stages:
  - test
  - release

create-gitlab-release:
  stage: release
  image: alpine:3.22.1@sha256:4bcff63911fcb4448bd4fdacec207030997caf25e9bea4045fa6c8c44de311d1
  before_script:
    - apk add --no-cache curl
  script:
    - |
      VERSION=${CI_COMMIT_TAG#v}
      MINOR=$(echo "$VERSION" | cut -d. -f1-2)
      DESCRIPTION="# DevGuard CI Components $CI_COMMIT_TAG\n\nReusable GitHub Actions workflows and GitLab CI templates for DevGuard-based pipelines.\n\n## Versioning\n\nAll DevGuard components share the same **minor version**. Any \`v${MINOR}.*\` release of one component is compatible with any \`v${MINOR}.*\` release of another. Patch versions are released independently per component.\n\nSee [VERSIONING.md](https://github.com/l3montree-dev/devguard/blob/main/VERSIONING.md) for the full policy.\n\n📋 [CI Component CHANGELOG](https://github.com/l3montree-dev/devguard-ci-component/blob/main/CHANGELOG.md) — what changed in the pipeline templates.\n📋 [DevGuard CHANGELOG](https://github.com/l3montree-dev/devguard/blob/main/CHANGELOG.md) — API and web frontend changes.\n📋 [Helm Chart CHANGELOG](https://github.com/l3montree-dev/devguard-helm-chart/blob/main/CHANGELOG.md) — Kubernetes deployment changes.\n\n---\n\n🐛 Issues: https://github.com/l3montree-dev/devguard/issues\n💬 Community: https://github.com/l3montree-dev/devguard/discussions"
      curl --fail-with-body --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"name\":\"DevGuard CI Components $CI_COMMIT_TAG\",\"tag_name\":\"$CI_COMMIT_TAG\",\"ref\":\"$CI_COMMIT_SHA\",\"description\":\"$DESCRIPTION\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
  rules:
    - if: $CI_COMMIT_TAG

lint:
  stage: test
  image: api.main.devguard.org/docker.io/oven/bun:1.3.6
  script:
    - bun run format:check


# job template to run tests against test project on gitlab.com
# unfortunately we can't use trigger pipelines because
# the test prjects uses include to reference the templates of this project
# and we can't use input variables in include statements unless they are project 
# variables that are passed in via the trigger pipeline API
.trigger_and_wait:
  image: api.main.devguard.org/docker.io/oven/bun:1.3.6
  script:
    - bun run tests/trigger-pipeline.ts
  variables:
    PROJECT_ID: "75629660"
    GITLAB_URL: "https://gitlab.com"
    TOKEN: "$DEVGUARD_TEST_PROJECT_PAT"
  rules:
    - if: '$CI_SERVER_FQDN == "gitlab.com"'
  resource_group: devguard-test-project

include:
  ## Sign OCI Image Test
  - "tests/test_sign-oci-image.yml"
  ## Secret Scanning Test
  - "tests/test_secret-scanning.yml"
  - "tests/test_discover-baseimage-attestations.yml"
  ## Software Composition Analysis Test
  - "tests/test_software-composition-analysis.yml"
  ## SBOM Upload Test
  - "tests/test_sbom_upload.yml"
  ## Container Scanning Test
  - "tests/test_container-scanning.yml"
  ## Build OCI Image Test
  - "tests/test_build-oci-image.yml"
  ## Full Test
  - "tests/test_full.yml"
  ## Container Lifecycle Test
  - "tests/test_container-lifecycle.yml"
  ## Generate Tag Test
  - "tests/test_generate-tag.yml"
