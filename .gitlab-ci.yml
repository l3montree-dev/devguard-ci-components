# This is a test configuration for the DevGuard scanner components.
# The results can be viewed on the DevGuard dashboard at:
# https://main.devguard.org/l3montree-cybersecurity/projects/devguard-pipeline/assets/devguard-pipeline

stages:
  - build-custom-images
  - build
  - test
  - deploy
  - release

build-kaniko-crane:
  stage: build-custom-images
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug@sha256:c3109d5926a997b100c4343944e06c6b30a6804b2f9abe0994d3de6ef92b028e
    entrypoint: [""]
  script:
    - /kaniko/executor --cleanup --context $CI_PROJECT_DIR/images --dockerfile $CI_PROJECT_DIR/images/Dockerfile.kaniko-crane --destination $CI_REGISTRY_IMAGE/kaniko-crane:kaniko-v1.23.2-debug-crane-v0.20.3
  when: manual

include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/full@$CI_COMMIT_SHA
    inputs:
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      version: "$CI_COMMIT_REF_NAME"
      iac_config_file: "checkov.yaml"
  - examples/sbom-gets-generated/.gitlab-ci.yml

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/dependency-risk-identification@$CI_COMMIT_SHA
    inputs:
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      sbom_file: "sbom-in-repo.json"

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/software-composition-analysis@$CI_COMMIT_SHA
    inputs:
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      artifact_name: "test-additional-artifact"

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/build@$CI_COMMIT_SHA
    inputs:
      build_stage: "build"
      build_args: "--context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile-test"
      artifact_name: "test-additional-artifact"
      token: "$DEVGUARD_TOKEN"
      asset_name: "$DEVGUARD_ASSET_NAME"

  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/container-scanning@$CI_COMMIT_SHA
    inputs:
      asset_name: "$DEVGUARD_ASSET_NAME"
      token: "$DEVGUARD_TOKEN"
      artifact_name: "test-additional-artifact"
create-release:
  stage: release
  dependencies:
    - devguard:software-composition-analysis:$[[ inputs.artifact_name ]]
    - devguard:container-scanning:$[[ inputs.artifact_name ]]
    - devguard:deploy:$[[ inputs.artifact_name ]]
  image: registry.gitlab.com/gitlab-org/release-cli:v0.21.0@sha256:d588d48319b516a8
  script: echo "Creating releasec91ea5d56c2a84f6df04d34927c331f93240ae5cc7f2ac7e $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG of components in $CI_PROJECT_PATH"
