lint:
  image: oven/bun:1.3.6
  script:
    - bun run format:check

fqdn-output:
  image: alpine:3.23.2
  script:
    - echo "$CI_SERVER_FQDN"

# job template to run tests against test project on gitlab.com
# unfortunately we can't use trigger pipelines because
# the test prjects uses include to reference the templates of this project
# and we can't use input variables in include statements unless they are project 
# variables that are passed in via the trigger pipeline API
.trigger_and_wait:
  image: oven/bun:1.3.6
  script:
    - bun run tests/trigger-pipeline.ts
  variables:
    PROJECT_ID: "75629660"
    GITLAB_URL: "https://gitlab.com"
    TOKEN: "$DEVGUARD_TEST_PROJECT_PAT"
  rules:
    - if: '$CI_SERVER_FQDN == "gitlab.com"'
  resource_group: devguard-test-project

include:
  ## Sign OCI Image Test
  - "tests/test_sign-oci-image.yml"
  ## Secret Scanning Test
  - "tests/test_secret-scanning.yml"
  - "tests/test_discover-baseimage-attestations.yml"
  ## Software Composition Analysis Test
  - "tests/test_software-composition-analysis.yml"
  ## SBOM Upload Test
  - "tests/test_sbom_upload.yml"
  ## Container Scanning Test
  - "tests/test_container-scanning.yml"
  ## Build OCI Image Test
  - "tests/test_build-oci-image.yml"
  ## Full Test
  - "tests/test_full.yml"
  ## Container Lifecycle Test
  - "tests/test_container-lifecycle.yml"
  ## Generate Tag Test
  - "tests/test_generate-tag.yml"
