## Test signing of OCI image
# See https://gitlab.com/l3montree/devguard-ci-components-test-project/-/blob/sign-oci-image/.gitlab-ci.yml
trigger_sign_oci_image_test_pipeline:
  allow_failure: true
  trigger:
    strategy: mirror
    project: "l3montree/devguard-ci-components-test-project"
    branch: "sign-oci-image"
  rules:
    - if: '$CI_SERVER_FQDN == "gitlab.com"'
