## Release Test Pipeline
# See https://gitlab.com/l3montree/devguard-ci-components-test-project/-/blob/release/.gitlab-ci.yml

trigger_release_test_pipeline:
  trigger:
    strategy: mirror
    project: "l3montree/devguard-ci-components-test-project"
    branch: "release"
    tag: true
    inputs:
      release_name: "Release v0.0.$CI_COMMIT_SHORT_SHA"
      release_tag: "v0.0.$CI_COMMIT_SHORT_SHA"
