## Secret Scanning Test
# See https://gitlab.com/l3montree/devguard-ci-components-test-project/-/blob/secret-scanning/.gitlab-ci.yml
trigger_secret_scanning_test_pipeline:
  allow_failure: true
  trigger:
    strategy: mirror
    include:
      - project: 'l3montree/devguard-ci-components-test-project'
        ref: 'secret-scanning'
        file: '.gitlab-ci.yml'

trigger_secret_scanning_test_pipeline-accepted:
  trigger:
    strategy: mirror
    include:
      - project: 'l3montree/devguard-ci-components-test-project'
        ref: 'secret-scanning-accepted'
        file: '.gitlab-ci.yml'