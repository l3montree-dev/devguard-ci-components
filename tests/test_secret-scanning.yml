## Secret Scanning Test
# See https://gitlab.com/l3montree/devguard-ci-components-test-project/-/blob/secret-scanning/.gitlab-ci.yml

trigger_secret_scanning_test_pipeline:
  extends: .trigger_and_wait
  variables:
    REF_NAME: 'secret-scanning'
    CI_COMPONENT_BRANCH: '$CI_COMMIT_REF_NAME'
  allow_failure: true

trigger_secret_scanning_test_pipeline-accepted:
  extends: .trigger_and_wait
  variables:
    REF_NAME: 'secret-scanning-accepted'
    CI_COMPONENT_BRANCH: '$CI_COMMIT_REF_NAME'
  allow_failure: false