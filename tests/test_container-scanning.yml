## Container Scanning Test
# See https://gitlab.com/l3montree/devguard-ci-components-test-project/-/blob/container-scanning/.gitlab-ci.yml
trigger_container_scanning_test_pipeline:
  allow_failure: true
  trigger:
    strategy: mirror
    project: "l3montree/devguard-ci-components-test-project"
    branch: "container-scanning"
    file: '/ci.yml'
    inputs:
      branch: "$CI_COMMIT_BRANCH"
  rules:
    - if: '$CI_SERVER_FQDN == "gitlab.com"'

trigger_container_scanning_test_pipeline-accepted:
  trigger:
    strategy: mirror
    project: "l3montree/devguard-ci-components-test-project"
    branch: "container-scanning-accepted"
    inputs:
      branch: "$CI_COMMIT_BRANCH"
  rules:
    - if: '$CI_SERVER_FQDN == "gitlab.com"'
